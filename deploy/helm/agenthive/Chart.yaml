apiVersion: v2
name: agenthive
description: AgentHive - Cloud-native multi-agent collaboration platform
type: application
version: 0.1.0
appVersion: "0.1.0"

keywords:
  - ai
  - agents
  - collaboration
  - development

maintainers:
  - name: AgentHive Team
    email: team@agenthive.io

sources:
  - https://github.com/agenthive/agenthive-cloud

# Dependencies
dependencies:
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  
  - name: minio
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
