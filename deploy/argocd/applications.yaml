apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agenthive-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sdoxiaobaomei/agenthive-cloud.git
    targetRevision: master
    path: chart/agenthive
    helm:
      valueFiles:
        - values.dev.yaml
  destination:
    server: https://100.76.250.86:57116
    namespace: agenthive
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
