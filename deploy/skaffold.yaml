apiVersion: skaffold/v4beta7
kind: Config

metadata:
  name: agenthive

build:
  local:
    push: false
    useDockerCLI: true
    useBuildkit: true
  
  artifacts:
    - image: agenthive/web
      context: apps/web
      docker:
        dockerfile: Dockerfile
        target: dev
      sync:
        manual:
          - src: "src/**/*"
            dest: /app/src
            strip: src/
    
    - image: agenthive/supervisor
      context: apps/supervisor
      docker:
        dockerfile: Dockerfile
        target: dev
      sync:
        manual:
          - src: "**/*.go"
            dest: /app
    
    - image: agenthive/agent-runtime
      context: apps/agent-runtime
      docker:
        dockerfile: Dockerfile
        target: dev
      sync:
        manual:
          - src: "**/*.go"
            dest: /app

deploy:
  helm:
    releases:
      - name: agenthive
        chartPath: deploy/helm/agenthive
        namespace: agenthive-dev
        createNamespace: true
        valuesFiles:
          - deploy/helm/agenthive/values.yaml
          - deploy/helm/agenthive/values-dev.yaml
        setValues:
          web.image.repository: agenthive/web
          web.image.tag: latest
          supervisor.image.repository: agenthive/supervisor
          supervisor.image.tag: latest
          agentRuntime.image.repository: agenthive/agent-runtime
          agentRuntime.image.tag: latest

portForward:
  - resourceType: service
    resourceName: agenthive-web
    namespace: agenthive-dev
    port: 80
    localPort: 8080
  
  - resourceType: service
    resourceName: agenthive-supervisor
    namespace: agenthive-dev
    port: 8080
    localPort: 8081

profiles:
  - name: production
    deploy:
      helm:
        releases:
          - name: agenthive
            chartPath: deploy/helm/agenthive
            namespace: agenthive
            valuesFiles:
              - deploy/helm/agenthive/values.yaml
              - deploy/helm/agenthive/values-production.yaml
  
  - name: minimal
    build:
      artifacts:
        - image: agenthive/web
          context: apps/web
        - image: agenthive/supervisor
          context: apps/supervisor
    deploy:
      helm:
        releases:
          - name: agenthive
            chartPath: deploy/helm/agenthive
            namespace: agenthive-dev
            valuesFiles:
              - deploy/helm/agenthive/values.yaml
              - deploy/helm/agenthive/values-minimal.yaml
