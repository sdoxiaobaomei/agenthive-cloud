# Prometheus 精简配置 - 适用 2G 内存 ECS

global:
  scrape_interval: 30s  # 30 秒采集一次（默认 15s，低配延长）
  evaluation_interval: 30s
  external_labels:
    monitor: 'agenthive-cloud'

# 告警规则（精简版）
rule_files:
  # - "alerts.yml"  # 如需告警可启用

# 采集目标
scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - 系统指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics
    scheme: http

  # API 服务 - 应用指标
  - job_name: 'api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: /metrics
    scheme: http

  # Nginx 指标（需启用 nginx-prometheus-exporter）
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx:80']
  #   metrics_path: /metrics

# 远程存储（可选，节省本地空间）
# remote_write:
#   - url: "http://your-remote-storage/api/v1/write"
