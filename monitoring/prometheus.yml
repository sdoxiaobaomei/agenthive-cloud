apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/component: prometheus
---
# ===========================================
# Prometheus ConfigMap
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: agenthive
        monitor: prometheus

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Prometheus 自身
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes API Server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Kubernetes Nodes
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes Pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # Kubernetes Services
      - job_name: 'kubernetes-services'
        kubernetes_sd_configs:
          - role: service
        metrics_path: /probe
        params:
          module: [http_2xx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_probe]
            action: keep
            regex: true
          - source_labels: [__address__]
            target_label: __param_target
          - target_label: __address__
            replacement: blackbox-exporter:9115
          - source_labels: [__param_target]
            target_label: instance
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            target_label: kubernetes_service_name

      # AgentHive API
      - job_name: 'agenthive-api'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: api
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: agenthive
        metrics_path: /api/metrics
        interval: 30s

      # Node Exporter (if installed)
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            action: keep
            regex: 'node-exporter'

---
# ===========================================
# Alerting Rules
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
  labels:
    app: prometheus
data:
  agenthive-alerts.yml: |
    groups:
      - name: AgentHive Alerts
        rules:
          # API 服务告警
          - alert: APIHighErrorRate
            expr: |
              sum(rate(http_requests_total{job="agenthive-api",status=~"5.."}[5m])) 
              / sum(rate(http_requests_total{job="agenthive-api"}[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "API 错误率过高"
              description: "API 服务 5xx 错误率超过 5% (当前值：{{ $value | humanizePercentage }})"

          - alert: APIHighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="agenthive-api"}[5m])) by (le)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "API 延迟过高"
              description: "API P95 延迟超过 1 秒 (当前值：{{ $value | humanizeDuration }})"

          - alert: APIPodDown
            expr: |
              up{job="agenthive-api"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "API Pod 不可用"
              description: "API Pod {{ $labels.instance }} 已经宕机超过 2 分钟"

          # Landing 服务告警
          - alert: LandingHighErrorRate
            expr: |
              sum(rate(http_requests_total{job="agenthive-landing",status=~"5.."}[5m])) 
              / sum(rate(http_requests_total{job="agenthive-landing"}[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Landing 错误率过高"
              description: "Landing 服务 5xx 错误率超过 5%"

          # 资源告警
          - alert: HighMemoryUsage
            expr: |
              container_memory_usage_bytes{namespace="agenthive"} 
              / container_spec_memory_limit_bytes{namespace="agenthive"} > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "内存使用率过高"
              description: "Pod {{ $labels.pod }} 内存使用超过 90%"

          - alert: HighCPUUsage
            expr: |
              sum(rate(container_cpu_usage_seconds_total{namespace="agenthive"}[5m])) 
              by (pod) 
              / sum(container_spec_cpu_quota{namespace="agenthive"}/container_spec_cpu_period{namespace="agenthive"}) 
              by (pod) > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU 使用率过高"
              description: "Pod {{ $labels.pod }} CPU 使用超过 90%"

          # 数据库告警
          - alert: PostgresDown
            expr: |
              pg_up{namespace="agenthive"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL 不可用"
              description: "PostgreSQL 数据库已经宕机超过 2 分钟"

          - alert: PostgresHighConnections
            expr: |
              pg_stat_activity_count{namespace="agenthive"} 
              / pg_settings_max_connections{namespace="agenthive"} > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL 连接数过高"
              description: "PostgreSQL 连接数使用超过 80%"

---
# ===========================================
# Prometheus Deployment
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"
            - "--web.enable-admin-api"
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
  type: ClusterIP
