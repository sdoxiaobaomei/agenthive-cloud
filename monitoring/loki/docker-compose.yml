# ============================================================================
# Grafana Loki + MinIO (S3 backend)
# 复用 Tempo 的 MinIO 实例（同一网络）
# ============================================================================

version: "3.8"

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: agenthive-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    depends_on:
      - minio
    networks:
      - agenthive-monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # 复用 Tempo 的 minio 服务，但需要确保 bucket 存在
  # 如果单独启动此 compose，需要包含 minio
  minio:
    image: minio/minio:latest
    container_name: agenthive-minio-loki
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tempo
      MINIO_ROOT_PASSWORD: supersecret
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agenthive-monitoring

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tempo supersecret;
      mc mb local/loki --ignore-existing;
      exit 0;
      "
    networks:
      - agenthive-monitoring

volumes:
  minio_data:
  loki_data:

networks:
  agenthive-monitoring:
    name: agenthive-monitoring
    driver: bridge
