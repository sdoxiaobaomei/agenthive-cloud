# Prometheus 配置（独立实例，用于 OpenTelemetry 本地开发）
# 注意：这不是 monitoring/prometheus/prometheus.yml（那是现有监控栈的配置）
#
# 用法：
#   由 monitoring/opentelemetry/docker-compose.yml 中的 prometheus-otel 服务使用

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector-self'
    static_configs:
      - targets: ['otel-collector:8888']
