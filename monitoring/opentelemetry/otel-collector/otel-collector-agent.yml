# ============================================================================
# OTel Collector Agent (K8s DaemonSet / 每节点一个)
# 职责：接收本节点应用数据 → batch → 注入资源属性 → 转发 Gateway
# ============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # 主机指标
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      filesystem:
      network:
      load:
      processes:

  # 容器运行时指标（K8s 时有效）
  docker_stats:
    collection_interval: 30s
    endpoint: unix:///var/run/docker.sock
    timeout: 20s

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  batch:
    timeout: 1s
    send_batch_size: 512
    send_batch_max_size: 1024

  # K8s 资源属性注入（需要 K8s API 访问）
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.start_time
      labels:
        - tag_name: app.label.component
          key: app.kubernetes.io/component
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection

  resource:
    attributes:
      - key: collector.layer
        value: agent
        action: upsert
      - key: host.name
        from_attribute: host.name
        action: upsert

  attributes/filter:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: password
        action: delete
      - key: token
        action: delete
      - key: api_key
        action: delete

exporters:
  otlp/gateway:
    endpoint: otel-collector-gateway:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 10s
      max_elapsed_time: 30s
    sending_queue:
      enabled: true
      num_consumers: 5
      queue_size: 1000

  logging:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    metrics:
      receivers: [otlp, hostmetrics, docker_stats]
      processors: [memory_limiter, k8sattributes, resource, attributes/filter, batch]
      exporters: [otlp/gateway, logging]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, attributes/filter, batch]
      exporters: [otlp/gateway, logging]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, k8sattributes, resource, attributes/filter, batch]
      exporters: [otlp/gateway, logging]

  telemetry:
    metrics:
      level: basic
      address: 0.0.0.0:8888
    logs:
      level: warn
