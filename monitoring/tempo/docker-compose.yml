# ============================================================================
# Grafana Tempo + MinIO (S3 backend)
# 用于开发环境和轻量生产环境的分布式追踪存储
# ============================================================================

version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: agenthive-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tempo
      MINIO_ROOT_PASSWORD: supersecret
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agenthive-monitoring

  # MinIO bucket 初始化
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tempo supersecret;
      mc mb local/tempo --ignore-existing;
      mc anonymous set download local/tempo;
      exit 0;
      "
    networks:
      - agenthive-monitoring

  tempo:
    image: grafana/tempo:2.5.0
    container_name: agenthive-tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9095:9095"   # Tempo gRPC
      - "14268:14268" # Jaeger thrift_http
      - "14250:14250" # Jaeger grpc
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agenthive-monitoring
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  minio_data:
  tempo_data:

networks:
  agenthive-monitoring:
    name: agenthive-monitoring
    driver: bridge
