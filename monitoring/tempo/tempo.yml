# ============================================================================
# Grafana Tempo 配置
# 模式：单二进制模式（开发/小生产）
# 存储：MinIO (S3-compatible)
# ============================================================================

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831
    zipkin:
      endpoint: 0.0.0.0:9411

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s
  max_block_bytes: 1_000_000_000
  flush_check_period: 10s

compactor:
  compaction:
    compaction_window: 1h
    max_compaction_objects: 1000000
    block_retention: 720h  # 30 days
    compacted_block_retention: 1h

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo
      endpoint: minio:9000
      insecure: true
      access_key: tempo
      secret_key: supersecret
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

overrides:
  defaults:
    ingestion:
      max_traces_per_user: 100000
      max_local_traces_per_user: 100000
      max_global_traces_per_user: 1000000
      rate_limit_bytes: 15000000
      burst_size_bytes: 20000000
      max_trace_size_bytes: 5000000
      max_attribute_count: 100
      max_attribute_string_length: 10000
      max_attribute_json_size_bytes: 50000
      max_attribute_value_size_bytes: 100000
      max_search_bytes_per_trace: 5000
      max_spans_per_span_set: 100

querier:
  search:
    query_timeout: 30s
    prefer_self: 10
    external_endpoints: []
  max_concurrent_queries: 20

query_frontend:
  search:
    query_timeout: 30s
    max_results: 1000
  max_outstanding_per_tenant: 2000

cache:
  background_cache:
    writeback_goroutines: 10
  caches:
    - roles:
        - frontend
      memcached:
        host: localhost
        service: memcached
        timeout: 500ms
