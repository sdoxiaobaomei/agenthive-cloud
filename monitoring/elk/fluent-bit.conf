[SERVICE]
    Flush         5
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  10
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

[FILTER]
    Name                parser
    Match               docker.*
    Key_Name            log
    Parser              json
    Reserve_Data        On
    Preserve_Key        On

[FILTER]
    Name                modify
    Match               docker.*
    Remove              password
    Remove              token
    Remove              secret
    Remove              api_key

[OUTPUT]
    Name            es
    Match           docker.*
    Host            elasticsearch
    Port            9200
    Index           fluentbit-logs-%Y.%m.%d
    HTTP_User       elastic
    HTTP_Passwd     elastic123
    tls             On
    tls.verify      Off
    Suppress_Type_Name On
    Trace_Error     On
