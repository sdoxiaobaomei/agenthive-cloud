# ============================================================================
# Grafana Datasource: Grafana Loki
# 日志后端
# ============================================================================

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      alertmanagerUid: alertmanager
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
        - name: SpanID
          matcherRegex: '"span_id":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
      maxLines: 1000
