learnings: >-
  1. 余额动画使用 requestAnimationFrame + easeOutCubic，在 onMounted 中触发，onUnmounted 中清理。
  2. PieChart 组件支持 donut 模式 + 中心文字，暗色模式通过 props.dark 控制配色。
  3. 顶部导航栏余额轮询使用 setInterval，需在 onUnmounted 中 clearInterval 避免内存泄漏。
  4. useMockTransactions 封装了分页逻辑，返回 paginatedTransactions + pagination 对象，直接适配 DataTable。
  5. ChatPanel 的预估消费通过固定文案展示，未来可接入真实计费模型。
