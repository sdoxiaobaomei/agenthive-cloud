summary: >-
  Credits 中心首页（/credits）和流水明细页（/credits/transactions）已完成。
  
  /credits 页面包含：
  - 余额大数字展示（精确到 4 位小数：1234.5678 credits），带法币换算（≈ ¥123.46）
  - 余额计数器动画：从 0 滚动到目标值，800ms easeOutCubic
  - 快捷操作按钮：Recharge / Withdraw / History，点击路由跳转
  - 收益来源饼图（流量收益/销售收益/充值，近 30 天），使用 PieChart 组件（环形图 + 中心文字）
  - 最近 5 笔流水预览卡片，显示图标/描述/时间/金额/余额，颜色区分收入(绿)/支出(红)/手续费(灰)
  - 4 个统计卡片：总收入/总支出/净余额/可用余额
  
  /credits/transactions 页面包含：
  - 完整流水列表，使用 DataTable 组件
  - 类型筛选（全部/收入/支出），DataTable 表头筛选
  - 分页加载（每页 10/20/50 条）
  - 类型图标颜色区分：收入绿色 ↑ / 支出红色 ↓ / 手续费灰色 −
  
  全局集成：
  - layouts/app.vue 顶部导航栏实时轮询 credits 余额（5s 间隔），使用 useMockCredits().refresh()
  - ChatPanel.vue 发送消息旁显示预估消费提示（~0.5 credits/msg）
