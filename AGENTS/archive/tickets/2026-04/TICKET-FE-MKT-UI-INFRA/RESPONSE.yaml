summary: >-
  经济系统共享 UI 基础设施已完成。创建了统一的 Mock API 层(composables/useMockApi.ts)，
  提供 useMockCredits() 和 useMockCreator() 两个 composable，返回响应式 ref 数据。
  创建了 6 个通用 Vue 组件: DataCard(数据卡片+趋势指示)、TrendChart(ECharts 折线图+7/30/90天切换)、
  PieChart(ECharts 环形饼图+中心文字)、DataTable(Element Plus el-table 封装+分页)、
  AmountInput(金额输入+法币换算+快捷金额)、ConfirmDialog(二次确认弹窗)。
  所有组件支持暗色模式。创建了 economy-preview.vue 预览页面展示全部组件。
  类型定义(types/economy.ts)已存在且覆盖完整，无需新建。
  修复了 4 个类型错误: DataTable 泛型默认类型改为 Record<string, any> 以兼容接口数组，
  size prop 类型扩展为匹配 Element Plus ComponentSize，移除了 economy-preview.vue 中无效的 as 类型断言。
