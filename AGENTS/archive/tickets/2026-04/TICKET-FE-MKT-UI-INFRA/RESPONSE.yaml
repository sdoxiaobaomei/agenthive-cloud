skill_summary: "Mock API分层模式：interface定义 + composable实现，后端就绪时零成本替换。适用于所有前端原型开发。"
learnings: >-
  1. 现有 types/economy.ts 已包含完整接口定义，避免重复造轮子。
  2. ECharts 在 Nuxt 3 SSR 中必须用 await import('echarts') 动态导入，且在 onMounted 中初始化。
  3. Mock API 层使用 interface + composable 模式，后端就绪时只需替换 composable 内部实现，UI 层完全无感。
  4. DataTable 封装时保留 Element Plus 原有功能（排序/筛选/分页），通过 slot 和 formatter 扩展自定义渲染。
  5. 暗色模式通过 Tailwind dark: 变体和 ECharts 主题色动态切换实现。
  6. Vue SFC 模板中 as 类型断言对 props 绑定不生效，应在组件内部使用更宽松的泛型约束(Record<string, any>)。
  7. Element Plus 的 ComponentSize 包含空字符串 ""，组件 props 定义时应与之对齐以避免 TS overload 不匹配。
