status: completed
confidence_score: 0.93
summary: >-
  实现 Project 成员管理 REST API：
  1. GET /api/projects/:id/members — 返回成员列表（JOIN users 表，脱敏：仅返回 username/avatar，不含密码哈希）；
  2. POST /api/projects/:id/members — 邀请成员（user_id + role，默认 member，ON CONFLICT 幂等更新角色）；
  3. PATCH /api/projects/:id/members/:userId — 更新角色（owner/admin/member/viewer）；
  4. DELETE /api/projects/:id/members/:userId — 移除成员；
  5. 权限校验中间件：requireProjectAdmin（仅 owner/admin 可操作）+ requireProjectMember（查询需为成员）；
  6. 业务规则硬编码：viewer 不可被提升为 admin；每个项目至少保留 1 个 owner（移除/降级前 countOwners 检查）；
  7. 成员变动通过结构化 logger 记录（为后续 activity_log 表预留）。
