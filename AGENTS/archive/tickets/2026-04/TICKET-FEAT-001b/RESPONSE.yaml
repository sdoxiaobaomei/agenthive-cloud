learnings: >-
  1. 复用 FEAT-001a 中预置的 projectService 成员管理方法（findMembers/addMember/removeMember/updateMemberRole），
     使本 Ticket 仅需聚焦路由、控制器和权限规则，体现了前置数据基础 Ticket 的价值。
  2. 权限校验提取为 requireProjectAdmin/requireProjectMember 辅助函数，避免在每个端点中重复权限查询逻辑，
     同时保持 Express middleware 链的简洁（未引入新中间件文件，降低复杂度）。
  3. "至少保留 1 个 owner" 规则在 Controller 层通过 countOwners() + 前置检查实现，而非数据库触发器，
     理由：触发器跨事务行为不可控，且错误信息难以定制化；应用层检查更灵活、更利于返回用户友好的中文错误提示。
  4. viewer 不可升 admin 的规则同样放在 Controller，便于后续根据配置动态调整（如引入企业版策略）。
