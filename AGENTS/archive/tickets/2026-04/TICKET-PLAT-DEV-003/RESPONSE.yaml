learnings: >-
  本 Ticket 的 setup-dev-env.sh 已在前期由其他任务完成，说明 Dev 环境初始化脚本的优先级
  在团队内已被识别并提前处理。但脚本的存在不等于开发者一定会运行，建议在 CI/CD 或
  GitHub Actions 中增加 .env.dev 完整性校验步骤（如 pre-commit hook 或 PR check），
  将 "人的自觉" 转化为 "流程的强制"。此外，JWT_SECRET 等敏感值在 .env.dev 中使用固定 dev 值
  是可接受的，但应在脚本输出中明确提示 "Dev 环境固定值，生产环境必须更换"。

skill_candidate: true
skill_summary: >-
  Dev 环境 Secrets 自举脚本设计模式。最佳实践：脚本应同时支持 "生成缺失值" 和 "验证现有值"
  两种模式；对于 JWT_SECRET 等跨服务共享密钥，应在脚本注释和 .env.example 中明确标注
  "MUST BE IDENTICAL ACROSS ALL SERVICES"，并在 CI 中增加跨服务环境变量一致性检查。
