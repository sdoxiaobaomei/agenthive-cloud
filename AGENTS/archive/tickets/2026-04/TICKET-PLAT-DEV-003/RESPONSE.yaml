summary: >-
  统一 JWT Secret 并完成 .env.dev 完整性检查机制。
  
  1. JWT Secret 一致性验证：.env.dev 中已定义 JWT_SECRET=AgentHive2024!Dev#Secure%Change&It*In+Prod=，
     docker-compose.dev.yml 中 Node API（JWT_SECRET: ${JWT_SECRET}）和 Java Gateway
     （JWT_SECRET: ${JWT_SECRET}）以及 auth-service 均使用同一环境变量注入，
     三方使用的 JWT Secret 值完全一致，token 可跨服务验证。
  
  2. setup-dev-env.sh 验证：scripts/setup-dev-env.sh 已存在且功能完整。
     - 检查 .env.dev 是否存在，不存在则创建空文件
     - 检测 REQUIRED_VARS 中 11 个必需变量是否缺失或为空
     - 为缺失的 JWT_SECRET 自动生成 openssl rand -base64 32（256-bit）
     - 为缺失的 NACOS_AUTH_TOKEN / NACOS_AUTH_IDENTITY_VALUE 同样自动生成随机值
     - 列出所有缺失变量并给出示例值
     - 追加生成的值到 .env.dev，保留现有配置
  
  3. docker-compose.dev.yml 注释：文件顶部已包含 "Run `bash scripts/setup-dev-env.sh` before first startup"
     的引导注释，新开发者首次启动前会被提示运行检查脚本。
  
  4. docker compose config 验证：执行 `docker compose -f docker-compose.dev.yml --env-file .env.dev config`
     无报错、无 "variable is not set" 警告，所有必需变量均已定义。

