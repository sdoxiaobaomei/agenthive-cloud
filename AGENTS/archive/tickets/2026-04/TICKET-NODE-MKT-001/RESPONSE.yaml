learnings: >-
  Agent Runtime 与 API 之间存在两条任务执行路径：Redis Stream（TaskConsumer）和直接调用（TaskExecutionService）。
  计费逻辑需要在两条路径的“任务完成”钩子中分别植入。为避免重复扣费，
  未来可考虑在 debitCredits 中增加 taskId 幂等校验（Java 端或 Redis 分布式锁）。
