summary: >-
  已完成 Node.js API 与 Agent Runtime 侧的 Credits 计费系统集成。
  1) Chat Controller 在任务执行前通过 checkBalance 预检余额，不足时返回 402；
  2) TaskConsumer 在消费 Redis Stream 任务完成后调用 /credits/agent-debit 正式扣费，
     并支持从 Redis 读取实际 token 消耗；
  3) TaskExecutionService（独立 LLM 执行路径）同样在执行完成后自动扣费，失败时入队重试；
  4) QueryLoopV2 新增 onComplete 回调，使 Agent Runtime 调用方可在循环结束后上报 usage；
  5) Credits BFF 路由 (/api/credits/balance|transactions|pricing) 保持可用，支持 mock 降级。
