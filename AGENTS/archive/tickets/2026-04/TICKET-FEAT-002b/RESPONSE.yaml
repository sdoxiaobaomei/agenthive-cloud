learnings: |
  1. path.startsWith() 在 Windows 上存在前缀碰撞漏洞（user1 vs user10）。
     应使用 path.relative() 检查是否以 '..' 开头，并配合盘符校验。
  2. 批量操作应采用细粒度返回模式（succeeded/failed 数组），而非全有或全无，
     提升前端用户体验。
  3. 对批量操作设置数量上限（Zod .max()）是简单的 DoS 防护手段。
