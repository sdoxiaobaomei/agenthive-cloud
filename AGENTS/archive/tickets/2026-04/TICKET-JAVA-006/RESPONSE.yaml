skill_summary: "Daily traffic-to-credits settlement job with per-website idempotency, exception-isolated batch processing, and TransactionTemplate per-user transactions."
blockers: []
learnings: >-
  1. TransactionTemplate 注入优于 PlatformTransactionManager：测试中可直接 mock TransactionTemplate.execute()
     并让它直接执行 callback，避免与 Spring 事务基础设施的复杂交互。
  2. Mockito strictness：@BeforeEach 中的通用 stub（如 transactionTemplate）在某些测试路径中可能未被使用，
     使用 @MockitoSettings(strictness = Strictness.LENIENT) 或把 stub 下放到具体测试可避免 UnnecessaryStubbingException。
  3. BigDecimal 比较：BigDecimal.ZERO 与 new BigDecimal("0.0000") 不相等，断言时应使用 compareTo。
  4. 幂等性设计：利用现有 CreditsAccountService.credit() 的 (userId, sourceType, sourceId) 唯一约束，
     以 websiteId:date 作为 sourceId，无需额外状态字段即可实现同一日期同一网站不重复结算。
