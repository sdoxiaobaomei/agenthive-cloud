ticket_id: TICKET-SEC-002
status: completed
confidence_score: 0.95
summary: >-
  Fixed P0 security vulnerabilities in auth-service:
  1) SysUser entity — replaced @Data with @Getter/@Setter/@ToString(callSuper=true, exclude="password")/@EqualsAndHashCode
     and added @JsonIgnore on password to prevent serialization and toString leakage.
  2) LoginRequest, RegisterRequest, UpdateProfileRequest DTOs — replaced @Data with
     @Getter/@Setter/@ToString(exclude="password") to prevent password exposure in logs.
  3) application.yml — switched MyBatis log-impl from StdOutImpl to Slf4jImpl and
     lowered com.agenthive.auth.mapper log level from debug to warn to stop SQL/parameter
     leakage to stdout.
  4) GlobalExceptionHandler — changed SLF4J call to use string concatenation, forcing
     the error(String, Throwable) overload so stack traces are reliably printed.
  5) Added SysUserSecurityTest with behavioral assertions for @JsonIgnore serialization
     exclusion and @ToString.Exclude (via Lombok exclude) toString exclusion.
