learnings: >-
  @Data on entities/DTOs is dangerous for sensitive fields because it includes them
  in toString/equals/hashCode. Always use explicit Lombok annotations and exclude
  sensitive fields. For SLF4J, varargs overloads do not guarantee Throwable extraction
  across all bindings; use string concatenation to force the (String, Throwable) signature
  when a stack trace is required. Added minimal plain-unit behavioral tests for
  @JsonIgnore and @ToString.Exclude without requiring a Spring context, avoiding
  MyBatis mapper initialization issues in test slices.
