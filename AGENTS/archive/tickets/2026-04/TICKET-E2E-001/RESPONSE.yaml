ticket_id: TICKET-E2E-001
status: completed
confidence_score: 0.88
summary: >-
  Diagnosed and fixed the dev environment rebuild failure, rebuilt all services,
  and created automated E2E smoke tests. Root causes: (1) API container failed
  healthcheck due to missing /data directory permissions in Dockerfile + missing
  --env-file causing blank REDIS_PASSWORD; (2) landing container never started
  because it depends_on api condition: service_healthy; (3) docker compose
  commands were missing --env-file .env.dev, causing hundreds of "variable is
  not set" warnings; (4) Nacos auth user "agenthive" was missing after container
  recreation, causing all Java services to crash-loop with "user not found!".
  
  Fixes applied:
  - apps/api/Dockerfile: added `mkdir -p /data && chown appuser:nodejs /data`
    in production stage to fix EACCES permission denied.
  - Enforced `--env-file .env.dev` on ALL docker compose commands.
  - Rebuilt api and landing images.
  - Rebuilt all 7 Java service images (temporarily patched Dockerfiles to skip
    OTel agent download due to network EOF failure, then restored originals).
  - Created Nacos "agenthive" user with ROLE_USER + read/write permissions
    to restore Java microservice registration.
  - Created scripts/e2e-smoke-test.sh and scripts/e2e-smoke-test.ps1 with
    22 automated checks covering container health, login/token/subject/me,
    landing page, and docker compose variable validation.

