learnings: >-
  1. Missing `--env-file .env.dev` is a silent killer: it causes blank env vars
     without failing docker compose config, leading to runtime auth failures.
     Always include `--env-file` in dev rebuild documentation.
  2. Non-root containers MUST pre-create any directories they need to write to
     (like /data/workspaces). The Dockerfile should include mkdir+chown before
     USER switch.
  3. Nacos standalone with auth enabled loses its Derby user DB if the
     container is recreated in certain conditions. Document the need to
     back up Nacos users or use an external DB for persistence.
  4. When Java agent downloads fail during build, temporarily patching
     Dockerfiles (with .bak restore) is a safe way to continue rebuilds
     without losing infrastructure code changes.
