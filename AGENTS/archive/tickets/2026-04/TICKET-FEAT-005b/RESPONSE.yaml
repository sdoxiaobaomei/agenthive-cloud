learnings: >-
  1. Element Plus Steps 组件与自定义步骤内容配合时，需要用 :active 控制当前
     步骤，finish-status 控制已完成步骤的视觉状态。
  2. 表单校验在步骤切换时需要手动触发（formRef.validate()），否则用户可能
     跳过必填项。nextStep 中先做校验再推进是合理的模式。
  3. 创建中的全屏 overlay 比按钮 loading 状态体验更好，因为创建过程可能较长
     （尤其是 Git 导入时）。
  4. Git URL 的正则校验覆盖了 HTTPS (https://*.git) 和 SSH (git@*:*.git) 两种
     常见格式，后续可扩展支持更多 Git 托管平台。
