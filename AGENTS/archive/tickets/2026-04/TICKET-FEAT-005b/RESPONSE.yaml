summary: >-
  实现了 /projects/create 三步创建向导页面：Step 1 选择创建方式（空白项目/
  Git 导入卡片），Step 2 配置项目（名称/描述/技术栈选择或 Git URL/分支），
  Step 3 确认摘要并创建。使用 Element Plus Steps 组件实现向导流程，技术栈
  选择使用彩色图标卡片，支持表单校验（名称必填 1-128 字符、Git URL 格式校验）。
  创建成功后自动跳转到 /workspace/:projectId。创建中显示全屏 loading 遮罩。
  同时扩展了 project store 的 createProject action，支持传递 type/tech_stack/
  git_url/git_branch 等扩展字段。
