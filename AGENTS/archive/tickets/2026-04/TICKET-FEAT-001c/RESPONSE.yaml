learnings: |
  1. logger.error 的第二个参数类型为 Error | undefined，传入普通对象会导致 TS2353。
     修复方式：new Error(message) 作为第二个参数，上下文放第三个参数。
  2. fs/promises.cp({ recursive: true, force: false }) 可以安全复制模板目录，
     force: false 避免意外覆盖已有文件。
  3. child_process.spawn 的 close 事件比 exit 更可靠（stdout/stderr 已完全关闭）。
