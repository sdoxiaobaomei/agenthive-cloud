learnings: >-
  托管网站的静态文件 serving 当前为 mock handler（返回占位 HTML），
  实际 Nginx 反向代理或容器编排需 Platform 团队后续对接。
  UV 去重使用 Redis Set + 1h TTL，在多实例部署下可保持一致性；
  若流量极大，可考虑 HyperLogLog 替代 Set 以节省内存。
