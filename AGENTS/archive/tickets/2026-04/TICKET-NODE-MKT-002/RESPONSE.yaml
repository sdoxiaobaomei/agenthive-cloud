summary: >-
  网站托管部署与流量统计功能在 Node API 层已完整实现。
  部署流程：project controller → hosting-service 生成 Dockerfile/Nginx 配置 →
  调用 Java /hosted-websites API 创建记录 → 返回子域名访问地址。
  流量统计：express middleware 在 /h/:projectId 路由上拦截请求，
  Redis Pipeline 原子 incr PV 与 sadd UV（IP+UA SHA256 指纹），
  后台 setInterval 每 5 分钟批量上报 Java，失败时本地内存缓存待补报。
  Dashboard 提供 7 天趋势与实时数据，均支持 mock 降级。
