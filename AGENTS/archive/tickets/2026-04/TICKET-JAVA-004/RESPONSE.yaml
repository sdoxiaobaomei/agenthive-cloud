blockers: []
learnings: >-
  1. MyBatis Plus BaseMapper.insert() 在 Mockito 中存在 T 与 Collection<T> 的重载歧义，测试中必须使用
     any(CreditsTransaction.class) 等显式类型匹配。
  2. BigDecimal 比较：new BigDecimal("600") 与 new BigDecimal("600.0000") 不相等，断言时应使用 compareTo。
  3. TransactionTemplate 注入优于 PlatformTransactionManager，测试中可直接 mock execute() 并让它执行 callback。
  4. 冻结/解冻/扣减模型：在 CreditsAccount 上新增 frozen_balance 字段，通过三个原子 SQL 操作（freezeBalance、
     unfreezeBalance、deductFrozenBalance）配合乐观锁实现，无需独立冻结表。
  5. 自动审批逻辑应内聚在 apply 方法中，小额（<= threshold）同步自动审批，大额保持 PENDING。
