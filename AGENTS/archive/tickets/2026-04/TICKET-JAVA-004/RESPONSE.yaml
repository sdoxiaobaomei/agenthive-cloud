summary: >-
  实现了 Credits 提现与手续费系统。新增 frozen_balance 到 CreditsAccount，支持申请冻结、审批扣减、拒绝解冻的完整状态机。
  新增 WithdrawalRecord 实体/表，WithdrawalStatus 枚举，WithdrawalService 处理核心逻辑（含风控限额、手续费计算、小额自动审批）。
  用户接口：POST/GET /credits/withdrawals；管理接口：GET /admin/withdrawals，POST /admin/withdrawals/{id}/approve|reject，均校验 X-Internal-Token。
  account_info 使用 AES-256-GCM 加密存储，密钥从 WITHDRAWAL_ENCRYPT_KEY 环境变量读取，启动时强制校验。
  全部 payment-service 测试通过（含 13 个新增 WithdrawalService 测试及 WithdrawalAccountEncryptorTest）。
