skill_summary: "nullable 外键兼容历史数据模式：为现有表新增业务关联字段时，使用 nullable + ON DELETE SET NULL + 索引，可在不破坏历史数据的前提下建立关系，且保留数据清理的灵活性。Dashboard 聚合查询模式：通过单次多表 JOIN 聚合项目维度的会话、任务、成员等异构数据，配合索引可将查询控制在 200ms 以内。"
