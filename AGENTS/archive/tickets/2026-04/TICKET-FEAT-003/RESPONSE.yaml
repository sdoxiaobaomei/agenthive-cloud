summary: |
  Project-Chat-Agent 关联与 Dashboard 数据 API 已实现。
  - agent_tasks 表增加 project_id 外键（nullable）+ 索引
  - GET /api/projects/:id/chat-sessions 返回项目关联会话列表
  - GET /api/projects/:id/agent-tasks 返回项目下 Agent 任务历史
  - GET /api/projects/:id/dashboard 聚合返回项目信息+最近任务+成员+消息数
  - Chat 创建会话时已支持 project_id 绑定（原有逻辑已完备）
  - Agent Runtime 执行任务时自动将 project_id 写入 agent_tasks（通过 session 关联查询）
  - 删除项目时级联归档关联 chat_sessions（status=archived）
