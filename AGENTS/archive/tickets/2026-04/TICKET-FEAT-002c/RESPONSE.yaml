learnings: |
  1. child_process.exec 的 stdout/stderr 在 TypeScript 中类型为 string | Buffer，
     需要显式 typeof 检查后再调用 .trim()，否则报 TS2339。
  2. git status --porcelain 格式固定（XY + 空格 + path），适合程序解析，
     比 --short 更稳定。
  3. ahead/behind 查询应分别用 try/catch 包裹，因为分支可能没有上游（upstream），
     此时返回 null 比抛错更友好。
