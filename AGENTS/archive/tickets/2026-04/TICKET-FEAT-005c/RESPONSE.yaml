summary: >-
  实现了 /projects/:id Dashboard 页面：左侧项目信息卡片（名称/描述/技术栈/
  Git URL/创建时间/成员头像列表）+ 快捷操作按钮（Open Workspace/Chat/Settings），
  右侧 Tab 内容区包含 Overview（最近文件变更、Agent 任务）、Members（成员列表
  表格）、Activity（时间线展示操作日志）。对接了 project store 和 workspace store
  获取真实项目信息、成员列表和最近文件。活动日志和 Agent 任务使用 mock 数据。
  404 和空状态已处理，响应式布局适配 1024px 以下单列。
