learnings: >-
  1. Dashboard 页面的 sticky 侧边栏（position: sticky; top: 24px）在桌面端提供
     了优秀的浏览体验，用户滚动内容区时项目信息始终可见。
  2. Element Plus Timeline 组件非常适合展示项目活动日志，配合不同 type
     （primary/success/warning）可以直观区分活动类型。
  3. 最近文件通过递归遍历 fileTree 获取所有文件节点，按 modifiedAt 排序后
     取前 5 个。后续后端提供专用 API 后可替换为更高效的查询。
  4. 成员头像列表使用负 margin 重叠效果（margin-left: -8px），节省空间且
     视觉上更具凝聚力。
