blockers: []
learnings: >-
  1. 跨模块复用（CreditsAccountService）极大降低了代码复杂度，Marketplace 订单支付只需调用已有 Service，
     无需重复实现乐观锁和流水记录。
  2. 平台抽成比例配置化（platform.fee.rate）是必要设计，不同运营阶段可能需要调整抽成比例。
  3. 购买关系的幂等性检查（buyer_id + product_id UNIQUE）应在 createOrder 时前置校验，
     避免创建无效订单后再拦截。
  4. 法币支付的退款实现较为复杂（涉及第三方网关），当前简化版直接返回 credits 等价物，
     生产环境需接入真实支付网关的退款回调。
  5. Marketplace 订单与电商订单（order-service）的物理隔离通过独立表 + 独立 Service 实现，
     避免了状态机混淆，但未来如有统一订单中心需求，可能需要抽象一层。
