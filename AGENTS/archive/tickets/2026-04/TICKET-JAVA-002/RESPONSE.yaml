summary: >-
  完成了 Marketplace 核心能力：商品发布/搜索/购买/平台抽成。
  新增 marketplace_product / marketplace_order / marketplace_purchase 三张表，
  Product API（CRUD + 多维度搜索过滤）、Order API（创建/支付/退款）。
  支持 Credits 和法币双渠道支付，平台抽成 20%（配置化），
  交易完成后自动分配 seller_earn 和 platform_fee 到对应 credits 账户，
  记录购买关系防止重复购买，退款支持幂等性校验。9 个单元测试全部通过（仅 MarketplaceOrderServiceImplTest）。
