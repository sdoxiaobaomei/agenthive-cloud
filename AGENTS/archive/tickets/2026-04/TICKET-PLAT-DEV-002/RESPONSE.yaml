summary: >-
  修复数据库初始化不一致问题，统一用户表结构。
  
  1. agenthive 数据库：docker-compose.dev.yml 中 POSTGRES_MULTIPLE_DATABASES 已包含 agenthive，
     init-multiple-dbs.sh 脚本会自动遍历并创建。Node API 的 DB_NAME=agenthive 配置正确。
  
  2. auth-service DB_HOST：application-docker.yml 中 JDBC URL 使用 ${DB_HOST:postgres}，
     docker-compose.dev.yml 中注入 DB_HOST=postgres，服务名一致，无配置错误。
  
  3. 用户表统一：auth-service/db/schema.sql 中定义了 t_auth_user 表，与 init-schemas.sql 和
     auth-service/db/init.sql 中的 sys_user 表结构冲突。已将 schema.sql 中的 t_auth_user
     替换为与 init.sql 完全一致的 sys_user/sys_role/sys_user_role 结构（包括 deleted/version
     字段和对应索引），彻底消除两套用户表的冲突。

