learnings: >-
  同一微服务内部存在 schema.sql（t_auth_user）和 init.sql（sys_user）两套用户表定义，
  根因是早期迭代中表结构变更后未同步更新所有 SQL 文件。建议将数据库 Schema 变更纳入 CI 检查：
  在 PR 阶段对比 src/main/resources/db/ 下所有 SQL 文件的表名和字段一致性，防止类似漂移。
  此外，init-schemas.sql 作为 Docker 环境的全局初始化脚本，应与各服务 db/init.sql 保持同步，
  可考虑在 CI 中增加 "sql diff" 步骤验证。

skill_candidate: true
skill_summary: >-
  多源 SQL Schema 一致性检查机制。在微服务项目中，schema.sql、init.sql、init-schemas.sql
  等多个文件可能定义同一表结构，需建立 CI 自动 diff 检查，防止表名/字段/类型漂移。
