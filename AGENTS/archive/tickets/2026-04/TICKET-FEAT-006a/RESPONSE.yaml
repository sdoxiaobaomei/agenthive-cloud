learnings: >-
  1. Element Plus Icons Vue 中没有 `Code` 图标，使用 `Document` 替代作为 workspace
     入口按钮图标。后续应建立项目内可用图标清单避免此类问题。
  2. `<ClientOnly>` 是处理文件树 SSR 兼容性的最佳实践——文件树依赖 DOM 事件
     和 localStorage，服务端无法渲染。
  3. 懒加载子目录的实现模式：toggleFolder → 检查 children 是否存在 → 不存在则
     fetchFiles(path) → store 中 updateNodeChildren 递归更新。此模式可复用于
     任何树形懒加载场景。
  4. 独立 workspace store 的决策正确：workspace 与 chat 是不同的业务域，分离后
     状态更清晰，也便于后续 FEAT-006b/006c/007 的迭代。
