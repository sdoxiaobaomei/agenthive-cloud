summary: >-
  实现了 /workspace/:projectId 路由页面，包含可折叠的左侧文件树面板（250px）
  和右侧主内容区。文件树对接真实 API（BFF 已增强 path 参数透传），支持
  展开/折叠、懒加载子目录、文件选中。主内容区在未选中文件时展示欢迎页，
  选中文件时展示占位预览（Monaco 编辑器在 FEAT-006b 中集成）。同时新建了
  独立的 workspace Pinia store 管理文件树/选中/展开/侧边栏折叠状态，并在
  app layout 的项目列表项中增加了 hover 显示的 workspace 入口按钮。
