summary: >-
  补全 Workspace 文件系统 API 的基础操作缺口：
  1. POST /api/code/workspace/files/mkdir — 创建目录（支持多级，mkdir -p 语义）；
  2. POST /api/code/workspace/files/rename — 重命名文件或目录（目标存在返回 409）；
  3. POST /api/code/workspace/files/move — 移动文件或目录到目标路径（跨目录，支持递归子树，目标存在返回 409）；
  4. POST /api/code/workspace/files/upload — 单/多文件上传（multer memoryStorage，multipart/form-data，最多 5 个文件）；
  5. GET /api/code/workspace/files/download — 文件下载（Content-Disposition: attachment，stream 传输）；
  6. 所有操作均通过 isPathSafe 安全检查，禁止跳出 workspace；
  7. 上传文件白名单：multer fileFilter 拦截 .exe/.bat/.cmd/.sh/.dll/.so，单文件限制 10MB。
