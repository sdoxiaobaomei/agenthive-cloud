learnings: >-
  1. multer 2.x 使用 memoryStorage 配合 writeFile 可直接将上传文件写入目标 workspace，无需磁盘临时文件，
     简化了清理逻辑，但需注意大文件内存占用（当前单文件 10MB 限制可接受）。
  2. rename/move 操作使用 Node.js 原生的 fs/promises.rename，天然支持递归移动目录子树，无需手动遍历。
  3. 下载采用 createReadStream().pipe(res) 而非 readFile + res.send()，避免大文件加载到内存，提升吞吐量。
  4. 目标存在检查使用 stat + ENOENT 判断，比 existsSync 更符合 async/await 风格。
