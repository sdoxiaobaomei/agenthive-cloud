learnings: >-
  1. 实体 CreditsAccount/CreditsTransaction 已存在，表名 t_credits_account/t_credits_transaction，
     包含 ticket 要求的所有字段（user_id/balance/total_earned/total_spent/total_withdrawn/version/updated_at
     及流水字段 user_id/type/amount/balance_after/source_type/source_id/description/created_at），
     Credits 精度为 DECIMAL(18,4)，符合规范。
  2. CreditsTransactionType 枚举已包含 EARN_TRAFFIC/EARN_SALE/RECHARGE/SPEND_AGENT/WITHDRAW/FEE/REFUND。
  3. CreditsAccountService 已实现：
     - getBalance(userId): 自动初始化余额为 0 的新账户
     - credit(...): 乐观锁更新（addBalance 自定义 @Update SQL），幂等性通过 countBySource 校验
     - debit(...): 余额不足抛 BusinessException，乐观锁更新（deductBalance 自定义 @Update SQL 带 balance >= amount 条件）
     - getTransactions(userId, page, size): MyBatis-Plus 分页查询
     - 额外实现了 freeze/unfreeze/deductFrozen，为提现系统（JAVA-004）提供冻结能力
  4. 数据库 Schema（db/schema.sql）已定义完整建表语句及索引（idx_credits_account_user_id、
     idx_credits_transaction_user_id、idx_credits_transaction_source、idx_credits_transaction_created_at）。
  5. CreditsController 暴露 REST API（/credits/balance/{userId}、/credits/transactions/{userId}、
     /credits/credit、/credits/debit），使用 Result<T> 统一包装和 @Valid 参数校验。
  6. CreditsAccountServiceImplTest 覆盖 18 个测试用例，涵盖：
     - getBalance（存在/新建账户）
     - credit（成功/幂等跳过/乐观锁失败/非法金额）
     - debit（成功/余额不足/账户不存在/乐观锁失败/非法金额）
     - getTransactions（分页）
     - freeze/unfreeze/deductFrozen（成功/余额不足/非法金额）
  7. 代码质量良好：使用 @Slf4j 结构化日志，无 System.out.println；MyBatis-Plus 自定义 @Update 使用 #{} 参数绑定；
     无 SQL 注入风险。测试运行全部通过（76 tests）。
