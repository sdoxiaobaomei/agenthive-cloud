summary: >-
  Credits 充值页（/credits/recharge）和提现页（/credits/withdraw）已完成。
  
  /credits/recharge 页面包含：
  - 快捷金额选择卡片（10/50/100/500/1000 credits），卡片式单选，选中高亮
  - 自定义金额输入，使用 AmountInput 组件，最小 1 credit
  - 法币价格实时计算（1 credit = ¥0.1），汇率配置在 composable 中
  - 支付渠道选择（支付宝/微信支付），卡片式单选
  - 确认充值：ConfirmDialog → 模拟支付 2s → 成功 Toast + 余额自动更新 + 跳转回 Credits 首页
  
  /credits/withdraw 页面包含：
  - 可提现余额展示（总余额 - 冻结余额），渐变背景卡片
  - 提现金额输入，使用 AmountInput 组件，最低限额 100 credits
  - 手续费实时计算（费率 10%），输入 100 显示到账 90
  - 到账账户选择：支付宝/微信/银行卡，预留扩展位
  - 账户信息脱敏展示（'支付宝 188****8888'）
  - 提交申请：ConfirmDialog → 模拟提交 1s → 显示"审核中"状态
  - 提现记录列表（时间/金额/手续费/到账/状态），使用 DataTable
  
  全局集成：
  - 充值和提现操作后，顶部导航栏余额通过全局 creditsStore 自动更新
  - 使用 useMockRecharge / useMockWithdraw composables 封装业务逻辑，组件层不直接操作 Store
