learnings: >-
  1. AmountInput 组件封装了精度控制、法币换算、快捷金额选择，在充值和提现页复用。
  2. ConfirmDialog 组件支持多种类型（warning/danger/info/primary），loading 状态控制。
  3. 充值/提现 composables 返回计算属性（fee/netAmount）和方法（recharge/withdraw），组件层纯展示逻辑。
  4. 支付模拟使用 Promise + setTimeout，真实后端就绪时替换为真实 API 调用即可。
  5. 账户脱敏通过简单的字符串替换实现，生产环境应由后端返回已脱敏数据。
