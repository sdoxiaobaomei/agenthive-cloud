learnings: >-
  1. 所有服务的 DB_USER 和 RABBITMQ_USER 已移除 fallback 默认值（agenthive/guest），改为纯环境变量引用。
  2. auth-service/user-service 的 local 配置中硬编码的数据库用户名已改为 ${DB_USER}，空密码改为 ${DB_PASSWORD}/${REDIS_PASSWORD}。
  3. JwtConfig、InternalApiConfig、WithdrawalAccountEncryptor 的 @PostConstruct 校验已增强，
     明确检测 ${...} 未解析占位符模式，给出清晰的错误信息（如 "jwt.secret appears to be an unresolved placeholder: ${JWT_SECRET}"）。
  4. 即使不增强占位符检测，现有的长度/弱密码校验在环境变量缺失时也会间接阻止启动（${JWT_SECRET} 长度13<32，且包含"secret"关键字），
     但明确检测能提供更好的 DX（Developer Experience）。
skill_candidate: true
skill_summary: >-
  Spring Boot 敏感配置安全加固模式：1) 清理 application*.yml 中所有 fallback 默认值（尤其是 DB/RabbitMQ 凭据、JWT secret），改为纯 ${ENV} 引用；2) 在 @PostConstruct 中增加占位符未解析检测（${...} 模式）+ 弱密码/长度校验，确保服务在缺失必需 Secret 时明确启动失败而非降级运行。
