learnings: >-
  1. OTel Java Agent MDC injection (trace_id/span_id) works out-of-the-box for
     Logback/Log4j2 since v1.32.0. Spring Boot respects LOGGING_PATTERN_CONSOLE
     env var via relaxed binding, enabling stdout trace correlation without
     code changes.
  2. The existing otel-collector.yml already exported to Jaeger, but the Jaeger
     service was missing from docker-compose. Adding jaegertracing/all-in-one
     closed this gap with minimal effort.
  3. Tempo's S3/MinIO backend config was broken in dev (MinIO not present).
     Switching to backend: local is the correct dev simplification.
  4. docker-compose.prod.yml had a pre-existing structural bug: watchtower was
     indented under networks:. Fixing it unblocked prod validation.
  5. For dev/prod parity, the agent JAR should be baked into Docker images
     (via ADD in Dockerfile), while activation is controlled via env vars
     (OTEL_JAVAAGENT_ENABLED, OTEL_EXPORTER_OTLP_ENDPOINT).

