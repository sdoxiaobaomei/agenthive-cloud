skill_candidate: true
skill_summary: >-
  Pattern: OpenTelemetry Java Agent 零侵入集成到 Spring Boot 3 多服务架构。
  关键实践：(1) Dockerfile 中使用 ADD 下载 pinned 版本 agent，builder 阶段
  缓存；(2) ENTRYPOINT 硬编码 -javaagent 路径，通过 OTEL_JAVAAGENT_ENABLED
  控制开关；(3) 利用 Spring Boot  relaxed binding 通过 env var
  LOGGING_PATTERN_CONSOLE 注入 trace_id 到 stdout；(4) 统一 OTEL env vars
  (OTEL_SERVICE_NAME, OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_RESOURCE_ATTRIBUTES)
  在 docker-compose 中集中管理，实现 dev/prod 仅 endpoint 不同。

rollback_plan: >-
  1. 回滚 docker-compose.dev.yml: 移除 Jaeger 服务、移除 Java/Node 服务的
     OTEL env vars、恢复 api 的 OTEL_SDK_DISABLED: "true"。
  2. 回滚 Java Dockerfiles: 移除 ADD opentelemetry-javaagent.jar 和 ENTRYPOINT
     中的 -javaagent 参数。
  3. 回滚 nginx: 移除 traceparent/tracestate proxy_set_header。
  4. 回滚 monitoring: 恢复 tempo.yml 的 S3 存储配置（如有需要）。
  5. 所有回滚可在 5 分钟内完成，通过 git revert 或手动替换。
