summary: >-
  修复 Nacos 凭据不一致并启用服务发现路由。
  
  1. Gateway 路由修复：将 gateway-service 的 application-docker.yml 中所有 Java 微服务路由
     从硬编码 http://service:port 改为 lb://service，使 Gateway 通过 Nacos 服务发现进行负载均衡转发。
     修改的路由包括：auth-service, user-service, payment-service, order-service, cart-service, logistics-service。
     Node API 路由保持 http://api:3001（Node 服务未注册到 Nacos）。
  
  2. bootstrap.yml 对齐：cart-service 和 logistics-service 的 bootstrap.yml 使用 ${NACOS_HOST}:${NACOS_PORT}
     而其他服务和 docker-compose 均使用 ${NACOS_SERVER}，导致这两个服务在 Dev 环境无法正确连接 Nacos。
     已统一为 ${NACOS_SERVER:localhost:8848} 并补充 spring.application.name，与其他 5 个服务结构完全一致。
  
  3. 凭据验证：docker-compose.dev.yml 中所有 7 个 Java 服务的 Nacos 凭据已统一为
     username=agenthive / password=${NACOS_PASSWORD}，.env.dev 中 NACOS_PASSWORD=agenthive-secret-2024
     与 Nacos 容器的 NACOS_AUTH_IDENTITY_VALUE 一致。所有 application-docker.yml 中 discovery.enabled=true。

