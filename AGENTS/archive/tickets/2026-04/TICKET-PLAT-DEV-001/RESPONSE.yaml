learnings: >-
  cart-service 和 logistics-service 的 bootstrap.yml 使用了与其他服务不同的环境变量名（NACOS_HOST/NACOS_PORT
  vs NACOS_SERVER），这种细微差异在代码审查中极易被忽略，但会导致服务完全无法连接到 Nacos。
  建议建立 bootstrap.yml 模板化机制，所有 Java 服务共享同一份基础配置模板，通过 Kustomize 或 Maven
  资源过滤注入差异，避免同类漂移。

skill_candidate: true
skill_summary: >-
  Spring Cloud Nacos bootstrap.yml 标准化模板 + Gateway lb:// 路由范式。
  踩坑点：不同服务的 bootstrap.yml 若使用不同环境变量名（NACOS_HOST vs NACOS_SERVER），
  即使 docker-compose 中已注入正确值，服务仍会连接失败（回退到 localhost:8848）。
