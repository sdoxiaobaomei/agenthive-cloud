learnings: >-
  1. docker-compose.prod.yml 和 demo.yml 使用外部 Redis（ECS 172.24.146.165），
     无本地 Redis 容器，因此不需要修改卷映射；
  2. K8s 中 Deployment + PVC 适用于单副本 Redis，若未来需要高可用需迁移到
     StatefulSet 或云托管 Redis；
  3. AOF everysec + RDB 多频率快照是单实例 Redis 的最佳持久化组合，
     兼顾性能与数据安全；
  4. 云托管 Redis 的成本（¥168/月起）与自托管（¥2/月）差距显著，
     建议在业务成长期在迁移而非早期阶段。
