learnings: >-
  1. 现有自研 logger 已具备 JSON 输出、LOG_LEVEL 控制、trace_id/span_id 能力，
     在 pino 未实际安装时，优先增强现有基础设施而非强行引入依赖，符合"不引入新运行时依赖"约束。
  2. 脱敏需双层防护：字符串层面用正则拦截连接串、Token、API Key；
     对象层面用键名白名单兜底，防止 context 中嵌套对象的敏感字段泄露。
  3. index.ts 的启动 banner 原来直接打印多行文本，改造后收束为结构化 JSON 日志，
     虽损失了视觉 banner，但满足生产环境纯 JSON 的采集要求；如需 banner 可在 dev 模式下单独处理。
  4. 测试中发现 taskExecution.service 与 auth.middleware 存在 pre-existing 失败，
     与本次改动无关，但值得在后续 Ticket 中关注测试稳定性。
