summary: >-
  完成 apps/api 全量 console.* 替换为结构化日志，并在 logger.ts 中建立脱敏规则。
  由于 pino 实际未安装（约束禁止引入新运行时依赖），选择增强现有自研 logger：
  1. 将底层输出从 console.* 切换为 process.stdout/stderr.write，彻底消除生产路径 console 调用；
  2. 新增 sanitizeString / sanitizeValue 双层脱敏：字符串正则匹配（pg/redis 连接串、Bearer Token、sk-xxx API Key）+ 对象键名白名单（password/secret/token/api_key/jwt/auth/credential）；
  3. 保持现有 logger API（debug/info/warn/error/request）和 trace_id/span_id 注入不变；
  4. 全局替换 40+ 处 console.*，覆盖 index.ts、telemetry.ts、config/*、services/*、websocket/hub.ts、bin/task-consumer.ts。
