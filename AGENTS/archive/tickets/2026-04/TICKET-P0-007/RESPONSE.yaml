learnings: >-
  1. Spring Cloud Gateway 存在两套 CORS 机制：RoutePredicateHandlerMapping 处理 gateway route 的预检;
     WebFluxEndpointHandlerMapping 处理 actuator 端点，两者独立。必须同时配置 CorsWebFilter 才能覆盖 actuator。
  2. Spring Framework 6.1.15 CorsUtils.isSameOrigin() 在 URI 为相对路径时抛出 IllegalArgumentException，
     因为 URI.getScheme()/getHost() 返回 null。WebTestClient 默认发送相对 URI，导致测试中的 CORS 403。
  3. AbsoluteUriFilter（@Order(HIGHEST_PRECEDENCE)）将相对 URI 装饰为 http://localhost{path}，
     在 CORS 处理前注入绝对 URI，是绕过此 bug 的最小侵入方案。
  4. Spring CORS 预检响应中的 Access-Control-Allow-Headers 仅包含 Access-Control-Request-Headers 中请求的 header，
     而非全部 configured allowedHeaders。测试断言必须只检查请求的子集。
  5. actuator/health 作为本地端点，比代理下游的 /api/health 更适合 CORS 集成测试（避免依赖下游服务可用性）。
  6. 显式 allowedHeaders 列表需与前端 useApi.ts 中实际发送的 headers 对齐（Content-Type, Accept, Authorization, X-Query-Params）。
skill_candidate: true
skill_summary: "Spring WebFlux CORS 双机制覆盖方案：RoutePredicateHandlerMapping 仅覆盖 gateway route 预检，需额外配置 CorsWebFilter bean 覆盖 actuator 端点。相对 URI CORS 403 绕过：在 Ordered.HIGHEST_PRECEDENCE 的 WebFilter 中装饰请求 URI 为绝对路径，解决 CorsUtils.isSameOrigin() 的 NPE 陷阱。"
