learnings: >-
  1. Nuxt server/api 中多层嵌套路由的相对 import 路径容易出错：
     `server/api/code/files/*.ts` 到 `server/utils/` 是 `../../../`，不是 `../../../../`。
     两次犯同样错误，应在项目文档中记录 BFF 文件相对路径规则。
  2. VueUse 的 `useDebounceFn` 非常适合编辑器自动保存场景，1s 延迟既避免频繁
     请求，又给用户足够的反馈时间。
  3. 右键菜单使用 Teleport to body 避免被父容器的 overflow hidden 裁剪，同时
     overlay 层处理点击外部关闭，体验接近原生 context menu。
  4. 重命名已打开的文件时，需要同步更新 openedFiles 数组中的 path/name，否则
     Tab 会丢失关联。删除文件时同样需要关闭对应的 Tab。
  5. 自动保存失败不应阻塞编辑（仅 Toast 提示），这是 IDE 的基本体验要求。
