summary: >-
  实现了 Workspace 文件操作菜单与自动保存：新建 ContextMenu.vue 组件（自定义
  右键菜单，支持 New File/New Folder/Rename/Copy Path/Delete），集成到文件树
  节点右键交互。实现了自动保存（debounce 1s）和手动保存（Ctrl+S），保存状态
  通过 Tab 标题旁的 "●" 指示。同时新增了文件操作 BFF 路由（save.post.ts）和
  workspace store 的 saveFile action。重命名和删除操作会自动同步已打开的 Tab
  状态（关闭被删除文件的 Tab，更新被重命名文件的路径）。
