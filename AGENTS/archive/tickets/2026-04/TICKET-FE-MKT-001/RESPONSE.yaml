learnings: >-
  1. 商品卡片网格使用 CSS Grid + auto-fill 实现响应式，1280px+ 3-4 列，768px- 单列，
     无需媒体查询即可自适应。
  2. iframe sandbox="allow-scripts allow-same-origin" 是展示第三方演示的安全方式，
     防止恶意脚本影响父页面。
  3. mock 数据驱动开发是前端先行的有效策略：store 中内置 mockProducts 数组，
     后端 API 就绪后只需替换 fetch 逻辑，UI 层完全无需改动。
  4. 购买状态的 localStorage 持久化（purchasedProductIds）让用户刷新后仍能看到
     已购买标记，提升体验。
