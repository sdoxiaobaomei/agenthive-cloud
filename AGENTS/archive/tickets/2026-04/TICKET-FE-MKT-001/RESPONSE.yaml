  填充（6 个示例商品），购买流程对接 mock API，法币支付标记为"coming soon"。
  同时新建了 marketplace Pinia store（含分类/排序/搜索状态、购买记录持久化），
  并在 app layout 侧边栏增加了 Marketplace 入口。
