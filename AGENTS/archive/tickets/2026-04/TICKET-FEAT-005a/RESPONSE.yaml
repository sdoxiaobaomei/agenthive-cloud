learnings: >-
  1. 项目中已有历史类型错误（chat.vue 类型不匹配、vite plugin 缺少 vite 类型声明、
     auth register 响应类型不完整），需在后续统一清理。
  2. Options API 风格的 Pinia store 中 getters 若依赖其他 getters 容易产生冗余计算，
     建议在页面层用 computed 做组合过滤，store 保留基础状态即可。
  3. BFF 代理层 query 透传只需一行 `getQuery(event)` + `proxyToApi(..., { query })`，
     前后端契约变更时前端无需改动。
  4. 卡片悬停 overlay 配合 backdrop-filter 可实现优雅的 IDE 风格交互。
