learnings: >-
  1. 项目存在两处独立的明文 Secret 文件（base + demo-ask），扫描时不能仅检查 base 目录；
  2. ESO 的阿里云 KMS Provider 配置中，RRSA 是最小权限最佳实践，但需 ACK 预先开启 OIDC；
  3. 部署脚本（PowerShell/Bash）对 01-secrets.yaml 的硬编码引用需要同步清理，否则后续部署会失败；
  4. 文档中存在大量对旧 01-secrets.yaml 的引用（README、部署指南、架构文档等），需全局搜索替换。
