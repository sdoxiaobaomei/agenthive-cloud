summary: >-
  在 Java order-service 中完整实现了创作者中心后端 API。
  新增 14 个 Java 源文件，涵盖实体、枚举、VO、DTO、Mapper、Service、Controller 各层。
  核心接口：
  - POST /creator/products — 发布商品（支持 template/website/component 类型、credits+法币双定价、预览图、demoUrl、来源 project）
  - GET /creator/products — 我的商品列表（支持按 status 筛选）
  - PUT /creator/products/{id} — 编辑商品
  - PUT /creator/products/{id}/status — 上下架（ACTIVE/INACTIVE）
  - DELETE /creator/products/{id} — 删除商品
  - GET /creator/dashboard — 数据概览（在售数/总销量/总收益/本月收益）
  - GET /creator/earnings — 收益流水（日期范围筛选、分页）
  所有接口均基于 MyBatis Plus + Spring Boot Validation，返回统一 Result<T> 格式。
