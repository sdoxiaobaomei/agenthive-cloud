learnings: >-
  在现有 order-service 中扩展 creator 功能是最快落地的方式，但长期来看建议拆分为独立的 market-service，
  以遵循单一职责原则。当前实现中 CreatorController 使用 X-User-Id 请求头获取当前用户，
