summary: >-
  Comprehensive UI refactor of chat page layout, header, and sidebar completed.
  Key changes: (1) Removed horizontal divider from chat-header — no border-bottom.
  (2) Removed logo from main header entirely. (3) Created dedicated chat-header
  (48px height, narrower than previous 64px) with project name on left and
  Preview/Files/Editor tab buttons in center — inactive buttons are circular
  icon-only (32px), active buttons are elongated pills with icon+text. (4) Added
  collapse/expand toggle to chat-sidebar (ChatPanel sidebar). (5) Chat sidebar
  now syncs with other pages via redesigned left sidebar in layout — Marketplace
  link is visible and navigable. (6) Sidebar redesigned: Marketplace and Projects
  are top-level siblings; Projects section is below Marketplace and expandable;
  "My Projects" button replaces "View all projects"; Recents always visible;
  projects displayed as large icon avatars (40px) with names; Projects title
  removed from sidebar and moved to chat-header. (7) Removed project header
  section (return home / switch project buttons) from chat page — navigation
  now handled by sidebar. (8) User avatar moved to sidebar bottom footer
  alongside Home, Notifications, and Settings buttons.
