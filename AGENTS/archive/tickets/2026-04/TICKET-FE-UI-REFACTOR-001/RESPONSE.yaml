learnings: >-
  The tab-sync between layout and page is cleanly solved by extending the
  existing Pinia chat store with an activeTab field rather than introducing
  new provide/inject or URL state. This keeps the architecture domain-driven
  and avoids prop drilling. The sidebar collapse pattern (width transition +
  conditional content) works well with Tailwind and scoped CSS. For SSR safety,
  all window/document access is guarded inside onMounted hooks. A reusable
  pattern emerged: the circular-to-pill button transition for active states
  can be extracted as a composable or component in future tickets.
