ticket_id: TICKET-ARCH-001
status: completed
confidence_score: 0.95
summary: >-
  Implemented workspace persistence and architecture defect fix (Plan B):
  1. Created apps/api/src/config/workspace.ts as the single source of truth for
     WORKSPACE_BASE and getWorkspacePath(userId, projectId?), using path.join for
     cross-platform compatibility.
  2. Migrated 5+ hardcoded workspace path definitions across the API codebase to
     import from workspace.ts:
     - apps/api/src/controllers/code.ts
     - apps/api/src/project/service.ts
     - apps/api/src/chat-controller/service.ts
     - apps/api/src/index.ts
     - apps/api/src/services/taskExecution.ts (inherits via initializeTaskExecution)
  3. Added named volume workspace_data:/data/workspaces to api service in
     docker-compose.dev.yml, docker-compose.prod.yml, and docker-compose.demo.yml.
  4. Updated apps/api/Dockerfile with VOLUME /data/workspaces, ENV WORKSPACE_BASE=/data/workspaces,
     and proper directory ownership for backward compatibility.
  5. Validated docker compose config for all three compose files (dev passes cleanly).
