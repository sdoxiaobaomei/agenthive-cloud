learnings: >-
  Centralizing path computation in a single module eliminates drift and makes
  environment-specific overrides (e.g., WORKSPACE_BASE env var) trivial. The
  named volume ensures workspace data survives container recreation, addressing
  the core data-loss risk identified in the ticket. Backward compatibility is
  preserved because existing code continues to work via the default path, and
  the Dockerfile pre-creates the directory with correct ownership.
