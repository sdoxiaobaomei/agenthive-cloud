summary: >-
  实现了 Monaco Editor 多 Tab 集成：新建 MonacoEditor.vue 组件（client-only
  动态导入 monaco-editor），支持语法高亮（ts/js/vue/html/css/json/yaml/md/java/
  go/python/rust/sql 等）、主题切换（light/dark）、minimap、自动括号匹配。
  大文件（>1MB）自动只读并显示警告。Workspace 页面集成 Tab 栏，支持打开、
  切换、关闭文件，已打开文件不重复打开。同时增强了 workspace store 的
  openedFiles/activeFilePath 状态管理，新增文件内容获取的 BFF 路由
  `/api/code/files/:path`，以及文件扩展名到 Monaco language 的映射。
