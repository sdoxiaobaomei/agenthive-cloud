learnings: >-
  1. `@monaco-editor/vue` 包不存在于 npm registry（404），直接使用 `monaco-editor`
     配合 `await import('monaco-editor')` 动态导入是更可靠的方式。
  2. Nuxt 文件路由中 catch-all 路由 `[...path].get.ts` 的相对 import 路径容易出错：
     `server/api/code/files/` 到 `server/utils/` 是 `../../../` 而非 `../../../../`。
  3. Monaco Editor 的 `onUnmounted` 中必须调用 `editor.dispose()` 释放内存，否则
     Tab 切换时会导致内存泄漏。大文件检测用 `new Blob([content]).size` 即可。
  4. `v-model` 与 Monaco 的双向绑定需要小心处理：外部 setValue 不应触发
     onDidChangeModelContent 导致的循环更新。当前实现通过 `editor.getValue() !== newVal`
     判断避免循环。
  5. Vue 文件在 Monaco 中没有内置语法高亮，fallback 到 `html` 是合理折中。
