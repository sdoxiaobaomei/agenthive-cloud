summary: >-
  完成了网站托管与流量统计基础设施。新增 hosted_website 和 traffic_record 表，
  实现子域名自动分配（project-slug + random4.agenthive.app）、自定义域名绑定、
  部署配置管理、流量上报（PV/UV 按天聚合）。流量防刷使用 Redis：
  同一 IP 1 小时内只计 1 次 UV（key: traffic:uv:{website}:{date}:{ip}），
  同一 session 10 分钟内只计 1 次 PV（key: traffic:pv:{website}:{sessionId}）。
  流量数据采用先查后插/更新的并发安全策略。9 个单元测试全部通过（仅 HostedWebsiteServiceImplTest）。
