blockers: []
learnings: >-
  1. 子域名分配需要处理冲突和非法字符。slug 生成使用正则替换非字母数字为空格再合并，
     冲突时通过 SecureRandom 生成 4 位后缀重试，10 次失败后回退到时间戳兜底。
  2. Redis 是流量防刷的最佳载体：setIfAbsent 原子操作天然适合 "首次计数" 场景，
     配合 TTL 自动过期无需清理。UV 和 PV 使用不同的 key 结构和过期时间。
  3. 流量数据的高并发写入需要特殊处理。当前采用 "先查后插/更新" + try-catch 冲突回退策略，
     在轻量场景足够。高并发下应考虑 PostgreSQL upsert（INSERT ON CONFLICT DO UPDATE）
     或 Redis 计数 + 定时任务刷盘。
  4. traffic_record 按天聚合的设计平衡了查询性能和存储成本。后续如需按小时分析，
     可增加 traffic_record_hourly 扩展表，不影响现有结构。
  5. deploy_config 使用 JSON 字符串存储，灵活适配不同部署目标（Docker/K8s/Serverless）。
     生产环境应校验 JSON 格式并限制字段白名单，防止注入。
