learnings: >-
  1. nginx upstream 主机名必须与 docker-compose 服务名严格一致（java-gateway → gateway-service）。
  2. Dev 环境应使用独立的 nginx 配置（HTTP only），避免加载生产 SSL 证书导致启动失败。
  3. 新增 required 环境变量时，必须同步更新 .env.dev 和 docker-compose.dev.yml。
  4. Postgres init 脚本 /docker-entrypoint-initdb.d/ 只在数据目录为空时执行，现有运行环境需手动初始化。
  5. WITHDRAWAL_ENCRYPT_KEY 必须为 32 字符以满足 AES-256 要求。
skill_candidate: true
skill_summary: >-
  Dev 环境部署故障排查模式：1) docker compose 服务名一致性检查（nginx upstream vs docker-compose service name）；2) 环境变量缺失扫描（对比 Java @Value required 字段与 .env.dev / docker-compose.dev.yml）；3) Postgres schema 初始化挂载最佳实践（合并多服务 schema 到单一 init 脚本，注意数据目录为空时才自动执行）。
