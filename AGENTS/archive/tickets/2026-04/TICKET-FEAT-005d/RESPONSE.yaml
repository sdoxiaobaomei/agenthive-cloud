learnings: >-
  1. 删除项目的二次确认要求输入完整项目名称是防止误操作的极佳实践，比单纯的
     确认弹窗更安全。ElMessageBox.prompt 配合 inputValidator 可实现。
  2. 角色权限矩阵需要在前端提前拦截：owner > admin > member > viewer，每个
     层级只能操作下级角色。当前用 computed 属性（isOwner/isAdmin/canChangeRole/
     canRemoveMember）实现，清晰可维护。
  3. 成员表格中的角色下拉直接绑定 row.role 并监听 @change 存在风险：API 失败
     时 UI 已变更。当前通过 catch 后重新 fetchMembers 恢复状态，更 robust 的
     方式是先调 API 成功后更新本地状态。
  4. 危险操作区域使用红色边框+浅红背景（border-color: #fecaca; background:
     #fef2f2）在视觉上有效警示用户，GitHub/GitLab 均采用此模式。
