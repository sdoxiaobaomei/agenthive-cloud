summary: >-
  实现了 /projects/:id/settings 项目设置页：基本信息编辑（名称/描述，即时保存）、
  成员管理卡片（成员列表表格、角色下拉修改、邀请成员弹窗、移除成员确认）、
  危险操作卡片（归档项目确认弹窗、删除项目二次确认需输入完整项目名称）。
  权限控制完善：非 owner/admin 隐藏成员管理和危险操作；owner 可改任何角色，
  admin 只能改 member/viewer；移除权限按角色层级控制。删除操作成功后跳转
  /projects，归档后项目变为只读状态。
