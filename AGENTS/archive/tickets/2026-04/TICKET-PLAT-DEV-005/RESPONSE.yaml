learnings: >-
  Adding the compose-config pre-flight check catches missing environment variables
  before any runtime health checks, giving developers a fast fail with a clear fix
  command. The Nacos per-service registration check is more reliable than a single
  API health call because it validates actual service discovery, which is the
  common root cause of gateway 502 errors in this stack.
