summary: >-
  Enhanced scripts/health-check-dev.sh and scripts/health-check-dev.ps1 to cover
  all acceptance criteria from the updated ticket requirements:
  1. Container checks expanded to 14 services by adding nginx (agenthive-nginx-dev).
  2. Added .env.dev / Compose Config validation: runs
     `docker compose config` and counts "variable is not set" warnings.
  3. Enhanced Nacos Service Registry checks: after verifying the Nacos API is
     reachable, the script queries each of the 7 Java services
     (gateway-service, auth-service, user-service, payment-service, order-service,
     cart-service, logistics-service) to confirm they are registered.
  4. Added API /me endpoint check alongside the existing /api/health check.
  5. Both bash and PowerShell versions validated for syntax correctness.
