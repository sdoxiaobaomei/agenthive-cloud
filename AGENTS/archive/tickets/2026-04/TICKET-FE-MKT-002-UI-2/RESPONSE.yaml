summary: >-
  创作者中心商品管理页（/creator/products）和发布商品页（/creator/products/new）已完成。
  
  /creator/products 页面包含：
  - 商品列表表格（名称/类型/价格/状态/销量/评分/操作），使用 DataTable 组件
  - 状态筛选（全部/上架中/已下架），使用 ElRadioGroup
  - 操作按钮：编辑（mock 提示）、下架/上架（带 ConfirmDialog 确认）、删除（带 ConfirmDialog 确认）
  - 商品缩略图展示，行点击跳转至 marketplace 详情页
  
  /creator/products/new 页面包含：
  - ProductForm 组件：名称（2-50字必填）、描述（10-2000字必填，支持 Markdown 预览）
  - 类型选择：Template / Website / Component / Plugin
  - 技术栈标签输入（Enter 添加，最多 10 个，可删除）
  - Credits 价格（必填，>0）、法币价格（可选）
  - 预览图上传：最多 5 张，2MB/张限制，本地 FileReader 预览，拖拽排序
  - 演示 URL 输入（可选）
  - 商品来源选择：从 mock project 列表中选择
  - 表单校验完成后发布，成功后跳转至 marketplace 详情页
  
  移除了冲突的 pages/creator/products/index.vue 文件，避免与 pages/creator/products.vue 路由冲突。
