learnings: >-
  1. Element Plus Upload 组件配合 auto-upload=false 和 on-change 可实现纯本地预览，无需后端上传接口。
  2. 拖拽排序通过 HTML5 drag API 实现，无需额外库。
  3. Markdown 预览使用 composable 封装渲染逻辑，组件层只需调用 render() 方法。
  4. 表单数据通过 v-model + reactive + watch 双向同步，避免 prop drilling。
  5. Nuxt 路由中同时存在 products.vue 和 products/index.vue 会导致冲突，应只保留其一。
