learnings: >-
  Spring Boot relaxed binding means many SPRING_* env vars are consumed directly
  by the framework even when not referenced in application.yml via ${...}.
  The script differentiates between "unused injection" (no app config reference)
  and "runtime injection" (consumed by JVM/framework directly) to reduce noise
  while still catching real mismatches like NACOS_SERVER vs NACOS_HOST.

  For Node/TS services, scanning only process.env.XXX (not ${VAR} template literals)
  avoids false positives from JS string interpolation. Heuristics for default
  detection (||, if-conditions, comparisons) keep the optional/required split
  practical without requiring full AST parsing.
