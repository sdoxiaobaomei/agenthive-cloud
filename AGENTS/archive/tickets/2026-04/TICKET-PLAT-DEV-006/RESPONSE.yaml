summary: >-
  Created scripts/config-consistency-check.py to automate alignment checks
  between docker-compose.dev.yml environment variables and all application
  configuration files (application-docker.yml, bootstrap.yml, Node API source).

  The script:
  - Parses docker-compose.dev.yml per service to extract injected env vars
  - Parses all Java service application-docker.yml + bootstrap.yml for ${VAR} refs
  - Scans Node API / Landing TypeScript sources for process.env.XXX refs
  - Detects unused injections, missing required injections, missing optional injections,
    and variable name mismatches
  - Validates .env.dev.example coverage for all required variables
  - Outputs a structured report to stdout and scripts/config-consistency-report.txt
  - Returns exit codes: 0=all aligned, 1=warnings, 2=errors (CI-friendly)

  Key real-world inconsistencies discovered on first run:
  - cart-service & logistics-service bootstrap.yml expect NACOS_HOST/NACOS_PORT
    but docker-compose injects NACOS_SERVER
  - NACOS_NAMESPACE is missing from docker-compose for 6/7 Java services
  - auth-service application-docker.yml references 15+ ALIYUN_SMS_* variables
    but docker-compose only injects ALIYUN_SMS_ENABLED
  - JWT_SECRET is injected into api service but not consumed by current TS source
  - 5 required variables missing from .env.dev.example

