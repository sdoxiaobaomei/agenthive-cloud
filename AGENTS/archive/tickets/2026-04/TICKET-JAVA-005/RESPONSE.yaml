skill_summary: "Agent task billing with configurable PER_TASK/PER_TOKEN pricing, taskId idempotency, and internal API token validation."
blockers: []
learnings: >-
  1. 内部 API 鉴权应分层实现：Gateway 路由白名单（网络层）+ X-Internal-Token（应用层）。
     当前实现了应用层校验，Gateway 层白名单需后续补充。
  2. 幂等性设计：taskId 作为业务唯一键，在扣费前检查 credits_transaction 是否已存在
     source_type=AGENT_TASK + source_id=taskId 的记录，简单有效且天然可审计。
  3. PER_TOKEN 定价需要 Node 侧上报准确的 tokensUsed，否则无法计费。建议在 Node 侧
     增加 token 计数埋点，确保数据准确性。
  4. 余额不足时返回业务错误码（INSUFFICIENT_CREDITS）而非抛异常，让调用方（Node）
     可以优雅处理（如提示用户充值或降级到免费模型）。
  5. 启动初始化器（CommandLineRunner）适合插入默认定价等配置数据，但生产环境应考虑
     使用 Flyway/Liquibase 的 seed data 机制，避免多次启动重复插入。
