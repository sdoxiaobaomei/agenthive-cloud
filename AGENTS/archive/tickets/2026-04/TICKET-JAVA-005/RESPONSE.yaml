summary: >-
  完成了 Agent 额度计费 API 的完整实现。包含 AgentQuotaConfig 定价配置表、
  PER_TASK/PER_TOKEN 两种定价模式、POST /credits/agent-debit 扣费接口、
  GET /credits/agent-pricing 定价查询、GET /credits/agent-usage 使用统计。
  实现了 taskId 幂等性（重复调用不扣费）、X-Internal-Token 内部鉴权、
  余额不足时返回 INSUFFICIENT_CREDITS 错误码。默认定价在应用启动时自动初始化
  （frontend-dev 10credits, backend-dev 15credits, qa-engineer 5credits）。
  新增 9 个 Mockito 单元测试全部通过。
