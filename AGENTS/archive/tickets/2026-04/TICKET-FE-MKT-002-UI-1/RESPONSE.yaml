learnings: >-
  1. Mock 数据层使用 interface + composable 模式，后端 API 就绪时只需替换实现文件。
  2. useMockApi.ts 集中定义了 useMockCredits 和 useMockCreator，通过单独文件 re-export 避免 auto-import 冲突。
  3. DataCard/DataTable/TrendChart 等通用组件已具备良好的暗色模式和响应式支持。
  4. 创作者中心的非卖家引导页使用 mock 权限切换（MOCK_IS_SELLER），便于测试两种状态。
skill_candidate:
  - pattern: Mock API Composable with Interface Contract
    description: 使用 interface 定义 API 契约，mock composable 实现该契约，后端就绪时无痛替换
  - pattern: Dual-State Page (Seller vs Non-Seller)
    description: 同一页面根据权限状态渲染不同内容（仪表盘 vs 引导页）
