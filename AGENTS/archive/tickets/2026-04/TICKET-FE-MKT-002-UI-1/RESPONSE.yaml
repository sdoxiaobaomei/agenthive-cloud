summary: >-
  创作者中心首页（/creator）和收益明细页（/creator/earnings）已完成。
  
  /creator 页面包含：
  - 4 个数据概览卡片（在售商品数/总销量/总收益/本月收益），使用 DataCard 组件
  - 收益趋势图（近 30 天），使用 TrendChart 组件，支持 7D/30D/90D 切换
  - 最近 5 条销售记录列表，使用 DataTable 组件，展示商品/买家/售价/净收益/时间
  - 非卖家角色引导页："成为创作者"按钮 + 平台优势说明（80%分成/全球触达/自动交付）
  
  /creator/earnings 页面包含：
  - 销售流水完整列表（时间/商品/买家/售价/平台抽成/实得），使用 DataTable
  - 日期范围筛选（近 7 天/30 天/90 天/自定义），支持日期选择器
  - 导出 CSV 按钮，mock 生成并下载 CSV 文件
  - 汇总卡片（总收益/平台手续费/净收益）
  
  所有数据使用 mock 数据（30 条销售记录、6 个在售商品），暗色模式通过 .dark class 支持。
