# ==========================================
# AgentHive Cloud - Skaffold Configuration
# For rapid local development on Kubernetes
# ==========================================

apiVersion: skaffold/v4beta7
kind: Config

metadata:
  name: agenthive-cloud

# Build configuration
build:
  # Use local Docker daemon (Docker Desktop)
  local:
    push: false
    useDockerCLI: true
    useBuildkit: true
  
  artifacts:
    # Supervisor API
    - image: agenthive/supervisor
      context: apps/supervisor
      docker:
        dockerfile: Dockerfile
        target: development
        buildArgs:
          CGO_ENABLED: "0"
      sync:
        manual:
          # Sync Go source files for hot reload
          - src: "**/*.go"
            dest: /app
          - src: "go.mod"
            dest: /app
          - src: "go.sum"
            dest: /app
          - src: ".air.toml"
            dest: /app
    
    # Web Frontend
    - image: agenthive/web
      context: apps/web
      docker:
        dockerfile: Dockerfile
        target: development
      sync:
        manual:
          # Sync source files for hot reload
          - src: "src/**/*"
            dest: /app/src
          - src: "public/**/*"
            dest: /app/public
          - src: "index.html"
            dest: /app
          - src: "vite.config.ts"
            dest: /app

# Deploy configuration
deploy:
  kubectl:
    manifests:
      - k8s/local/*.yaml
    defaultNamespace: agenthive-local
    flags:
      apply:
        - --prune

# Port forwarding for local access
portForward:
  - resourceType: service
    resourceName: web
    namespace: agenthive-local
    port: 80
    localPort: 8080
  
  - resourceType: service
    resourceName: supervisor
    namespace: agenthive-local
    port: 8080
    localPort: 8081

# Profiles for different environments
profiles:
  # Production-like profile (single build, no sync)
  - name: production
    build:
      local:
        push: false
      artifacts:
        - image: agenthive/supervisor
          context: apps/supervisor
          docker:
            dockerfile: Dockerfile
            target: production
        - image: agenthive/web
          context: apps/web
          docker:
            dockerfile: Dockerfile
            target: production
    deploy:
      kubectl:
        manifests:
          - k8s/local/*.yaml
        defaultNamespace: agenthive-local

  # Debug profile with delve for Go
  - name: debug
    build:
      artifacts:
        - image: agenthive/supervisor
          context: apps/supervisor
          docker:
            dockerfile: Dockerfile
            target: development
    deploy:
      kubectl:
        manifests:
          - k8s/local/*.yaml
        defaultNamespace: agenthive-local

# Status check configuration
statusCheck:
  enabled: true
  deadlineSeconds: 300

# Log configuration
logs:
  prefix: container
  jsonParse: false
