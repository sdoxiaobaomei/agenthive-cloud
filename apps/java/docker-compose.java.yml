version: "3.8"

services:
  nacos:
    image: nacos/nacos-server:v2.3.0
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=postgresql
      - NACOS_AUTH_ENABLE=false

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: agenthive
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - ./auth-service/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: agenthive
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - ./user-service/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres-business:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: agenthive
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - ./init-business.sql:/docker-entrypoint-initdb.d/init-business.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    environment:
      - NACOS_SERVER=nacos:8848
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=agenthive-jwt-secret-2024
    depends_on:
      - nacos
      - redis

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - NACOS_SERVER=nacos:8848
      - DB_HOST=postgres-auth
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=agenthive-jwt-secret-2024
    depends_on:
      - nacos
      - postgres-auth
      - redis

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    environment:
      - NACOS_SERVER=nacos:8848
      - DB_HOST=postgres-user
      - DB_PORT=5432
      - DB_NAME=user_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - nacos
      - postgres-user
      - redis

  payment-service:
    build: ./payment-service
    ports:
      - "8083:8083"
    environment:
      - NACOS_SERVER=nacos:8848
      - DB_HOST=postgres-business
      - DB_PORT=5432
      - DB_NAME=payment_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - nacos
      - postgres-business
      - redis

  order-service:
    build: ./order-service
    ports:
      - "8084:8084"
    environment:
      - NACOS_SERVER=nacos:8848
      - DB_HOST=postgres-business
      - DB_PORT=5432
      - DB_NAME=order_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - nacos
      - postgres-business
      - redis

  cart-service:
    build: ./cart-service
    ports:
      - "8085:8085"
    environment:
      - NACOS_SERVER=nacos:8848
      - DB_HOST=postgres-business
      - DB_PORT=5432
      - DB_NAME=cart_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - nacos
      - postgres-business
      - redis

  logistics-service:
    build: ./logistics-service
    ports:
      - "8086:8086"
    environment:
      - NACOS_SERVER=nacos:8848
      - DB_HOST=postgres-business
      - DB_PORT=5432
      - DB_NAME=logistics_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - nacos
      - postgres-business
      - redis
