server:
  port: 8083

spring:
  application:
    name: payment-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5
  cloud:
    nacos:
      config:
        enabled: true
        import-check:
          enabled: false
      discovery:
        enabled: true

order-service:
  url: http://order-service:8084

logging:
  level:
    root: WARN
    com.agenthive.payment: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
