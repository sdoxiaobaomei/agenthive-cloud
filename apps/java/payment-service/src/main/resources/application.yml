server:
  port: 8083

spring:
  application:
    name: payment-service
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_db}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2
          max-interval: 10000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-enums-package: com.agenthive.payment.domain.enums

internal:
  api:
    token: ${INTERNAL_API_TOKEN}

platform:
  fee:
    rate: ${PLATFORM_FEE_RATE:0.20}

withdrawal:
  fee:
    rate: ${WITHDRAWAL_FEE_RATE:0.10}
  min:
    amount: ${WITHDRAWAL_MIN_AMOUNT:100}
  max:
    daily:
      count: ${WITHDRAWAL_MAX_DAILY_COUNT:3}
      amount: ${WITHDRAWAL_MAX_DAILY_AMOUNT:10000}
  auto:
    approve:
      threshold: ${WITHDRAWAL_AUTO_APPROVE_THRESHOLD:5000}
  encrypt:
    key: ${WITHDRAWAL_ENCRYPT_KEY}

logging:
  level:
    com.agenthive.payment.mapper: debug

---
spring:
  config:
    activate:
      on-profile: dev

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
