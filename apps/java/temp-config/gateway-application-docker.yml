server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: http://agenthive-auth:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://agenthive-auth:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://agenthive-payment:8083
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://agenthive-order:8084
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: cart-service
          uri: http://agenthive-cart:8085
          predicates:
            - Path=/api/carts/**
          filters:
            - StripPrefix=1
        - id: logistics-service
          uri: http://agenthive-logistics:8086
          predicates:
            - Path=/api/logistics/**
          filters:
            - StripPrefix=1
  redis:
    host: ${REDIS_HOST:agenthive-redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:agenthive-default-secret-key-2024-change-in-production}

logging:
  level:
    org.springframework.cloud.gateway: debug
