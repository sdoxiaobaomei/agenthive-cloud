server:
  port: 8082

spring:
  application:
    name: user-service
  data:
    redis:
      host: agenthive-redis
      port: 6379
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
    openfeign:
      client:
        config:
          auth-service:
            url: http://agenthive-auth:8081
