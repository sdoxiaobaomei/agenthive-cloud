server:
  port: 8082

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5435/user_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD}
