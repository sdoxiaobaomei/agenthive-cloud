server:
  port: 8080

spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin, RETAIN_UNIQUE
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: auth-service-users
          uri: lb://auth-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/carts/**
          filters:
            - StripPrefix=1
        - id: logistics-service
          uri: lb://logistics-service
          predicates:
            - Path=/api/logistics/**
          filters:
            - StripPrefix=1
        - id: api-service
          uri: ${API_SERVICE_URL:http://localhost:3001}
          predicates:
            - Path=/api/agents/**,/api/tasks/**,/api/code/**,/api/projects/**,/api/chat/**,/api/demo/**,/api/health
          filters:
            - StripPrefix=0

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /auth/v3/api-docs
      - name: payment-service
        url: /payments/v3/api-docs
      - name: order-service
        url: /orders/v3/api-docs
      - name: cart-service
        url: /carts/v3/api-docs
      - name: logistics-service
        url: /logistics/v3/api-docs
    use-root-path: true

logging:
  level:
    org.springframework.cloud.gateway: debug
