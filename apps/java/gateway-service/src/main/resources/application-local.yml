server:
  port: 8080

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    gateway:
      # CORS configuration is externalized to K8s ConfigMap.
      # See k8s/base/gateway-cors-config.yaml and overlay-specific patches.
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: api-service
          uri: http://localhost:3001
          predicates:
            - Path=/api/agents/**,/api/tasks/**,/api/code/**,/api/projects/**,/api/chat/**,/api/demo/**,/api/health
          filters:
            - StripPrefix=0
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
