server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
    gateway:
      httpclient:
        resolver:
          native: true
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://order-service:8084
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: cart-service
          uri: http://cart-service:8085
          predicates:
            - Path=/api/carts/**
          filters:
            - StripPrefix=1
        - id: logistics-service
          uri: http://logistics-service:8086
          predicates:
            - Path=/api/logistics/**
          filters:
            - StripPrefix=1
        # Node API fallback — Gateway 认证后路由到 Node.js 服务
        - id: node-api
          uri: http://api:3001
          predicates:
            - Path=/api/**
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
