spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://agenthive.cloud"
              - "https://app.agenthive.cloud"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Accept
              - Authorization
              - X-Query-Params
              - X-Requested-With
              - X-User-Id
              - X-User-Name
              - X-User-Role
            allowCredentials: true
            maxAge: 3600
