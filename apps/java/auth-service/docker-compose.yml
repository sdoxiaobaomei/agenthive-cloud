version: "3.8"

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: 1.0.0-SNAPSHOT
    image: agenthive/auth-service:latest
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      # Spring Profile
      - SPRING_PROFILES_ACTIVE=docker

      # Database（宿主机容器，端口 5433）
      - DB_NAME=auth_db
      - DB_USER=agenthive
      - DB_PASSWORD=secret

      # Redis（宿主机容器，默认 6379）
      - REDIS_PASSWORD=

      # JWT
      - JWT_SECRET=change-me-in-production-docker-secret-key-2024

      # 阿里云 SMS 凭证（Docker 环境不走 OIDC，通过环境变量注入）
      # 推荐：使用 STS 临时凭证（需定期刷新）
      # ALIBABA_CLOUD_ACCESS_KEY_ID=你的临时AccessKeyId
      # ALIBABA_CLOUD_ACCESS_KEY_SECRET=你的临时AccessKeySecret
      # ALIBABA_CLOUD_SECURITY_TOKEN=你的SecurityToken
      #
      # 或：长期 AccessKey（仅本地开发，生产不推荐）
      # ALIBABA_CLOUD_ACCESS_KEY_ID=你的AccessKeyId
      # ALIBABA_CLOUD_ACCESS_KEY_SECRET=你的AccessKeySecret
      -
        ALIBABA_CLOUD_ACCESS_KEY_ID=${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      -
        ALIBABA_CLOUD_ACCESS_KEY_SECRET=${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      -
        ALIBABA_CLOUD_SECURITY_TOKEN=${ALIBABA_CLOUD_SECURITY_TOKEN:-}

      # SMS 配置
      - ALIYUN_SMS_ENABLED=true
      - ALIYUN_SMS_DEFAULT_SIGN_NAME=云渚科技验证平台

      # JVM 参数
      - JAVA_OPTS=-Xms256m -Xmx512m
    extra_hosts:
      # Linux 环境下 host.docker.internal 需要显式映射
      - "host.docker.internal:host-gateway"
    networks:
      - agenthive

networks:
  agenthive:
    driver: bridge
