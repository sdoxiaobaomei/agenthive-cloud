server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:agenthive}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

logging:
  level:
    com.agenthive.auth.mapper: debug

---
spring:
  config:
    activate:
      on-profile: dev

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
    default-sign-name: ${ALIYUN_SMS_DEFAULT_SIGN_NAME:云渚科技验证平台}
    code-expire-minutes: ${ALIYUN_SMS_CODE_EXPIRE_MINUTES:5}
    daily-limit: ${ALIYUN_SMS_DAILY_LIMIT:10}
    interval-seconds: ${ALIYUN_SMS_INTERVAL_SECONDS:60}

jwt:
  secret: ${JWT_SECRET:agenthive-default-secret-key-2024-change-in-production}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
