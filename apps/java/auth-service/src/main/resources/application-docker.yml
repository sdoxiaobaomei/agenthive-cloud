server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-auth}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:agenthive}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      # 通过 host.docker.internal 访问宿主机上的 Redis 容器
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  cloud:
    nacos:
      config:
        import-check:
          enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

aliyun:
  sms:
    enabled: ${ALIYUN_SMS_ENABLED:true}
    region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
    default-sign-name: ${ALIYUN_SMS_DEFAULT_SIGN_NAME:云渚科技验证平台}
    code-expire-minutes: ${ALIYUN_SMS_CODE_EXPIRE_MINUTES:5}
    daily-limit: ${ALIYUN_SMS_DAILY_LIMIT:10}
    interval-seconds: ${ALIYUN_SMS_INTERVAL_SECONDS:60}
    # Docker 环境下默认关闭 OIDC（需 K8s），通过环境变量注入 STS/AccessKey
    oidc-enabled: ${ALIYUN_SMS_OIDC_ENABLED:false}
    oidc-role-arn: ${ALIYUN_SMS_OIDC_ROLE_ARN:}
    oidc-provider-arn: ${ALIYUN_SMS_OIDC_PROVIDER_ARN:}
    oidc-token-file-path: ${ALIYUN_SMS_OIDC_TOKEN_FILE:/var/run/secrets/tokens/aliyun-token}
    oidc-role-session-name: ${ALIYUN_SMS_OIDC_ROLE_SESSION_NAME:auth-service-sms}

jwt:
  secret: ${JWT_SECRET:agenthive-default-secret-key-2024-change-in-production}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
