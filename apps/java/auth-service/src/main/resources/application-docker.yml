server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-auth}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER:agenthive}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      # 閫氳繃 host.docker.internal 璁块棶瀹夸富鏈轰笂鐨?Redis 瀹瑰櫒
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  cloud:
    nacos:
      config:
        import-check:
          enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

aliyun:
  sms:
    enabled: ${ALIYUN_SMS_ENABLED:false}
    region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
    default-sign-name: ${ALIYUN_SMS_DEFAULT_SIGN_NAME:浜戞笟绉戞妧楠岃瘉骞冲彴}
    code-expire-minutes: ${ALIYUN_SMS_CODE_EXPIRE_MINUTES:5}
    daily-limit: ${ALIYUN_SMS_DAILY_LIMIT:10}
    interval-seconds: ${ALIYUN_SMS_INTERVAL_SECONDS:60}
    # 鐭俊妯℃澘 CODE锛堜粠闃块噷浜戞帶鍒跺彴 鈫?鐭俊鏈嶅姟 鈫?妯℃澘绠＄悊 鑾峰彇锛?    template-code-login-register: ${ALIYUN_SMS_TEMPLATE_CODE_LOGIN_REGISTER:100001}
    template-code-modify-phone: ${ALIYUN_SMS_TEMPLATE_CODE_MODIFY_PHONE:100002}
    template-code-reset-password: ${ALIYUN_SMS_TEMPLATE_CODE_RESET_PASSWORD:100003}
    template-code-bind-phone: ${ALIYUN_SMS_TEMPLATE_CODE_BIND_PHONE:100004}
    template-code-verify-phone: ${ALIYUN_SMS_TEMPLATE_CODE_VERIFY_PHONE:100005}
    # Docker 鐜涓嬮粯璁ゅ叧闂?OIDC锛堥渶 K8s锛夛紝閫氳繃鐜鍙橀噺娉ㄥ叆 STS/AccessKey
    oidc-enabled: ${ALIYUN_SMS_OIDC_ENABLED:false}
    oidc-role-arn: ${ALIYUN_SMS_OIDC_ROLE_ARN:}
    oidc-provider-arn: ${ALIYUN_SMS_OIDC_PROVIDER_ARN:}
    oidc-token-file-path: ${ALIYUN_SMS_OIDC_TOKEN_FILE:/var/run/secrets/tokens/aliyun-token}
    oidc-role-session-name: ${ALIYUN_SMS_OIDC_ROLE_SESSION_NAME:auth-service-sms}

jwt:
  secret: ${JWT_SECRET:agenthive-default-secret-key-2024-change-in-production}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
