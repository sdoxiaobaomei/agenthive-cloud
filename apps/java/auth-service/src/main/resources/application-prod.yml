server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5
  cloud:
    nacos:
      config:
        enabled: true
        import-check:
          enabled: false
      discovery:
        enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

aliyun:
  sms:
    enabled: ${ALIYUN_SMS_ENABLED:false}
    region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
    default-sign-name: ${ALIYUN_SMS_DEFAULT_SIGN_NAME}
    code-expire-minutes: ${ALIYUN_SMS_CODE_EXPIRE_MINUTES:5}
    daily-limit: ${ALIYUN_SMS_DAILY_LIMIT:10}
    interval-seconds: ${ALIYUN_SMS_INTERVAL_SECONDS:60}
    template-code-login-register: ${ALIYUN_SMS_TEMPLATE_CODE_LOGIN_REGISTER}
    template-code-modify-phone: ${ALIYUN_SMS_TEMPLATE_CODE_MODIFY_PHONE}
    template-code-reset-password: ${ALIYUN_SMS_TEMPLATE_CODE_RESET_PASSWORD}
    template-code-bind-phone: ${ALIYUN_SMS_TEMPLATE_CODE_BIND_PHONE}
    template-code-verify-phone: ${ALIYUN_SMS_TEMPLATE_CODE_VERIFY_PHONE}
    oidc-enabled: ${ALIYUN_SMS_OIDC_ENABLED:false}
    oidc-role-arn: ${ALIYUN_SMS_OIDC_ROLE_ARN}
    oidc-provider-arn: ${ALIYUN_SMS_OIDC_PROVIDER_ARN}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

logging:
  level:
    root: WARN
    com.agenthive.auth: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
