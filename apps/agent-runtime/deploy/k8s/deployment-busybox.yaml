apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: agenthive
  labels:
    app: agenthive
    component: agent-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agenthive
      component: agent-runtime
  template:
    metadata:
      labels:
        app: agenthive
        component: agent-runtime
    spec:
      containers:
        - name: agent-runtime
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[INFO] Starting Agent Runtime (Busybox mode)..."
              mkdir -p /workspace
              AGENT_ID="${AGENT_ID:-$(hostname)}"
              echo "[INFO] Agent ID: $AGENT_ID"
              echo "[INFO] Agent Name: $AGENT_NAME"
              
              # Health check responder
              while true; do
                { echo -e "HTTP/1.1 200 OK\r\nContent-Type: application/json\r\nConnection: close\r\n\r\n{\"status\":\"healthy\",\"agentId\":\"$AGENT_ID\",\"agentName\":\"$AGENT_NAME\",\"timestamp\":\"$(date -Iseconds)\"}"; } | nc -l -p 8080 &
                echo "[INFO] 💓 Heartbeat - Agent $AGENT_ID is running"
                sleep 30
              done
          env:
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: "Docker Desktop Agent"
            - name: AGENT_ROLE
              value: "custom"
          ports:
            - containerPort: 8080
              name: health
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "16Mi"
              cpu: "5m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
      volumes:
        - name: workspace
          emptyDir: {}
      restartPolicy: Always
