apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: agenthive
  labels:
    app: agenthive
    component: agent-runtime
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: health
  selector:
    app: agenthive
    component: agent-runtime
---
# NodePort service for external access
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime-nodeport
  namespace: agenthive
  labels:
    app: agenthive
    component: agent-runtime
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      name: health
  selector:
    app: agenthive
    component: agent-runtime
