apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: agenthive
  labels:
    app: agenthive
    component: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenthive
      component: ollama
  template:
    metadata:
      labels:
        app: agenthive
        component: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Start ollama server in background
              echo "Starting Ollama server..."
              ollama serve &
              SERVER_PID=$!
              
              # Wait for server to be ready
              echo "Waiting for Ollama server to be ready..."
              until wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1; do
                echo "Waiting..."
                sleep 2
              done
              echo "Ollama server is ready!"
              
              # Pull models if not exists
              echo "Checking for models..."
              if ! ollama list | grep -q "llama3.2"; then
                echo "Pulling llama3.2:1b..."
                ollama pull llama3.2:1b
              fi
              
              if ! ollama list | grep -q "qwen2.5"; then
                echo "Pulling qwen2.5:0.5b..."
                ollama pull qwen2.5:0.5b
              fi
              
              echo "Models ready!"
              ollama list
              
              # Keep server running
              wait $SERVER_PID
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: "/root/.ollama/models"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama/models
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: ollama-models
          emptyDir:
            sizeLimit: 10Gi
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agenthive
  labels:
    app: agenthive
    component: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  selector:
    app: agenthive
    component: ollama
