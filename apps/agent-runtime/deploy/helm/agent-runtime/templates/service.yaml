apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-runtime.fullname" . }}
  labels:
    {{- include "agent-runtime.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "agent-runtime.selectorLabels" . | nindent 4 }}
