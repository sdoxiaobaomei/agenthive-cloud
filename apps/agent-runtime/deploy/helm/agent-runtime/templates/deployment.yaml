apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-runtime.fullname" . }}
  labels:
    {{- include "agent-runtime.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent-runtime.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agent-runtime.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent-runtime.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: {{ .Values.agent.name | quote }}
            - name: AGENT_ROLE
              value: {{ .Values.agent.role | quote }}
            - name: AGENT_CAPABILITIES
              value: {{ join "," .Values.agent.capabilities | quote }}
            - name: MAX_CONCURRENT_TASKS
              value: {{ .Values.agent.maxConcurrentTasks | quote }}
            - name: HEARTBEAT_INTERVAL
              value: {{ .Values.agent.heartbeatInterval | quote }}
            - name: SUPERVISOR_URL
              value: {{ .Values.supervisor.url | quote }}
            - name: WORKSPACE_PATH
              value: {{ .Values.workspace.path | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.workspace.path }}
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: workspace
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
