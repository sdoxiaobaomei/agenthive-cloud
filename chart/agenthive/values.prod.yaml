# ============================================================================
# AgentHive Cloud — Production Values Override
# Usage: helm upgrade --install agenthive chart/agenthive -f values.prod.yaml
# ============================================================================

global:
  imageRegistry: "crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com"
  labels:
    environment: production

# ----------------------------------------------------------------------------
# Registry — Production (use K8s imagePullSecret)
# ----------------------------------------------------------------------------
registry:
  enabled: false

# ServiceAccount imagePullSecrets for ACR
serviceAccount:
  imagePullSecrets:
    - name: acr-regcred

# ----------------------------------------------------------------------------
# API Service — Production
# ----------------------------------------------------------------------------
api:
  replicas: 3

  image:
    repository: "namespace-alpha/api"
    tag: "latest"

  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

  pdb:
    enabled: true
    minAvailable: 2

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilization: 60
    targetMemoryUtilization: 75
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
        selectPolicy: Max

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1

# ----------------------------------------------------------------------------
# Landing Service — Production
# ----------------------------------------------------------------------------
landing:
  replicas: 3

  image:
    repository: "namespace-alpha/landing"
    tag: "v1.2.0"

  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  pdb:
    enabled: true
    minAvailable: 2

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 60
    targetMemoryUtilization: 75
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
        selectPolicy: Max

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1

# ----------------------------------------------------------------------------
# Java Microservices — Production
# ----------------------------------------------------------------------------
javaServices:
  defaults:
    image:
      repositoryPrefix: "namespace-alpha"
      tag: "v1.1.0-g6d872b4"
    replicas: 3
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 1000m
    jvmOptions: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Djava.security.egd=file:/dev/./urandom"
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 1
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilization: 60
      targetMemoryUtilization: 75
    pdb:
      enabled: true
      minAvailable: 2

  services:
    gateway:
      envOverrides:
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 10
      pdb:
        enabled: true
        minAvailable: 2

    auth:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 10
      pdb:
        enabled: true
        minAvailable: 2

    user:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 10
      pdb:
        enabled: true
        minAvailable: 2

    payment:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 8
      pdb:
        enabled: true
        minAvailable: 2

    order:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 8
      pdb:
        enabled: true
        minAvailable: 2

    cart:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 8
      pdb:
        enabled: true
        minAvailable: 2

    logistics:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 3
      hpa:
        enabled: true
        minReplicas: 3
        maxReplicas: 8
      pdb:
        enabled: true
        minAvailable: 2

  gatewayCors:
    enabled: true
    allowedOriginPatterns:
      - "https://*.xiaochaitian.asia"

  ingress:
    enabled: true
    name: agenthive-java-ingress
    className: nginx
    tls:
      enabled: true
      secretName: agenthive-java-tls
      hosts:
        - java.agenthive.cloud
    hosts:
      - host: java.agenthive.cloud
        paths:
          - path: /gateway
            pathType: Prefix
            service: gateway-service
            port: 8080
          - path: /auth
            pathType: Prefix
            service: auth-service
            port: 8081

# ----------------------------------------------------------------------------
# Ingress — Production (HTTPS + Domain + Security Headers)
# ----------------------------------------------------------------------------
ingress:
  enabled: true
  name: agenthive-ingress
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  tls:
    enabled: true
    secretName: production-tls-secret
    hosts:
      - agenthive.cloud
      - www.agenthive.cloud
      - api.agenthive.cloud
  hosts:
    - host: agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
    - host: www.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
    - host: api.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: api
          port: 3001

# ----------------------------------------------------------------------------
# ConfigMap — Production
# ----------------------------------------------------------------------------
configmap:
  data:
    NODE_ENV: "production"
    CORS_ORIGIN: "https://agenthive.cloud,https://www.agenthive.cloud,https://api.agenthive.cloud"
    LOG_LEVEL: "warn"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector-gateway.monitoring:4317"
    OTEL_SDK_DISABLED: "false"
    OTEL_TRACES_SAMPLER_ARG: "0.1"

# ----------------------------------------------------------------------------
# Secret — Production (managed by external-secrets or setup-secrets.sh)
# ----------------------------------------------------------------------------
secret:
  enabled: false

# ----------------------------------------------------------------------------
# NetworkPolicy — Production
# ----------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ----------------------------------------------------------------------------
# Nacos — Production
# ----------------------------------------------------------------------------
nacos:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: "nacos/nacos-server"
    tag: "v2.3.0"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

# ----------------------------------------------------------------------------
# RabbitMQ — Production (Phase 1: enabled if needed)
# ----------------------------------------------------------------------------
# Agent Runtime — Production
agentRuntime:
  enabled: true
  replicas: 2
  image:
    repository: "namespace-alpha/agent-runtime"
    tag: "v1.2.0"
  service:
    port: 8080
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  agent:
    name: "Prod Agent"
    role: "custom"
    capabilities:
      - shell
      - code_generation
      - code_review
      - test
      - build
    maxConcurrentTasks: 2
    heartbeatInterval: 30000
  supervisor:
    url: "ws://api:3001"
  workspace:
    path: "/workspace"
  envFromSecret:
    - name: LLM_API_KEY
      key: LLM_API_KEY

# OTel Collector — Production
otelCollector:
  enabled: true
  namespace: monitoring
  image: otel/opentelemetry-collector-contrib:0.96.0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# RabbitMQ — Production (disabled until develop issue resolved)
rabbitmq:
  enabled: false
  replicas: 1

# ----------------------------------------------------------------------------
# Redis — Production
# ----------------------------------------------------------------------------
redis:
  enabled: true
  replicas: 1
