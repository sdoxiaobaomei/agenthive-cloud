# ----------------------------------------------------------------------------
# Ingress — Production (HTTPS + Domain)
# ----------------------------------------------------------------------------
ingress:
  className: nginx
  tls:
    enabled: true
    secretName: agenthive-tls
    hosts:
      - api.agenthive.cloud
      - agenthive.cloud
      - www.agenthive.cloud

  hosts:
    - host: api.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: gateway-service
          port: 8080
    - host: agenthive.cloud
      paths:
        - path: /api
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /socket.io
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
    - host: www.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: landing
          port: 3000

  ingress:
    enabled: true
    className: nginx
    tls:
      enabled: true
      secretName: agenthive-java-tls
      hosts:
        - java.agenthive.cloud
    hosts:
      - host: java.agenthive.cloud
        paths:
          - path: /gateway
            pathType: Prefix
            service: gateway-service
            port: 8080
          - path: /auth
            pathType: Prefix
            service: auth-service
            port: 8081

# ----------------------------------------------------------------------------
# ConfigMap — Production
# ----------------------------------------------------------------------------
configmap:
  data:
    NODE_ENV: "production"
    DB_HOST: "172.24.146.165"
    DB_PORT: "5432"
    DB_NAME: "agenthive"
    DB_USER: "agenthive"
    REDIS_URL: "redis://:REDACTED@172.24.146.165:6379"
    REDIS_HOST: "172.24.146.165"
    REDIS_PORT: "6379"
    API_URL: "https://api.agenthive.cloud"
    LOG_LEVEL: "warn"
    OTEL_TRACES_SAMPLER_ARG: "0.05"
    OTEL_LOG_LEVEL: "error"
    CORS_ORIGIN: "https://agenthive.cloud,https://www.agenthive.cloud"

# ----------------------------------------------------------------------------
# Secret — Production (Native K8s Secret, managed by scripts/setup-secrets.sh)
# ----------------------------------------------------------------------------
secret:
  enabled: true
  name: app-secrets
  externalSecret:
    enabled: false

# ----------------------------------------------------------------------------
# NetworkPolicy — Production
# ----------------------------------------------------------------------------
networkPolicy:
  enabled: true

# ----------------------------------------------------------------------------
# Nacos — Production (Phase 1: enabled if needed)
# ----------------------------------------------------------------------------
nacos:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m

# ----------------------------------------------------------------------------
# RabbitMQ — Production (Phase 1: enabled if needed)
# ----------------------------------------------------------------------------
rabbitmq:
  enabled: false
  replicas: 1
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
