# ============================================================================
# AgentHive Cloud — Production Values Override
# Usage: helm upgrade --install agenthive chart/agenthive -f values.prod.yaml
# ============================================================================

global:
  labels:
    environment: production

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# ----------------------------------------------------------------------------
# API Service — Production
# ----------------------------------------------------------------------------
api:
  replicas: 3

  image:
    tag: "1.1.0"

  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

  pdb:
    enabled: true
    minAvailable: 2

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilization: 60
    targetMemoryUtilization: 75
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
        selectPolicy: Max

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0

# ----------------------------------------------------------------------------
# Landing Service — Production
# ----------------------------------------------------------------------------
landing:
  replicas: 3

  image:
    tag: "1.1.0"

  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

  pdb:
    enabled: true
    minAvailable: 2

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 60
    targetMemoryUtilization: 75
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
        selectPolicy: Max

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0

