# ============================================================================
# AgentHive Cloud — Production Values Override (Fixed)
# Usage: helm upgrade --install agenthive chart/agenthive -f values.prod.yaml
# ============================================================================

global:
  imageRegistry: "crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com"
  labels:
    environment: production

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# ----------------------------------------------------------------------------
# API Service — Production
# ----------------------------------------------------------------------------
api:
  replicas: 1

  image:
    repository: "namespace-alpha/api"
    tag: "v1.1.0-g6d872b4"

  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

  pdb:
    enabled: false

  hpa:
    enabled: false

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

# ----------------------------------------------------------------------------
# Landing Service — Production
# ----------------------------------------------------------------------------
landing:
  replicas: 1

  image:
    repository: "namespace-alpha/landing"
    tag: "v1.1.0-g6d872b4"

  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

  pdb:
    enabled: false

  hpa:
    enabled: false

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

# ----------------------------------------------------------------------------
# Java Microservices — Production
# ----------------------------------------------------------------------------
javaServices:
  defaults:
    image:
      repositoryPrefix: "namespace-alpha"
      tag: "v1.1.0-g6d872b4"
    replicas: 1
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 1000m
    jvmOptions: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Djava.security.egd=file:/dev/./urandom"
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 1
    hpa:
      enabled: false
    pdb:
      enabled: false

  services:
    gateway:
      envOverrides:
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

    auth:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

    user:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

    payment:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

    order:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

    cart:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

    logistics:
      envOverrides:
        DB_HOST: "172.24.146.165"
        REDIS_HOST: "172.24.146.165"
      replicas: 1
      hpa:
        enabled: false
      pdb:
        enabled: false

  ingress:
    enabled: true
    name: agenthive-java-ingress
    className: nginx
    tls:
      enabled: true
      secretName: agenthive-java-tls
      hosts:
        - java.agenthive.cloud
    hosts:
      - host: java.agenthive.cloud
        paths:
          - path: /gateway
            pathType: Prefix
            service: gateway-service
            port: 8080
          - path: /auth
            pathType: Prefix
            service: auth-service
            port: 8081

# ----------------------------------------------------------------------------
# Ingress — Production (HTTPS + Domain)
# ----------------------------------------------------------------------------
ingress:
  className: nginx
  tls:
    enabled: true
    secretName: agenthive-tls
    hosts:
      - api.agenthive.cloud
      - agenthive.cloud
      - www.agenthive.cloud

  hosts:
    - host: api.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: gateway-service
          port: 8080
    - host: agenthive.cloud
      paths:
        - path: /api
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /socket.io
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
    - host: www.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: landing
          port: 3000

# ----------------------------------------------------------------------------
# ConfigMap — Production
# ----------------------------------------------------------------------------
configmap:
  data:
    NODE_ENV: "production"
    DB_HOST: "172.24.146.165"
    DB_PORT: "5432"
    DB_NAME: "agenthive"
    DB_USER: "agenthive"
    REDIS_URL: "redis://:REDACTED@172.24.146.165:6379"
    REDIS_HOST: "172.24.146.165"
    REDIS_PORT: "6379"
    API_URL: "https://api.agenthive.cloud"
    LOG_LEVEL: "warn"
    OTEL_TRACES_SAMPLER_ARG: "0.05"
    OTEL_LOG_LEVEL: "error"
    CORS_ORIGIN: "https://agenthive.cloud,https://www.agenthive.cloud"

# ----------------------------------------------------------------------------
# Secret — Production (Native K8s Secret, managed by scripts/setup-secrets.sh)
# ----------------------------------------------------------------------------
secret:
  enabled: false

# ----------------------------------------------------------------------------
# NetworkPolicy — Production
# ----------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ----------------------------------------------------------------------------
# Nacos — Production (Phase 1: enabled if needed)
# ----------------------------------------------------------------------------
nacos:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: "nacos/nacos-server"
    tag: "v2.3.0"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1000m
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

# ----------------------------------------------------------------------------
# RabbitMQ — Production (Phase 1: enabled if needed)
# ----------------------------------------------------------------------------
rabbitmq:
  enabled: false
  replicas: 1
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
