# AgentHive Cloud - Staging Overrides
# ============================================================================
# Usage: helm install agenthive-staging ./chart/agenthive -f values.yaml -f values.staging.yaml
# ============================================================================

global:
  namespace: agenthive-staging
  namePrefix: "staging-"
  labels:
    environment: staging

# ----------------------------------------------------------------------------
# API Service - Staging
# ----------------------------------------------------------------------------
api:
  replicas: 2
  image:
    registry: registry.cn-hangzhou.aliyuncs.com
    repository: agenthive/api
    tag: staging
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  pdb:
    enabled: true
    minAvailable: 1
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0

# ----------------------------------------------------------------------------
# Landing Service - Staging
# ----------------------------------------------------------------------------
landing:
  replicas: 2
  image:
    registry: registry.cn-hangzhou.aliyuncs.com
    repository: agenthive/landing
    tag: staging
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  pdb:
    enabled: true
    minAvailable: 1
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0

# ----------------------------------------------------------------------------
# Ingress - Staging
# ----------------------------------------------------------------------------
ingress:
  tls:
    enabled: true
    secretName: staging-tls-secret
    hosts:
      - staging.agenthive.cloud
      - api-staging.agenthive.cloud
  hosts:
    - host: staging.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
    - host: api-staging.agenthive.cloud
      paths:
        - path: /
          pathType: Prefix
          service: gateway-service
          port: 8080

# ----------------------------------------------------------------------------
# ConfigMap - Staging
# ----------------------------------------------------------------------------
configmap:
  data:
    NODE_ENV: "staging"

# ----------------------------------------------------------------------------
# Java Services - Staging
# ----------------------------------------------------------------------------
javaServices:
  defaults:
    image:
      registry: registry.cn-hangzhou.aliyuncs.com
      tag: staging
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 0
    jvmOptions: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
  services:
    gateway:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
      pdb:
        enabled: true
        minAvailable: 1
    auth:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
      pdb:
        enabled: true
        minAvailable: 1
    user:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
      pdb:
        enabled: true
        minAvailable: 1
    payment:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 4
      pdb:
        enabled: true
        minAvailable: 1
    order:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 4
      pdb:
        enabled: true
        minAvailable: 1
    cart:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 4
      pdb:
        enabled: true
        minAvailable: 1
    logistics:
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 4
      pdb:
        enabled: true
        minAvailable: 1
