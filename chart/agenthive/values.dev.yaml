# AgentHive Cloud — Development Values Override
# ============================================================================
# Usage: helm install agenthive-dev ./chart/agenthive -f values.yaml -f values.dev.yaml
# Purpose: Local development with embedded PostgreSQL + Redis
# ============================================================================

global:
  labels:
    environment: development
# ----------------------------------------------------------------------------
# Local PostgreSQL + Redis (dev only)
# ----------------------------------------------------------------------------
postgres:
  enabled: true
redis:
  enabled: true
# ----------------------------------------------------------------------------
# API Service — Dev
# ----------------------------------------------------------------------------
api:
  replicas: 1
  image:
    registry: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
    repository: namespace-alpha/api
    tag: "v0.1.0-dev.1-55-gc183b4c"
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  hpa:
    enabled: false
  pdb:
    enabled: false
# ----------------------------------------------------------------------------
# Landing Service — Dev
# ----------------------------------------------------------------------------
landing:
  replicas: 1
  image:
    registry: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
    repository: namespace-alpha/landing
    tag: "v0.1.0-dev.1-57-g9840356"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  hpa:
    enabled: false
  pdb:
    enabled: false
# ----------------------------------------------------------------------------
# Java Services — Dev
# ----------------------------------------------------------------------------
javaServices:
  defaults:
    image:
      registry: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
      repositoryPrefix: namespace-alpha
      tag: "845fddb"
    replicas: 1
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
    jvmOptions: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -Djava.security.egd=file:/dev/./urandom"
  services:
    gateway:
      enabled: true
      hpa:
        enabled: false
      pdb:
        enabled: false
    auth:
      enabled: true
      hpa:
        enabled: false
      pdb:
        enabled: false
    payment:
      enabled: false
      hpa:
        enabled: false
      pdb:
        enabled: false
    order:
      enabled: false
      hpa:
        enabled: false
      pdb:
        enabled: false
    cart:
      enabled: false
      hpa:
        enabled: false
      pdb:
        enabled: false
    logistics:
      enabled: false
      hpa:
        enabled: false
      pdb:
        enabled: false
  gatewayCors:
    enabled: true
    allowedOrigins:
      - "http://localhost:8080"
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://agenthive.local"
      - "http://agenthive.local:8080"
# ----------------------------------------------------------------------------
# Ingress — Dev (localhost + agenthive.local)
# ----------------------------------------------------------------------------
ingress:
  className: nginx
  tls:
    enabled: false
  hosts:
    - host: localhost
      paths:
        - path: /api/auth
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /api
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /socket.io
          pathType: Prefix
          service: api
          port: 3001
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
    - host: agenthive.local
      paths:
        - path: /api/auth
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /api
          pathType: Prefix
          service: gateway-service
          port: 8080
        - path: /socket.io
          pathType: Prefix
          service: api
          port: 3001
        - path: /
          pathType: Prefix
          service: landing
          port: 3000
