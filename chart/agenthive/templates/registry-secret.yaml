{{- if .Values.registry.enabled }}
{{- $server := .Values.registry.server | required "registry.server is required" }}
{{- $username := .Values.registry.username | required "registry.username is required" }}
{{- $password := .Values.registry.password | required "registry.password is required" }}
{{- $email := default "" .Values.registry.email }}
{{- $auth := printf "%s:%s" $username $password | b64enc }}
{{- $dockerConfig := dict "auths" (dict $server (dict "username" $username "password" $password "email" $email "auth" $auth)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registry.name | default "registry-secret" }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.fullname" . }}
    app.kubernetes.io/component: registry
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: kubernetes.io/docker-registry
stringData:
  .dockerconfigjson: {{ $dockerConfig | toJson | quote }}
{{- end }}
