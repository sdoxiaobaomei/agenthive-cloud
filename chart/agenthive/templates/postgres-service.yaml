{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenthive.prefixedName" (list . .Values.postgres.name) }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.postgres.name) }}
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.postgres.name) }}
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
      name: postgres
  type: {{ .Values.postgres.service.type }}
{{- end }}
