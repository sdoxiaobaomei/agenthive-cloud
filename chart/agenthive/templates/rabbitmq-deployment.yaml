{{- if .Values.rabbitmq.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenthive.prefixedName" (list . .Values.rabbitmq.name) }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.rabbitmq.name) }}
    app.kubernetes.io/component: messaging
spec:
  replicas: {{ .Values.rabbitmq.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.rabbitmq.name) }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.rabbitmq.name) }}
        app.kubernetes.io/component: messaging
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: rabbitmq
          image: {{ include "agenthive.image" (list . .Values.rabbitmq.image) }}
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.rabbitmq.service.ports.amqp }}
              name: amqp
              protocol: TCP
            - containerPort: {{ .Values.rabbitmq.service.ports.management }}
              name: management
              protocol: TCP
          {{- if .Values.rabbitmq.env }}
          env:
            {{- range .Values.rabbitmq.env }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.rabbitmq.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.rabbitmq.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - rabbitmq-diagnostics -q ping || exit 1
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - rabbitmq-diagnostics -q status && rabbitmq-diagnostics -q check_virtual_hosts || exit 1
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          {{- if .Values.rabbitmq.pvc.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agenthive.prefixedName" (list . .Values.rabbitmq.name) }}-data
          {{- end }}
{{- end }}
