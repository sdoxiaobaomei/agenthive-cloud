{{- if .Values.api.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "agenthive.apiName" . }}-test-connection"
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.apiName" . }}
    helm.sh/chart: {{ include "agenthive.chart" . }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args:
        - '--no-verbose'
        - '--tries=3'
        - '--timeout=5'
        - '-O-'
        - 'http://{{ include "agenthive.apiName" . }}:{{ .Values.api.service.port }}{{ .Values.api.probes.readiness.path }}'
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
{{- end }}
