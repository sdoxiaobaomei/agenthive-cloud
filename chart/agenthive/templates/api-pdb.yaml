{{- if and .Values.api.enabled .Values.api.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agenthive.apiName" . }}
  namespace: {{ include "agenthive.namespace" . }}
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agenthive.apiName" . }}
{{- end }}
