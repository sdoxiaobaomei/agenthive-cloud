{{- if .Values.agentRuntime.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenthive.prefixedName" (list . .Values.agentRuntime.name) }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.agentRuntime.name) }}
    app.kubernetes.io/component: agent-runtime
    {{- include "agenthive.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agentRuntime.replicas }}
  {{- if .Values.agentRuntime.strategy }}
  strategy:
    {{- toYaml .Values.agentRuntime.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.agentRuntime.name) }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.agentRuntime.name) }}
        app.kubernetes.io/component: agent-runtime
        {{- include "agenthive.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "agenthive.prefixedName" (list . .Values.agentRuntime.name) }}
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.agentRuntime.name }}
          {{- include "agenthive.containerImage" (list . .Values.agentRuntime.image) | nindent 10 }}
          ports:
            - containerPort: {{ .Values.agentRuntime.service.port }}
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.agentRuntime.service.port | quote }}
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AGENT_NAME
              value: {{ .Values.agentRuntime.agent.name | quote }}
            - name: AGENT_ROLE
              value: {{ .Values.agentRuntime.agent.role | quote }}
            - name: AGENT_CAPABILITIES
              value: {{ join "," .Values.agentRuntime.agent.capabilities | quote }}
            - name: MAX_CONCURRENT_TASKS
              value: {{ .Values.agentRuntime.agent.maxConcurrentTasks | quote }}
            - name: HEARTBEAT_INTERVAL
              value: {{ .Values.agentRuntime.agent.heartbeatInterval | quote }}
            - name: SUPERVISOR_URL
              value: {{ .Values.agentRuntime.supervisor.url | quote }}
            - name: WORKSPACE_PATH
              value: {{ .Values.agentRuntime.workspace.path | quote }}
            - name: NODE_ENV
              value: {{ .Values.configmap.data.NODE_ENV | quote }}
            - name: OTEL_SERVICE_NAME
              value: "agenthive-agent-runtime"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.configmap.data.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_SDK_DISABLED
              value: {{ .Values.configmap.data.OTEL_SDK_DISABLED | quote }}
            {{- range .Values.agentRuntime.envFromSecret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: {{ .key }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.global.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.agentRuntime.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.agentRuntime.workspace.path }}
      volumes:
        - name: workspace
          emptyDir: {}
      {{- if .Values.agentRuntime.affinity }}
      affinity:
        {{- toYaml .Values.agentRuntime.affinity | nindent 8 }}
      {{- end }}
{{- end }}
