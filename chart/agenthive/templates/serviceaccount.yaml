{{- if .Values.serviceAccount.create }}
{{- if .Values.api.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agenthive.apiName" . }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.apiName" . }}
    app.kubernetes.io/component: {{ .Values.api.component }}
automountServiceAccountToken: {{ .Values.api.serviceAccount.automountServiceAccountToken | default .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- if .Values.landing.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agenthive.landingName" . }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.landingName" . }}
    app.kubernetes.io/component: {{ .Values.landing.component }}
automountServiceAccountToken: {{ .Values.landing.serviceAccount.automountServiceAccountToken | default .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- if .Values.javaServices.enabled }}
{{- range $key, $svc := .Values.javaServices.services }}
{{- if $svc.enabled }}
{{- $javaName := include "agenthive.prefixedName" (list $ $svc.name) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $javaName }}
  namespace: {{ include "agenthive.namespace" $ }}
  labels:
    app.kubernetes.io/name: {{ $javaName }}
    app.kubernetes.io/component: {{ $svc.component }}
automountServiceAccountToken: {{ $.Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
