{{- if .Values.secret.enabled }}
{{- if .Values.secret.externalSecret.enabled }}
# 模式 A: ExternalSecret — 从外部 Secret Store (KMS/Vault) 同步
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secret-management
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secret.externalSecret.secretStoreName | default "alicloud-kms" }}
  target:
    name: {{ .Values.secret.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: agenthive
          app.kubernetes.io/component: secrets
  data:
    - secretKey: DB_USER
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-db-user"
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-db-password"
    - secretKey: JWT_SECRET
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-jwt-secret"
    - secretKey: LLM_API_KEY
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-llm-api-key"
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-redis-password"
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-rabbitmq-password"
    - secretKey: NACOS_PASSWORD
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-nacos-password"
    - secretKey: GRAFANA_ADMIN_PASSWORD
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-grafana-password"
    - secretKey: INTERNAL_API_TOKEN
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-internal-api-token"
    - secretKey: WITHDRAWAL_ENCRYPT_KEY
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-withdrawal-encrypt-key"
{{- else if .Values.secret.createEmpty }}
# 模式 B: 空 Secret — key 存在，值由外部脚本 patch/注入（生产环境配合 setup-secrets.sh 使用）
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DB_USER: ""
  DB_PASSWORD: ""
  JWT_SECRET: ""
  LLM_API_KEY: ""
  REDIS_PASSWORD: ""
  RABBITMQ_PASSWORD: ""
  NACOS_PASSWORD: ""
  GRAFANA_ADMIN_PASSWORD: ""
  INTERNAL_API_TOKEN: ""
  WITHDRAWAL_ENCRYPT_KEY: ""
{{- else }}
# 模式 C: Helm-managed Secret — 从 values 读取（开发/测试环境默认）
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DB_USER: {{ .Values.secret.data.DB_USER | default "REPLACE_ME" | quote }}
  DB_PASSWORD: {{ .Values.secret.data.DB_PASSWORD | default "REPLACE_ME" | quote }}
  JWT_SECRET: {{ .Values.secret.data.JWT_SECRET | default "REPLACE_ME" | quote }}
  LLM_API_KEY: {{ .Values.secret.data.LLM_API_KEY | default "REPLACE_ME" | quote }}
  REDIS_PASSWORD: {{ .Values.secret.data.REDIS_PASSWORD | default "REPLACE_ME" | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secret.data.RABBITMQ_PASSWORD | default "REPLACE_ME" | quote }}
  NACOS_PASSWORD: {{ .Values.secret.data.NACOS_PASSWORD | default "REPLACE_ME" | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secret.data.GRAFANA_ADMIN_PASSWORD | default "REPLACE_ME" | quote }}
  INTERNAL_API_TOKEN: {{ .Values.secret.data.INTERNAL_API_TOKEN | default "REPLACE_ME" | quote }}
  WITHDRAWAL_ENCRYPT_KEY: {{ .Values.secret.data.WITHDRAWAL_ENCRYPT_KEY | default "REPLACE_ME" | quote }}
{{- end }}
{{- end }}
