{{- if .Values.secret.enabled }}
{{- if .Values.secret.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secret-management
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: alicloud-kms
  target:
    name: {{ .Values.secret.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: agenthive
          app.kubernetes.io/component: secrets
  data:
    - secretKey: DB_USER
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-db-user"
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-db-password"
    - secretKey: JWT_SECRET
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-jwt-secret"
    - secretKey: LLM_API_KEY
      remoteRef:
        key: "agenthive-{{ .Values.global.labels.environment }}-llm-api-key"
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DB_USER: {{ .Values.secret.data.DB_USER | default "REPLACE_ME" | quote }}
  DB_PASSWORD: {{ .Values.secret.data.DB_PASSWORD | default "REPLACE_ME" | quote }}
  JWT_SECRET: {{ .Values.secret.data.JWT_SECRET | default "REPLACE_ME" | quote }}
  LLM_API_KEY: {{ .Values.secret.data.LLM_API_KEY | default "REPLACE_ME" | quote }}
  REDIS_PASSWORD: {{ .Values.secret.data.REDIS_PASSWORD | default "REPLACE_ME" | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secret.data.RABBITMQ_PASSWORD | default "REPLACE_ME" | quote }}
  NACOS_PASSWORD: {{ .Values.secret.data.NACOS_PASSWORD | default "REPLACE_ME" | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secret.data.GRAFANA_ADMIN_PASSWORD | default "REPLACE_ME" | quote }}
{{- end }}
{{- end }}
