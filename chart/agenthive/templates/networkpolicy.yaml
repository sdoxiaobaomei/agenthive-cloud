---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-java-internal
  namespace: {{ include "agenthive.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: java-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: java-service
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "agenthive.landingName" . }}
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8085
        - protocol: TCP
          port: 8086
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: java-service
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8085
        - protocol: TCP
          port: 8086
{{- end }}
