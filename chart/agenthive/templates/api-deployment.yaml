{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenthive.apiName" . }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.apiName" . }}
    app.kubernetes.io/component: {{ .Values.api.component }}
    {{- include "agenthive.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  {{- if .Values.api.strategy }}
  strategy:
    {{- toYaml .Values.api.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agenthive.apiName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agenthive.apiName" . }}
        app.kubernetes.io/component: {{ .Values.api.component }}
        {{- include "agenthive.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "agenthive.apiName" . }}
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "agenthive.prefixedName" (list . .Values.postgres.name) }} {{ .Values.postgres.service.port }}; do echo waiting for db; sleep 2; done;']
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 50m
          securityContext:
            {{- toYaml .Values.global.containerSecurityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Values.api.name }}
          {{- include "agenthive.containerImage" (list . .Values.api.image) | nindent 10 }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.api.service.port | quote }}
            {{- range .Values.api.envFromConfigMap }}
            - name: {{ .name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configmap.name }}
                  key: {{ .key }}
            {{- end }}
            {{- range .Values.api.envFromSecret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: {{ .key }}
            {{- end }}
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          securityContext:
            {{- toYaml .Values.global.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: {{ .Values.api.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: {{ .Values.api.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.readiness.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.probes.startup.path }}
              port: {{ .Values.api.probes.startup.port }}
            initialDelaySeconds: {{ .Values.api.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.startup.failureThreshold }}
          {{- if .Values.api.volumeMounts }}
          volumeMounts:
            {{- toYaml .Values.api.volumeMounts | nindent 12 }}
          {{- end }}
      {{- if .Values.api.volumes }}
      volumes:
        {{- toYaml .Values.api.volumes | nindent 8 }}
      {{- end }}
      {{- if .Values.api.affinity }}
      affinity:
        {{- toYaml .Values.api.affinity | nindent 8 }}
      {{- end }}
{{- end }}
