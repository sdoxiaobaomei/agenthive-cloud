{{- if and (or .Values.nacos.enabled .Values.javaServices.enabled) .Values.nacos.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.nacos.name }}-auth
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.nacos.name }}
    app.kubernetes.io/component: config-server
type: Opaque
stringData:
  NACOS_AUTH_TOKEN: {{ .Values.nacos.auth.token | default (randAlphaNum 32) | quote }}
  NACOS_AUTH_IDENTITY_KEY: {{ .Values.nacos.auth.identityKey | default "serverIdentity" | quote }}
  NACOS_AUTH_IDENTITY_VALUE: {{ .Values.nacos.auth.identityValue | default (randAlphaNum 32) | quote }}
{{- end }}
