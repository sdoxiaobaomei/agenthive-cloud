{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenthive.prefixedName" (list . .Values.redis.name) }}
  namespace: {{ include "agenthive.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.redis.name) }}
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.redis.name) }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agenthive.prefixedName" (list . .Values.redis.name) }}
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          image: {{ include "agenthive.image" (list . .Values.redis.image) }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.redis.service.port }}
              name: redis
              protocol: TCP
          command:
            - redis-server
          args:
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --save
            - "900 1"
            - --save
            - "300 10"
            - --save
            - "60 10000"
            - --requirepass
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: REDIS_PASSWORD
          securityContext:
            {{- toYaml .Values.global.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.redis.pvc.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agenthive.prefixedName" (list . .Values.redis.name) }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
