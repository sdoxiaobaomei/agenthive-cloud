    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: agenthive-otel-collector-dev
    restart: unless-stopped
    dns:
      - 223.5.5.5
      - 114.114.114.114
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./monitoring/opentelemetry/otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    profiles:
      - monitoring
    healthcheck:
