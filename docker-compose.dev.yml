    restart: unless-stopped
    dns:
      - 223.5.5.5
      - 114.114.114.114
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"

  # ============================================
  # Nginx Reverse Proxy (profile: with-nginx)
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: agenthive-nginx-dev
    restart: unless-stopped
    dns:
      - 223.5.5.5
      - 114.114.114.114
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      landing:
        condition: service_healthy
      gateway-service:
        condition: service_healthy
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"
# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nacos_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local
  maven-cache:
    driver: local
  loki_data:
    driver: local
  workspace_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  agenthive-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
