# ============================================================================
# AgentHive Cloud - Development Stack
# 本地开发统一配置：Node.js + Java 微服务 + Monitoring
#
# 默认启动最简栈（PostgreSQL + Redis + API + Landing）
# Profile 扩展：
#   --profile java        → Nacos + RabbitMQ + 7 Java 微服务
#   --profile monitoring  → Prometheus + Grafana + Tempo + Loki + OTel
#   --profile with-nginx  → Nginx 反向代理
#
# 启动命令：
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
# ============================================================================

services:
  # ============================================
  # Shared Infrastructure
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: agenthive-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agenthive}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
      POSTGRES_DB: ${DB_NAME:-agenthive}
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,payment_db,order_db,cart_db,logistics_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/java/scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agenthive} -d ${DB_NAME:-agenthive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: agenthive-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ============================================
  # Java Infrastructure (profile: java)
  # ============================================

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: agenthive-nacos-dev
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: bmFjb3Mtc2VjcmV0LWtleS1hZ2VudGhpdmUtMjAyNC1sb25nZXIta2V5
      NACOS_AUTH_IDENTITY_KEY: agenthive
      NACOS_AUTH_IDENTITY_VALUE: agenthive-secret-2024
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness && nc -z localhost 9848"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: agenthive-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-agenthive}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-agenthive-secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M
  # ============================================
  # Node.js Services
  # ============================================

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: agenthive-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      DB_NAME: ${DB_NAME:-agenthive}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.kimi.com/coding/v1}
      LLM_MODEL: ${LLM_MODEL:-kimi-for-coding}
      LLM_USER_AGENT: ${LLM_USER_AGENT:-claude-code/0.1.0}
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      OTEL_SDK_DISABLED: "true"
      DEV_USER_ID: 5ab7d370-8900-41a8-a9ca-37dbdcb45b5a
      CORS_ORIGIN: ${CORS_ORIGIN}
      UV_THREADPOOL_SIZE: 4
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      target: production
      args:
        - NUXT_PUBLIC_API_BASE=/api
    container_name: agenthive-landing-dev
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
      GATEWAY_URL: http://gateway-service:8080
      NUXT_PUBLIC_API_BASE: /api
      OTEL_SDK_DISABLED: "true"
    ports:
      - "${LANDING_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ============================================
  # Java Microservices (profile: java)
  # ============================================

  gateway-service:
    build:
      context: ./apps/java/gateway-service
      dockerfile: Dockerfile
    container_name: agenthive-gateway-dev
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
      SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
      SPRING_CLOUD_NACOS_CONFIG_PASSWORD: nacos
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_NACOS_CONFIG_IMPORT_CHECK_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET}
      ALIYUN_SMS_ENABLED: ${ALIYUN_SMS_ENABLED:-false}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      JAVA_OPTS: "-Xms128m -Xmx384m"
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
  auth-service:
    build:
      context: ./apps/java/auth-service
      dockerfile: Dockerfile
    container_name: agenthive-auth-dev
    restart: unless-stopped
    environment:
