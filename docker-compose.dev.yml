    volumes:
      - maven-cache:/root/.m2
    networks:
      - agenthive-dev
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        compress: "true"
  order-service:
    build:
      context: ./apps/java/order-service
      dockerfile: Dockerfile
    container_name: agenthive-order-dev
    restart: unless-stopped
    dns:
      - 223.5.5.5
      - 114.114.114.114
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
      SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
