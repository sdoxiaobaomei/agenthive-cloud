name: 🚀 Update Helm Values

# ============================================================
# 触发条件：build-images.yml 完成后，或手动触发
# ============================================================
on:
  workflow_run:
    workflows: ['🐳 Build & Push Images']
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: '目标环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: '镜像标签 (默认: git sha)'
        required: false
        default: ''

# ============================================================
# 权限：需要写入仓库内容（更新 values 文件）
# ============================================================
permissions:
  contents: write

env:
  REGISTRY: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
  NAMESPACE: namespace-alpha
  GIT_USER_NAME: "GitHub Actions"
  GIT_USER_EMAIL: "actions@github.com"

jobs:
  # ==========================================================
  # 更新 Helm values 文件中的镜像 tag
  # ==========================================================
  update-values:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. 确定目标 values 文件
      - name: Determine values file
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          
          if [ "${{ github.event.inputs.environment || 'dev' }}" = "prod" ]; then
            VALUES_FILE="chart/agenthive/values.prod.yaml"
          else
            VALUES_FILE="chart/agenthive/values.dev.yaml"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "values_file=$VALUES_FILE" >> $GITHUB_OUTPUT
          echo "Updating $VALUES_FILE with tag: $TAG"

      # 3. 安装 yq（用于修改 YAML）
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

      # 4. 更新 Node.js 服务镜像 tag
      - name: Update Node.js image tags
        run: |
          VALUES="${{ steps.vars.outputs.values_file }}"
          TAG="${{ steps.vars.outputs.tag }}"
          
          # api
          yq eval -i ".api.image.tag = \"$TAG\"" "$VALUES"
          echo "Updated api image tag -> $TAG"
          
          # landing
          yq eval -i ".landing.image.tag = \"$TAG\"" "$VALUES"
          echo "Updated landing image tag -> $TAG"

      # 5. 更新 Java 服务默认镜像 tag
      - name: Update Java image tags
        run: |
          VALUES="${{ steps.vars.outputs.values_file }}"
          TAG="${{ steps.vars.outputs.tag }}"
          
          yq eval -i ".javaServices.defaults.image.tag = \"$TAG\"" "$VALUES"
          echo "Updated javaServices default image tag -> $TAG"

      # 6. 验证 Helm 渲染
      - name: Validate Helm template
        run: |
          helm template agenthive chart/agenthive \
            -f chart/agenthive/values.yaml \
            -f "${{ steps.vars.outputs.values_file }}" > /dev/null
          echo "Helm template validation passed"

      # 7. Commit 并 push
      - name: Commit and push values update
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"
          
          VALUES="${{ steps.vars.outputs.values_file }}"
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          
          if git diff --quiet "$VALUES"; then
            echo "No changes to commit. Skipping."
            exit 0
          fi
          
          git add "$VALUES"
          git commit -m "chore(helm): update $ENV image tags to ${{ steps.vars.outputs.tag }}

          Auto-generated by GitHub Actions
          - Environment: $ENV
          - ArgoCD will auto-sync to ${{ env.REGISTRY }}/${{ env.NAMESPACE }}
          - Tag is exact SHA, ready for promotion to production
          
          [skip ci]"
          
          git push origin HEAD

      # 8. 输出 ArgoCD 同步信息
      - name: Print ArgoCD sync info
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "======================================"
          echo "ArgoCD Application: agenthive-$ENV"
          echo "New Image Tag:    ${{ steps.vars.outputs.tag }}"
          echo "Values File:      ${{ steps.vars.outputs.values_file }}"
          echo "======================================"
          echo "ArgoCD 将在 3-5 分钟内自动检测到 values 变更并触发同步"
          echo "可通过 ArgoCD UI 或 CLI 查看同步进度"
