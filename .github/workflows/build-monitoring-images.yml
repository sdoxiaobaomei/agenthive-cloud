# AgentHive 监控系统镜像构建工作流
# 构建 Prometheus、Grafana、Node Exporter 镜像并推送到阿里云 ACR

name: Build & Push Monitoring Images

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号 (如: v1.0.0)'
        required: true
        default: 'v1.0.0'
      push:
        description: '是否推送到仓库'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  # 监控相关文件变更时自动触发
  push:
    branches: [main, master, develop]
    paths:
      - 'monitoring/**'
      - '.github/workflows/build-monitoring-images.yml'
    tags:
      - 'monitoring-v*'

  # PR 时构建测试（不推送）
  pull_request:
    paths:
      - 'monitoring/**'

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: agenthive

jobs:
  # 构建 Prometheus 镜像
  build-prometheus:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        if: github.event.inputs.push != 'false' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/monitoring-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/monitoring-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./monitoring/prometheus
          file: ./monitoring/prometheus/Dockerfile
          push: ${{ github.event.inputs.push != 'false' && github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/prometheus:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/prometheus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_TIME=${{ steps.meta.outputs.BUILD_TIME }}
            GIT_SHA=${{ steps.meta.outputs.GIT_SHA }}

  # 构建 Grafana 镜像
  build-grafana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        if: github.event.inputs.push != 'false' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/monitoring-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/monitoring-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Grafana
        uses: docker/build-push-action@v5
        with:
          context: ./monitoring
          file: ./monitoring/grafana/Dockerfile
          push: ${{ github.event.inputs.push != 'false' && github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/grafana:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/grafana:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 构建 Node Exporter 镜像
  build-node-exporter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        if: github.event.inputs.push != 'false' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/monitoring-v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/monitoring-v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Node Exporter
        uses: docker/build-push-action@v5
        with:
          context: ./monitoring/node-exporter
          file: ./monitoring/node-exporter/Dockerfile
          push: ${{ github.event.inputs.push != 'false' && github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/node-exporter:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/node-exporter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署通知（可选）
  notify:
    needs: [build-prometheus, build-grafana, build-node-exporter]
    runs-on: ubuntu-latest
    if: github.event.inputs.push != 'false' && github.event_name != 'pull_request'
    steps:
      - name: Notify deployment
        run: |
          echo "=============================================="
          echo "🎉 监控镜像构建完成！"
          echo "=============================================="
          echo "镜像列表:"
          echo "  - ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/prometheus:${{ github.event.inputs.version || 'latest' }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/grafana:${{ github.event.inputs.version || 'latest' }}"
          echo "  - ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/node-exporter:${{ github.event.inputs.version || 'latest' }}"
          echo "=============================================="
          echo "在 VM 上执行以下命令部署:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/prometheus:${{ github.event.inputs.version || 'latest' }}"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/grafana:${{ github.event.inputs.version || 'latest' }}"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/node-exporter:${{ github.event.inputs.version || 'latest' }}"
          echo "=============================================="
