name: 🔍 CI Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'AGENTS/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'AGENTS/**'

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # Stage 1: Code Quality + Env Security
  # ===========================================
  code-quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          STORE_PATH=$(pnpm store path)
          echo "STORE_PATH<<EOF" >> $GITHUB_OUTPUT
          echo "$STORE_PATH" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build workspace packages
        run: |
          cd packages/observability
          pnpm run build

      - name: 🔍 Type Check (packages + api + landing)
        run: |
          pnpm --filter './packages/*' --filter './apps/api' run typecheck || echo "Type errors found but continuing"
          cd apps/landing
          pnpm run typecheck || echo "Landing type errors found but continuing"

      - name: 🎨 Lint Check
        run: pnpm run lint

      # --- Env Security Checks (migrated from env-check.yml) ---
      - name: 🔒 Check for leaked LLM API keys
        run: |
          if grep -rE "sk-kimi-[A-Za-z0-9]{20,}" --include=".env*" . 2>/dev/null; then
            echo "::error::Real LLM API key (sk-kimi-...) detected in .env files"
            exit 1
          fi
          echo "OK: No leaked LLM API keys found"

      - name: 🔒 Check .env.prod CORS_ORIGIN is not localhost
        run: |
          if [ -f .env.prod ]; then
            CORS=$(grep "^CORS_ORIGIN=" .env.prod | cut -d= -f2- || true)
            if echo "$CORS" | grep -qi "localhost"; then
              echo "::error::.env.prod CORS_ORIGIN contains localhost: $CORS"
              exit 1
            fi
          fi

      - name: 🔒 Check .env.prod for weak Nacos token
        run: |
          if [ -f .env.prod ]; then
            TOKEN=$(grep "^NACOS_AUTH_TOKEN=" .env.prod | cut -d= -f2- | tr -d ' ' || true)
            if [ -n "$TOKEN" ] && echo "$TOKEN" | grep -qE "<NACOS_AUTH_TOKEN_EXAMPLE>"; then
              echo "::error::Weak default NACOS_AUTH_TOKEN detected in .env.prod"
              exit 1
            fi
          fi

  # ===========================================
  # Stage 2: Build & Test
  # ===========================================
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [code-quality]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build workspace packages
        run: |
          cd packages/observability
          pnpm run build

      - name: 🔨 Build API
        run: |
          cd apps/api
          pnpm run build || echo "API build: TypeScript errors ignored, dist may be incomplete"

      - name: 🔨 Build Landing
        run: |
          cd apps/landing
          pnpm run build || echo "Landing build failed, continuing"

      - name: 🧪 Run Tests
        run: pnpm test

      - name: 📦 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/landing/.output
          retention-days: 7

  # ===========================================
  # Stage 3: Build Summary
  # ===========================================
  build-summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [code-quality, build-test]
    if: always()
    steps:
      - name: 📝 Summary
        run: |
          echo "## 🔍 CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Code Quality** | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build & Test** | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 镜像构建由 \`build-images.yml\` 负责（push main 时自动构建并推送至 ACR）" >> $GITHUB_STEP_SUMMARY
