name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'AGENTS/**'
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - '.github/workflows/ci-cd.yml'
      - '.github/workflows/deploy-*.yml'
      - '.github/workflows/build-*.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'AGENTS/**'

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/sdoxiaobaomei/agenthive-api
  IMAGE_LANDING: ghcr.io/sdoxiaobaomei/agenthive-landing
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # Stage 1: Code Quality
  # ===========================================
  code-quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          STORE_PATH=$(pnpm store path)
          echo "STORE_PATH<<EOF" >> $GITHUB_OUTPUT
          echo "$STORE_PATH" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 💾 Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type Check
        run: pnpm run typecheck

      - name: 🎨 Lint Check
        run: pnpm run lint

      - name: 📝 Commitlint (PR only)
        if: github.event_name == 'pull_request'
        run: echo "Commitlint skipped for now"

  # ===========================================
  # Stage 2: Build & Test
  # ===========================================
  build-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [code-quality]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build workspace packages
        run: pnpm --filter './packages/*' run build

      - name: 🔨 Build API
        run: |
          cd apps/api
          pnpm run build

      - name: 🔨 Build Landing
        run: |
          cd apps/landing
          pnpm run build

      - name: 🧪 Run Tests
        run: pnpm test

      - name: 📦 Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/landing/.output
          retention-days: 7

  # ===========================================
  # Stage 3: Build Summary
  # ===========================================
  build-summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [code-quality, build-test]
    if: always()
    steps:
      - name: 📝 Summary
        run: |
          echo "## 🚀 CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Code Quality** | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build & Test** | ${{ needs.build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 镜像构建由 \\\`deploy-alicloud.yml\\\` 负责（push main 时自动构建并推送至 ACR）" >> $GITHUB_STEP_SUMMARY
