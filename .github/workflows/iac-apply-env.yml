name: 🚀 IaC Apply (Environments)

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform Workspace（仅 environments 目录有效）'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      directory:
        description: 'Terraform 工作目录'
        required: true
        default: 'environments'
        type: choice
        options:
          - environments
          - demo-ask

permissions:
  id-token: write
  contents: read

env:
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

jobs:
  apply:
    name: Terraform Apply (${{ inputs.directory }} / ${{ inputs.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Environment protection rules:
    # - dev: no approval required (configure in GitHub Settings)
    # - staging: optional approval
    # - prod: mandatory approval + required reviewers
    environment: ${{ inputs.workspace == 'prod' && 'production' || inputs.workspace }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configure Aliyun OIDC Credentials
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.aliyuncs.com" | jq -r '.value')

          CREDS=$(curl -s "https://sts.aliyuncs.com/" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "Action=AssumeRoleWithOIDC" \
            --data "OIDCProviderArn=acs:ram::1261729158179509:oidc-provider/GitHubActions" \
            --data "RoleArn=acs:ram::1261729158179509:role/agenthive-cloud-github-actions-role" \
            --data "OIDCToken=$TOKEN" \
            --data "RoleSessionName=github-${GITHUB_RUN_ID}" \
            --data "DurationSeconds=3600" \
            --data "Format=JSON" \
            --data "Version=2015-04-01")

          echo "ALICLOUD_ACCESS_KEY=$(echo $CREDS | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
          echo "ALICLOUD_SECRET_KEY=$(echo $CREDS | jq -r '.Credentials.AccessKeySecret')" >> $GITHUB_ENV
          echo "ALICLOUD_SECURITY_TOKEN=$(echo $CREDS | jq -r '.Credentials.SecurityToken')" >> $GITHUB_ENV

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: 💾 Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('iac/alicloud/terraform/${{ inputs.directory }}/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: 🔧 Terraform Init
        working-directory: iac/alicloud/terraform/${{ inputs.directory }}
        run: terraform init -input=false

      - name: 🔀 Select Workspace
        if: ${{ inputs.directory == 'environments' }}
        working-directory: iac/alicloud/terraform/environments
        run: |
          terraform workspace select ${{ inputs.workspace }} || terraform workspace new ${{ inputs.workspace }}

      - name: 📋 Terraform Plan
        working-directory: iac/alicloud/terraform/${{ inputs.directory }}
        run: terraform plan -input=false -no-color

      - name: 🚀 Terraform Apply
        working-directory: iac/alicloud/terraform/${{ inputs.directory }}
        run: terraform apply -input=false -auto-approve -no-color

      - name: 📊 Apply Summary
        if: always()
        run: |
          echo "## 🚀 IaC Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **状态** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **目录** | \\\`${{ inputs.directory }}\\\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workspace** | \\\`${{ inputs.workspace }}\\\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **执行者** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
