name: 🔍 IaC PR Check

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'iac/**'
      - '.github/workflows/iac-*.yml'

permissions:
  contents: read
  pull-requests: write

env:
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

jobs:
  # ===========================================
  # Detect which directories changed
  # ===========================================
  detect-changes:
    name: 📂 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      demo-ask: ${{ steps.filter.outputs.demo-ask }}
      environments: ${{ steps.filter.outputs.environments }}
      modules: ${{ steps.filter.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            demo-ask:
              - 'iac/alicloud/terraform/demo-ask/**'
            environments:
              - 'iac/alicloud/terraform/environments/**'
            modules:
              - 'iac/alicloud/terraform/modules/**'

  # ===========================================
  # Layer 1: Static Analysis (no credentials)
  # ===========================================
  static-check:
    name: 📝 Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ./iac

      - name: Terraform Validate (demo-ask)
        working-directory: iac/alicloud/terraform/demo-ask
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate (environments)
        working-directory: iac/alicloud/terraform/environments
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate (modules/vpc)
        working-directory: iac/alicloud/terraform/modules/vpc
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate (modules/k8s)
        working-directory: iac/alicloud/terraform/modules/k8s
        run: |
          terraform init -backend=false
          terraform validate

  # ===========================================
  # Layer 1b: Security Scan (no credentials)
  # ===========================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./iac
          framework: terraform
          quiet: true
          output_format: cli
        continue-on-error: true

  # ===========================================
  # Layer 2: Plan Validation (requires credentials)
  # ===========================================
  plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    needs: [detect-changes, static-check]
    if: ${{ needs.detect-changes.outputs.demo-ask == 'true' || needs.detect-changes.outputs.environments == 'true' }}
    env:
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('iac/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Terraform Plan (demo-ask)
        if: ${{ needs.detect-changes.outputs.demo-ask == 'true' }}
        working-directory: iac/alicloud/terraform/demo-ask
        run: |
          terraform init -input=false
          terraform plan -input=false -no-color 2>&1 | tee /tmp/plan-demo.txt

      - name: Terraform Plan (environments)
        if: ${{ needs.detect-changes.outputs.environments == 'true' }}
        working-directory: iac/alicloud/terraform/environments
        run: |
          terraform init -input=false
          terraform plan -input=false -no-color 2>&1 | tee /tmp/plan-env.txt

      - name: Comment PR with Plan Results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pathDemo = '/tmp/plan-demo.txt';
            const pathEnv = '/tmp/plan-env.txt';

            const planDemo = fs.existsSync(pathDemo) ? fs.readFileSync(pathDemo, 'utf8') : '';
            const planEnv = fs.existsSync(pathEnv) ? fs.readFileSync(pathEnv, 'utf8') : '';

            function extractSummary(output) {
              if (!output) return null;
              const lines = output.split('\n');
              // Try to find the "Plan:" summary line
              const summaryIdx = lines.findIndex(l => l.trim().startsWith('Plan:'));
              if (summaryIdx >= 0) {
                return lines.slice(summaryIdx).join('\n');
              }
              // Fallback: last 40 lines
              return lines.slice(-40).join('\n');
            }

            function truncate(str, maxLen) {
              if (str.length <= maxLen) return str;
              return str.substring(0, maxLen) + '\n\n... (输出已截断，完整日志请查看 Actions 运行详情)';
            }

            let body = '## 🔍 IaC Terraform Plan Results\n\n';
            body += '> 由 GitHub Actions 自动生成。更新 PR 后本评论会自动更新。\n\n';

            if (planDemo) {
              const summary = extractSummary(planDemo) || planDemo;
              body += '### `demo-ask`\n';
              body += '<details><summary>📋 Plan 输出（点击展开）</summary>\n\n';
              body += '```\n' + truncate(summary, 8000) + '\n```\n';
              body += '</details>\n\n';
            }

            if (planEnv) {
              const summary = extractSummary(planEnv) || planEnv;
              body += '### `environments`\n';
              body += '<details><summary>📋 Plan 输出（点击展开）</summary>\n\n';
              body += '```\n' + truncate(summary, 8000) + '\n```\n';
              body += '</details>\n\n';
            }

            if (!planDemo && !planEnv) {
              body += '> ⚠️ 未检测到需要 Plan 的变更目录。\n';
            }

            // Marker for finding/updating our own comment
            body += '\n<!-- iac-plan-bot -->';

            // Find existing comment by marker
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const botComment = comments.find(c => c.body.includes('<!-- iac-plan-bot -->'));

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
