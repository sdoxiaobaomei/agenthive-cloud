name: 🚀 IaC Apply (Demo)

# 手动触发：只在需要展示 Demo 环境时执行
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '确认创建 Demo 资源（约 ¥0.6/小时）'
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

jobs:
  apply:
    name: Terraform Apply (demo-ask)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'true' }}
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configure Aliyun OIDC Credentials
        run: |
          set -e
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.aliyuncs.com" | jq -r '.value')

          # 安装阿里云 CLI
          curl -fsSL "https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz" -o aliyun-cli.tgz
          tar -xzf aliyun-cli.tgz
          chmod +x aliyun
          sudo mv aliyun /usr/local/bin/
          aliyun configure set --region cn-beijing

          # 获取临时凭证（CLI 自动处理 RPC 签名）
          CREDS=$(aliyun sts AssumeRoleWithOIDC \
            --OIDCProviderArn "acs:ram::1261729158179509:oidc-provider/GitHubActions" \
            --RoleArn "acs:ram::1261729158179509:role/agenthive-cloud-github-actions-role" \
            --OIDCToken "$TOKEN" \
            --RoleSessionName "github-${GITHUB_RUN_ID}" \
            --DurationSeconds 3600)

          echo "ALICLOUD_ACCESS_KEY=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
          echo "ALICLOUD_SECRET_KEY=$(echo "$CREDS" | jq -r '.Credentials.AccessKeySecret')" >> $GITHUB_ENV
          echo "ALICLOUD_SECURITY_TOKEN=$(echo "$CREDS" | jq -r '.Credentials.SecurityToken')" >> $GITHUB_ENV

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: 💾 Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('iac/alicloud/terraform/demo-ask/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: 🔧 Terraform Init
        working-directory: iac/alicloud/terraform/demo-ask
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          terraform init -input=false

      - name: 📋 Terraform Plan
        working-directory: iac/alicloud/terraform/demo-ask
        run: terraform plan -input=false -no-color -lock=false

      - name: 🚀 Terraform Apply
        working-directory: iac/alicloud/terraform/demo-ask
        run: terraform apply -input=false -auto-approve -no-color -lock=false

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 IaC Apply Summary (demo-ask)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **状态** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **执行者** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **触发方式** | workflow_dispatch |" >> $GITHUB_STEP_SUMMARY
          echo "| **成本** | 约 ¥0.6/小时 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 使用完毕后请运行 **IaC Destroy (Demo)** 工作流销毁资源，避免持续计费。" >> $GITHUB_STEP_SUMMARY
