name: Deploy to Alibaba Cloud

on:
  push:
    branches: [ main, staging ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  NAMESPACE: agenthive
  REGION: cn-beijing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/api
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/landing
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      # Build and push API
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      # Build and push Landing
      - name: Build and push Landing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/landing/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      # Build and push Agent Runtime
      - name: Build and push Agent Runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/agent-runtime/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/agent-runtime:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save image tag
      - name: Save image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 🐳 ACR Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/api:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Landing** | ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/landing:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Agent Runtime** | ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/agent-runtime:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 部署到 ACK 请使用 IaC Apply (Demo) 或手动 kubectl 操作。" >> $GITHUB_STEP_SUMMARY
