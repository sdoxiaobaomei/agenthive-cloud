name: Develop CI/CD — Build, Push to ACR, Deploy via ArgoCD

# ============================================================
# 触发条件：develop 分支的 push（包括 merge）
# ============================================================
on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'k8s/overlays/local/kustomization.yaml'  # 避免自引用循环触发
      - '**.md'
      - '.github/workflows/**'

# ============================================================
# 权限：需要写入仓库内容（更新 manifest tag）
# ============================================================
permissions:
  contents: write

env:
  ACR_REGISTRY: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: namespace-alpha
  KUSTOMIZE_PATH: k8s/overlays/local
  GIT_USER_NAME: "GitHub Actions"
  GIT_USER_EMAIL: "actions@github.com"

jobs:
  # ==========================================================
  # Job 1: 构建并推送所有镜像到 ACR
  # ==========================================================
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # 矩阵构建：所有服务并行
      matrix:
        service:
          - name: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
          - name: landing
            context: ./apps/landing
            dockerfile: ./apps/landing/Dockerfile
          - name: auth-service
            context: ./apps/auth-service
            dockerfile: ./apps/auth-service/Dockerfile
          - name: cart-service
            context: ./apps/cart-service
            dockerfile: ./apps/cart-service/Dockerfile
          - name: gateway-service
            context: ./apps/gateway-service
            dockerfile: ./apps/gateway-service/Dockerfile
          - name: logistics-service
            context: ./apps/logistics-service
            dockerfile: ./apps/logistics-service/Dockerfile
          - name: order-service
            context: ./apps/order-service
            dockerfile: ./apps/order-service/Dockerfile
          - name: payment-service
            context: ./apps/payment-service
            dockerfile: ./apps/payment-service/Dockerfile

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0  # 需要完整 history 用于 tag

      # 2. 登录阿里云 ACR
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. 设置 Docker Buildx（支持多平台缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 提取 short SHA（作为镜像 tag）
      - name: Extract short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 5. 构建并推送镜像（带缓存）
      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.service.name }}:${{ steps.vars.outputs.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.service.name }}:develop-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=development
            BUILD_SHA=${{ steps.vars.outputs.sha }}

      # 6. 输出镜像地址（用于调试）
      - name: Print image digest
        run: |
          echo "Built: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.service.name }}:${{ steps.vars.outputs.sha }}"

  # ==========================================================
  # Job 2: 更新 Kustomize manifest tag，触发 ArgoCD 自动同步
  # ==========================================================
  update-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      # 1. 检出代码（需要 write 权限 push 回仓库）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. 提取 short SHA
      - name: Extract short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 3. 安装 Kustomize（用于验证）
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # 4. 更新 kustomization.yaml 的镜像 tag
      - name: Update Kustomize image tags
        run: |
          cd ${{ env.KUSTOMIZE_PATH }}
          
          # 定义需要更新的服务列表
          SERVICES=(api landing auth-service cart-service gateway-service logistics-service order-service payment-service)
          
          for svc in "${SERVICES[@]}"; do
            kustomize edit set image "${svc}=${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${svc}}:${{ steps.vars.outputs.sha }}"
          done
          
          # nacos 保持 v2.3.0 不变（基础设施不随业务代码更新）
          echo "Updated image tags to: ${{ steps.vars.outputs.sha }}"

      # 5. 验证 Kustomize 构建
      - name: Validate Kustomize build
        run: |
          cd ${{ env.KUSTOMIZE_PATH }}
          kustomize build . > /dev/null
          echo "Kustomize build validation passed"

      # 6. Commit 并 push 更新后的 manifest
      - name: Commit and push manifest update
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"
          
          # 检查是否有变更
          if git diff --quiet; then
            echo "No changes to commit. Skipping."
            exit 0
          fi
          
          git add ${{ env.KUSTOMIZE_PATH }}/kustomization.yaml
          git commit -m "chore(k8s): update develop image tags to ${{ steps.vars.outputs.sha }}

          Auto-generated by GitHub Actions
          - All services built from commit ${{ steps.vars.outputs.sha }}
          - ArgoCD will auto-sync to develop cluster
          
          [skip ci]"
          
          git push origin develop

      # 7. 输出 ArgoCD 同步状态链接
      - name: Print ArgoCD sync info
        run: |
          echo "======================================"
          echo "ArgoCD Application: agenthive-develop"
          echo "Target Cluster:   https://100.76.250.86:57116"
          echo "Target Namespace: agenthive"
          echo "New Image Tag:    ${{ steps.vars.outputs.sha }}"
          echo "======================================"
          echo "ArgoCD 将在 3-5 分钟内自动检测到 manifest 变更并触发同步"
          echo "可通过 ArgoCD UI 或 CLI 查看同步进度"
