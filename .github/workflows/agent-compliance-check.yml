name: Agent Compliance Gate

on:
  pull_request:
    branches: [master, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'AGENTS/**'
      - 'k8s/**'
      - 'chart/**'
      - 'iac/**'
      - '.github/workflows/**'
  push:
    branches: [master, develop]

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Check ADR-1: Gateway JWT Only"
        run: |
          # ADR-1: 只有 Gateway 层解析 JWT，下游服务只认 X-User-Id header
          # 白名单: gateway-service(网关), auth-service(认证中心), test文件, logger工具
          VIOLATIONS=$(
            grep -rniE "jwt\.verify\s*\(|Jwts\.parser\(\)|jsonwebtoken.*verify" \
              apps/java/*/src/ \
              apps/api/src/ \
              --include="*.ts" --include="*.java" 2>/dev/null | \
            grep -viE "Test\.java$|test\.ts$|gateway-service/|auth-service/|logger\.ts" || true
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::ADR-1 Violation: Downstream services must NOT parse JWT"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ ADR-1: Gateway JWT Only"

      - name: "Check ADR-4: Agent Async Only"
        run: |
          # ADR-4: Agent 任务编排必须异步化（Redis Streams），禁止直接 spawn worker
          # 白名单: tools/(工具层允许), mcp/(MCP客户端允许), agent/isolation/(隔离工具允许)
          VIOLATIONS=$(
            grep -rniE "spawn\s*\(|exec\s*\(" \
              apps/agent-runtime/src/services/ \
              apps/agent-runtime/src/agent/ \
              AGENTS/ \
              --include="*.ts" --include="*.js" 2>/dev/null | \
            grep -viE "tools/|mcp/|isolation/" || true
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::ADR-4 Violation (non-blocking): Agent tasks should use Redis Streams, not direct spawn"
            echo "$VIOLATIONS"
            echo "Note: This is a known technical debt. Refactor required to fully comply with ADR-4."
          fi
          echo "✅ ADR-4: Agent Async Only (checked)"

      - name: "Check ADR-5: OTel Required"
        run: |
          # ADR-5: 运行中的后端服务必须接入 OTel
          FAIL=0
          for pkg in apps/*/package.json; do
            APP=$(basename "$(dirname "$pkg")")
            [[ "$APP" == "landing" || "$APP" == "web" || "$APP" == "java" ]] && continue
            if ! grep -q "opentelemetry" "$pkg" 2>/dev/null; then
              echo "::error::ADR-5 Violation: $APP missing OpenTelemetry dependency"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
          echo "✅ ADR-5: OTel Required"

      - name: Check Hardcoded Secrets
        run: |
          VIOLATIONS=$(
            grep -rniE "(password|secret|api[_-]?key)\s*=\s*['\"][^'\"]{8,}['\"]" \
              apps/ packages/ AGENTS/ \
              --include="*.ts" --include="*.js" --include="*.yaml" --include="*.yml" \
              2>/dev/null | grep -viE "example|EXAMPLE|password\s*=\s*['\"]?['\"]?|getEnv|process.env" || true
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Hardcoded secret detected:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No hardcoded secrets"

      - name: Check Commit Message Format
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 2>/dev/null || true
          BASE_REF="origin/${{ github.base_ref }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_REF="HEAD~1"
          fi
          BAD_COMMITS=$(
            git log "$BASE_REF"..HEAD --pretty=format:"%s" --no-merges | \
            grep -vE "^(feat|fix|docs|style|refactor|test|chore|security|perf|ci|build)(\(.+\))?: .+" || true
          )
          if [ -n "$BAD_COMMITS" ]; then
            echo "::error::Non-conventional commit messages found:"
            echo "$BAD_COMMITS"
            echo ""
            echo "Expected format: type(scope): description"
            echo "Example: feat(api): add user auth endpoint"
            exit 1
          fi
          echo "✅ Commit messages follow Conventional Commits"
