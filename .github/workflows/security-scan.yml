name: 🔒 Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # 每周日凌晨 2 点自动扫描
    - cron: '0 2 * * 0'

jobs:
  # ===========================================
  # Container Security Scan
  # ===========================================
  trivy-scan:
    name: 🐳 Container Security (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt update
          sudo apt install -y trivy

      - name: 🐳 Build Docker images for scanning
        run: |
          docker build -t agenthive-api:scan -f apps/api/Dockerfile .
          docker build -t agenthive-landing:scan -f apps/landing/Dockerfile .

      - name: 🔍 Scan API image
        run: |
          trivy image --severity HIGH,CRITICAL --format sarif --output api-results.sarif agenthive-api:scan
        continue-on-error: true

      - name: 🔍 Scan Landing image
        run: |
          trivy image --severity HIGH,CRITICAL --format sarif --output landing-results.sarif agenthive-landing:scan
        continue-on-error: true

      - name: 📤 Upload API results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api-results.sarif
          category: trivy-api
        continue-on-error: true

      - name: 📤 Upload Landing results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: landing-results.sarif
          category: trivy-landing
        continue-on-error: true

      - name: 📊 Generate Security Report
        if: always()
        run: |
          echo "## 🔒 Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Tool:** Trivy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### API Image" >> $GITHUB_STEP_SUMMARY
          trivy image --severity HIGH,CRITICAL agenthive-api:scan >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Landing Image" >> $GITHUB_STEP_SUMMARY
          trivy image --severity HIGH,CRITICAL agenthive-landing:scan >> $GITHUB_STEP_SUMMARY || true

  # ===========================================
  # Dependency Security Scan
  # ===========================================
  dependency-scan:
    name: 📦 Dependency Security (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 📥 Install dependencies
        run: |
          cd apps
          pnpm install --frozen-lockfile

      - name: 🔍 Run npm audit
        run: |
          cd apps
          pnpm audit --audit-level=high || echo "Vulnerabilities found, check report"

      - name: 📊 Audit Summary
        run: |
          echo "## 📦 Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Tool:** pnpm audit" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # SAST - Static Analysis Security Testing
  # ===========================================
  sast-scan:
    name: 🔍 SAST (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 📥 Install dependencies
        run: |
          cd apps
          pnpm install --frozen-lockfile

      - name: 🔨 Build
        run: |
          cd apps
          pnpm run build || echo "Build skipped"

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
