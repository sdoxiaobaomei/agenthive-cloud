name: 🚀 Deploy to K3s

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/**'
      - 'Dockerfile*'
      - 'chart/**'
      - '.github/workflows/deploy-k3s.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (默认: git sha)'
        required: false
        default: ''
      dry_run:
        description: '仅渲染模板，不实际部署'
        required: false
        default: 'false'
      namespace:
        description: 'K8s 命名空间'
        required: false
        default: 'agenthive'

env:
  REGISTRY: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
  IMAGE_API: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/agenthive/api
  IMAGE_LANDING: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/agenthive/landing
  IMAGE_JAVA_PREFIX: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/agenthive
  CHART_PATH: chart/agenthive
  VALUES_FILE: chart/agenthive/values.prod.yaml
  K3S_HOST: 39.107.87.106
  HELM_TIMEOUT: 10m

# =============================================================================
# Image Promotion Flow (Dev → Prod Consistency)
# TICKET: PLATFORM-021-optimization
# 
# 1. DEV: Developers build images locally and test on local K3s
#    bash scripts/archive/build-local-k8s.sh
#    kubectl apply -k k8s/overlays/local/
# 
# 2. PROMOTION: Once dev testing passes, CI builds ALL images with a unified tag
#    and pushes them to the production registry. This guarantees that the exact
#    same image digest tested in dev is what runs in prod.
# 
# 3. PROD: This workflow deploys the unified tag to production K3s via Helm.
#    If deployment fails, automatic rollback is triggered.
# =============================================================================

jobs:
  # ===========================================
  # Stage 1: Build & Push Images
  # ===========================================
  build:
    name: 🔨 Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v1.1.0-g$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using image tag: $TAG"

      - name: 🔐 Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 🐳 Build & Push API Image
        run: |
          docker build -t ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }} -f Dockerfile.api .
          docker push ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}

      - name: 🐳 Build & Push Landing Image
        run: |
          docker build -t ${{ env.IMAGE_LANDING }}:${{ steps.meta.outputs.tag }} -f Dockerfile.landing .
          docker push ${{ env.IMAGE_LANDING }}:${{ steps.meta.outputs.tag }}

      # Java images are built separately or assumed pre-built by CI
      - name: 🏷️ Tag Java Images (pre-built)
        run: |
          for svc in gateway auth user payment order cart logistics; do
            docker pull ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:latest || true
            docker tag ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:latest ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${{ steps.meta.outputs.tag }} || true
            docker push ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${{ steps.meta.outputs.tag }} || true
          done

  # ===========================================
  # Stage 2: Deploy to K3s
  # ===========================================
  deploy:
    name: 🚀 Deploy to K3s
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment:
      name: production
      url: https://agenthive.cloud
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Update image tags in values.prod.yaml
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          sed -i "s/tag: \"1.1.0\"/tag: \"$TAG\"/g" ${{ env.VALUES_FILE }}
          echo "Updated image tag to $TAG"
          grep "tag:" ${{ env.VALUES_FILE }} | head -5

      - name: 🔐 Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🚀 Helm Upgrade (Dry Run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          helm template agenthive ${{ env.CHART_PATH }} \
            -f ${{ env.VALUES_FILE }} \
            -n ${{ github.event.inputs.namespace || 'agenthive' }}

      - name: 🚀 Helm Upgrade
        if: github.event.inputs.dry_run != 'true'
        run: |
          helm upgrade --install agenthive ${{ env.CHART_PATH }} \
            -f ${{ env.VALUES_FILE }} \
            -n ${{ github.event.inputs.namespace || 'agenthive' }} \
            --create-namespace \
            --atomic \
            --timeout ${{ env.HELM_TIMEOUT }} \
            --wait \
            --cleanup-on-fail

      - name: ⏳ Wait for rollout
        if: github.event.inputs.dry_run != 'true'
        run: |
          kubectl rollout status deployment/api -n ${{ github.event.inputs.namespace || 'agenthive' }} --timeout=5m
          kubectl rollout status deployment/landing -n ${{ github.event.inputs.namespace || 'agenthive' }} --timeout=5m

      - name: 🩺 Health Check
        if: github.event.inputs.dry_run != 'true'
        run: |
          bash scripts/deploy/verify-deployment.sh \
            --namespace ${{ github.event.inputs.namespace || 'agenthive' }} \
            --timeout 180

      - name: 🧹 Cleanup on failure
        if: failure() && github.event.inputs.dry_run != 'true'
        run: |
          echo "⚠️ Deployment failed. Triggering rollback..."
          bash scripts/deploy/rollback-k3s.sh \
            --namespace ${{ github.event.inputs.namespace || 'agenthive' }} \
            --revision -1
