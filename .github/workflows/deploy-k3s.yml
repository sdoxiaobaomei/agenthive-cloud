name: 🚀 Deploy to K3s

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/**'
      - 'Dockerfile*'
      - 'chart/**'
      - '.github/workflows/deploy-k3s.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (默认: git sha)'
        required: false
        default: ''
      dry_run:
        description: '仅渲染模板，不实际部署'
        required: false
        default: 'false'
      namespace:
        description: 'K8s 命名空间'
        required: false
        default: 'agenthive'

env:
  REGISTRY: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com
  NAMESPACE: namespace-alpha
  IMAGE_API: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/api
  IMAGE_LANDING: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/landing
  IMAGE_JAVA_PREFIX: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha
  CHART_PATH: chart/agenthive
  VALUES_FILE: chart/agenthive/values.prod.yaml
  K3S_HOST: 39.107.87.106
  HELM_TIMEOUT: 10m

# =============================================================================
# Image Promotion Flow (Dev → Prod Consistency)
# TICKET: PLATFORM-021-optimization
# 
# 1. DEV: Developers build images locally and test on local K3s
#    bash scripts/archive/build-local-k8s.sh
#    kubectl apply -k k8s/overlays/local/
# 
# 2. PROMOTION: Once dev testing passes, CI builds ALL images with a unified tag
#    and pushes them to the production registry. This guarantees that the exact
#    same image digest tested in dev is what runs in prod.
# 
# 3. PROD: This workflow deploys the unified tag to production K3s via Helm.
#    If deployment fails, automatic rollback is triggered.
# =============================================================================

jobs:
  # ===========================================
  # Stage 1: Build & Push Images
  # ===========================================
  build:
    name: 🔨 Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Determine image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="v1.1.0-g$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using image tag: $TAG"

      - name: 🔐 Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 📦 Build API Workspace
        run: |
          npm install -g pnpm@9
          pnpm install --frozen-lockfile
          pnpm --filter=@agenthive/observability build
          pnpm --filter=@agenthive/agent-runtime build
          pnpm --filter=@agenthive/api build

      - name: 🐳 Build & Push API Image
        run: |
          docker build -t ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }} -f apps/api/Dockerfile .
          docker push ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}

      - name: 🐳 Build & Push Landing Image
        run: |
          docker build -t ${{ env.IMAGE_LANDING }}:${{ steps.meta.outputs.tag }} -f apps/landing/Dockerfile .
          docker push ${{ env.IMAGE_LANDING }}:${{ steps.meta.outputs.tag }}

      # Java images: build from source with Maven, then push with unified tag
      - name: ☕ Setup Java & Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔨 Build Java Services (Maven)
        run: |
          cd apps/java
          mvn clean package -DskipTests -q
          echo "Java JARs built:"
          find . -name "*.jar" -path "*/target/*" | grep -v original

      - name: 📥 Download OpenTelemetry Java Agent
        run: |
          AGENT_URL="https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.6.0/opentelemetry-javaagent.jar"
          for svc in gateway-service auth-service user-service payment-service order-service cart-service logistics-service; do
            wget -q -O apps/java/${svc}/opentelemetry-javaagent-2.6.0.jar "$AGENT_URL"
            echo "Downloaded agent for $svc"
          done

      - name: 🏷️ Build & Push Java Images
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          for svc in gateway-service auth-service user-service payment-service order-service cart-service logistics-service; do
            echo "Building $svc ..."
            docker build \
              -t ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${TAG} \
              -f apps/java/${svc}/Dockerfile \
              --build-arg VERSION=${TAG} \
              --build-arg GIT_COMMIT=${{ github.sha }} \
              --build-arg BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
              apps/java/${svc}
            docker push ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${TAG}
            echo "Pushed ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${TAG}"
          done

  # ===========================================
  # Stage 2: Deploy to K3s
  # ===========================================
  deploy:
    name: 🚀 Deploy to K3s
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment:
      name: production
      url: https://agenthive.cloud
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Prepare Helm values
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          echo "Using image tag: $TAG"
          # Verify all images exist before deploying
          for svc in api landing gateway auth user payment order cart logistics; do
            if ! docker manifest inspect ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${TAG} > /dev/null 2>&1; then
              echo "⚠️ Image ${{ env.IMAGE_JAVA_PREFIX }}/${svc}:${TAG} not found in registry"
            fi
          done

      - name: 🔐 Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🚀 Helm Upgrade (Dry Run)
        if: github.event.inputs.dry_run == 'true'
        run: |
          helm template agenthive ${{ env.CHART_PATH }} \
            -f ${{ env.VALUES_FILE }} \
            -n ${{ github.event.inputs.namespace || 'agenthive' }}

      - name: 🚀 Helm Upgrade
        if: github.event.inputs.dry_run != 'true'
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          helm upgrade --install agenthive ${{ env.CHART_PATH }} \
            -f ${{ env.VALUES_FILE }} \
            --set global.imageRegistry=${{ env.REGISTRY }} \
            --set api.image.repository=${{ env.NAMESPACE }}/api \
            --set landing.image.repository=${{ env.NAMESPACE }}/landing \
            --set javaServices.defaults.image.repositoryPrefix=${{ env.NAMESPACE }} \
            --set api.image.tag="$TAG" \
            --set landing.image.tag="$TAG" \
            --set javaServices.defaults.image.tag="$TAG" \
            -n ${{ github.event.inputs.namespace || 'agenthive' }} \
            --create-namespace \
            --atomic \
            --timeout ${{ env.HELM_TIMEOUT }} \
            --wait \
            --cleanup-on-fail

      - name: ⏳ Wait for rollout
        if: github.event.inputs.dry_run != 'true'
        run: |
          kubectl rollout status deployment/api -n ${{ github.event.inputs.namespace || 'agenthive' }} --timeout=5m
          kubectl rollout status deployment/landing -n ${{ github.event.inputs.namespace || 'agenthive' }} --timeout=5m

      - name: 🩺 Health Check
        if: github.event.inputs.dry_run != 'true'
        run: |
          bash scripts/deploy/verify-deployment.sh \
            --namespace ${{ github.event.inputs.namespace || 'agenthive' }} \
            --timeout 180

      - name: 🧹 Cleanup on failure
        if: failure() && github.event.inputs.dry_run != 'true'
        run: |
          echo "⚠️ Deployment failed. Triggering rollback..."
          bash scripts/deploy/rollback-k3s.sh \
            --namespace ${{ github.event.inputs.namespace || 'agenthive' }} \
            --revision -1
