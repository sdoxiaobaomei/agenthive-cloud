name: Environment Security Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  env-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for leaked LLM API keys
        run: |
          echo "=== Scanning for sk-kimi- API key patterns ==="
          if grep -rE "sk-kimi-[A-Za-z0-9]{20,}" --include=".env*" . 2>/dev/null; then
            echo "::error::Real LLM API key (sk-kimi-...) detected in .env files"
            exit 1
          fi
          echo "OK: No leaked LLM API keys found"

      - name: Check .env.prod CORS_ORIGIN is not localhost
        run: |
          echo "=== Checking .env.prod CORS_ORIGIN ==="
          if [ -f .env.prod ]; then
            CORS=$(grep "^CORS_ORIGIN=" .env.prod | cut -d= -f2- || true)
            if echo "$CORS" | grep -qi "localhost"; then
              echo "::error::.env.prod CORS_ORIGIN contains localhost: $CORS"
              exit 1
            fi
          fi
          echo "OK: .env.prod CORS_ORIGIN is safe"

      - name: Check .env.prod for weak Nacos token
        run: |
          echo "=== Checking .env.prod NACOS_AUTH_TOKEN ==="
          if [ -f .env.prod ]; then
            TOKEN=$(grep "^NACOS_AUTH_TOKEN=" .env.prod | cut -d= -f2- | tr -d ' ' || true)
            if [ -n "$TOKEN" ] && echo "$TOKEN" | grep -qE "<NACOS_AUTH_TOKEN>"; then
              echo "::error::Weak default NACOS_AUTH_TOKEN detected in .env.prod"
              exit 1
            fi
          fi
          echo "OK: NACOS_AUTH_TOKEN is not the weak default"

      - name: Validate .env.prod with script
        run: |
          if [ -f scripts/ops/validate-env.sh ]; then
            bash scripts/ops/validate-env.sh .env.prod
          else
            echo "WARNING: scripts/ops/validate-env.sh not found, skipping extended validation"
          fi
