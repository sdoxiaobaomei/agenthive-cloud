name: 💥 IaC Destroy (Demo)

# 手动触发：展示结束后销毁 Demo 资源，停止计费
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '⚠️ 确认销毁所有 Demo 资源（不可恢复）'
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Terraform Destroy (demo-ask)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'true' }}
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Configure Aliyun OIDC Credentials
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.aliyuncs.com" | jq -r '.value')

          CREDS=$(curl -s "https://sts.aliyuncs.com/" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "Action=AssumeRoleWithOIDC" \
            --data "OIDCProviderArn=acs:ram::1261729158179509:oidc-provider/GitHubActions" \
            --data "RoleArn=acs:ram::1261729158179509:role/agenthive-cloud-github-actions-role" \
            --data "OIDCToken=$TOKEN" \
            --data "RoleSessionName=github-${GITHUB_RUN_ID}" \
            --data "DurationSeconds=3600" \
            --data "Format=JSON" \
            --data "Version=2015-04-01")

          echo "ALICLOUD_ACCESS_KEY=$(echo $CREDS | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
          echo "ALICLOUD_SECRET_KEY=$(echo $CREDS | jq -r '.Credentials.AccessKeySecret')" >> $GITHUB_ENV
          echo "ALICLOUD_SECURITY_TOKEN=$(echo $CREDS | jq -r '.Credentials.SecurityToken')" >> $GITHUB_ENV

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: 🔧 Terraform Init
        working-directory: iac/alicloud/terraform/demo-ask
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          terraform init -input=false

      - name: 📋 Terraform Plan (Destroy)
        working-directory: iac/alicloud/terraform/demo-ask
        run: terraform plan -destroy -input=false -no-color -lock=false

      - name: 💥 Terraform Destroy
        working-directory: iac/alicloud/terraform/demo-ask
        run: terraform destroy -input=false -auto-approve -no-color -lock=false

      - name: 📊 Destroy Summary
        if: always()
        run: |
          echo "## 💥 IaC Destroy Summary (demo-ask)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| **状态** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **执行者** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Demo 资源已销毁，计费停止。如需再次展示，请运行 **IaC Apply (Demo)** 工作流。" >> $GITHUB_STEP_SUMMARY
