      resources:
        limits:
          memory: 512M
    networks:
      - agenthive-prod
    profiles:
      - java

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: agenthive-nacos-prod
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=${NACOS_AUTH_TOKEN:-<NACOS_AUTH_TOKEN>}
      - NACOS_AUTH_IDENTITY_KEY=${NACOS_AUTH_IDENTITY_KEY:-agenthive}
      - NACOS_AUTH_IDENTITY_VALUE=${NACOS_AUTH_IDENTITY_VALUE:-agenthive-secret-2024}
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - agenthive-prod
    profiles:
      - java

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: agenthive-rabbitmq-prod
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-agenthive}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-agenthive-secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - agenthive-prod
    profiles:
      - java

  # ==========================================
  # 监控栈（profile: monitoring）
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: agenthive-prometheus-prod
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agenthive-prod
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.0.0
    container_name: agenthive-grafana-prod
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3002:3000"
    networks:
      - agenthive-prod
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - monitoring

  tempo:
    image: grafana/tempo:2.5.0
    container_name: agenthive-tempo-prod
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    networks:
      - agenthive-prod
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - monitoring

  loki:
    image: grafana/loki:3.0.0
    container_name: agenthive-loki-prod
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - agenthive-prod
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: agenthive-otel-collector-prod
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./monitoring/opentelemetry/otel-collector/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - agenthive-prod
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - monitoring

networks:
  agenthive-prod:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
