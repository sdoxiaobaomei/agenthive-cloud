      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=order_db
      - DB_USER=${DB_USER:-agenthive}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-172.24.146.165}
