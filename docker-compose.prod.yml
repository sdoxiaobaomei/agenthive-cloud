# ============================================================================
# AgentHive Cloud - Production Stack
# ECS 部署配置：业务层运行在 ECS，数据库/Redis 连接远端 2+2 服务器
#
# 默认启动：Nginx + API + Landing（镜像拉取）
# Profile 扩展：
#   --profile java        → Nacos + RabbitMQ + Java Gateway/Auth/User
#   --profile monitoring  → Prometheus + Grafana + Tempo + Loki + OTel
#
# 启动命令：
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ============================================================================

services:
  # ==========================================
  # Nginx - 统一入口（默认启用）
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: agenthive-nginx-prod
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      landing:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - agenthive-prod

  # ==========================================
  # API 服务（镜像拉取）
  # ==========================================
  api:
    image: ${API_IMAGE:-crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/api:latest}
    pull_policy: always
    container_name: agenthive-api-prod
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # ===== 远端数据层（2+2 ECS）=====
      - DB_HOST=${DB_HOST:-172.24.146.165}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-agenthive}
      - DB_USER=${DB_USER:-agenthive}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-172.24.146.165}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_URL=redis://${REDIS_HOST:-172.24.146.165}:${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # ===== LLM =====
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.kimi.com/coding/v1}
      - LLM_MODEL=${LLM_MODEL:-kimi-for-coding}
      - LLM_USER_AGENT=${LLM_USER_AGENT:-claude-code/0.1.0}
      # ===== 其他 =====
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,https://localhost}
      - UV_THREADPOOL_SIZE=4
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - agenthive-prod

  # ==========================================
  # Landing（镜像拉取）
  # ==========================================
  landing:
    image: ${LANDING_IMAGE:-crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/landing:latest}
    pull_policy: always
    container_name: agenthive-landing-prod
    ports:
      - "${LANDING_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NITRO_PORT=3000
      - API_URL=http://api:3001
      - GATEWAY_URL=http://gateway-service:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - agenthive-prod

  # ==========================================
  # Java 微服务（profile: java）
  # ==========================================
  java-gateway:
    image: ${GATEWAY_IMAGE:-crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/gateway-service:latest}
    pull_policy: always
    container_name: agenthive-java-gateway-prod
    environment:
      - JAVA_OPTS=-Xms256m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=100
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_NACOS_CONFIG_IMPORT_CHECK_ENABLED=false
      # ===== Nacos（开启认证）=====
      - NACOS_SERVER=nacos:8848
      - NACOS_HOST=nacos
      - NACOS_PORT=8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - NACOS_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_PASSWORD=${NACOS_PASSWORD:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=${NACOS_PASSWORD:-nacos}
      - SPRING_CLOUD_NACOS_CONFIG_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_CONFIG_PASSWORD=${NACOS_PASSWORD:-nacos}
      # ===== Redis =====
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-172.24.146.165}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      nacos:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - agenthive-prod
    profiles:
      - java

  java-auth:
