# ==========================================
# AgentHive Cloud - Docker Compose
# ==========================================

version: '3.8'

services:
  # -----------------------------------------
  # PostgreSQL Database
  # -----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agenthive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agenthive}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agenthive_secret}
      POSTGRES_DB: ${DB_NAME:-agenthive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agenthive}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agenthive-network

  # -----------------------------------------
  # Redis Cache
  # -----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agenthive-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agenthive-network

  # -----------------------------------------
  # Supervisor Backend
  # -----------------------------------------
  supervisor:
    build:
      context: ./apps/supervisor
      dockerfile: Dockerfile
      target: ${SUPERVISOR_TARGET:-production}
    container_name: agenthive-supervisor
    restart: unless-stopped
    environment:
      - PORT=${SUPERVISOR_PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agenthive}
      - DB_PASSWORD=${DB_PASSWORD:-agenthive_secret}
      - DB_NAME=${DB_NAME:-agenthive}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${SUPERVISOR_PORT:-8080}:8080"
    volumes:
      - ./config:/config:ro
      - supervisor_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agenthive-network

  # -----------------------------------------
  # Web Frontend
  # -----------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: ${WEB_TARGET:-production}
    container_name: agenthive-web
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      supervisor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agenthive-network

  # -----------------------------------------
  # Nginx Reverse Proxy (Optional)
  # -----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: agenthive-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - supervisor
    networks:
      - agenthive-network
    profiles:
      - with-nginx

  # -----------------------------------------
  # MinIO Object Storage (Optional)
  # -----------------------------------------
  minio:
    image: minio/minio:latest
    container_name: agenthive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agenthive-network
    profiles:
      - with-storage

  # -----------------------------------------
  # Prometheus (Optional)
  # -----------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: agenthive-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - agenthive-network
    profiles:
      - monitoring

  # -----------------------------------------
  # Grafana (Optional)
  # -----------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: agenthive-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - agenthive-network
    profiles:
      - monitoring

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  supervisor_logs:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  agenthive-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
