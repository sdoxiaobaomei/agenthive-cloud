# ============================================================
# 全局补丁：副本数统一为 1（开发环境资源限制）
# ============================================================
# 说明：
# - 开发环境（PC Docker Desktop）资源有限，单副本即可。
# - 如需测试多副本场景，可手动 kubectl scale 或临时修改。
# - 生产环境（overlays/production）副本数由 HPA 控制。

replicas:
- count: 1
  name: api
- count: 1
  name: landing
- count: 1
  name: auth-service
- count: 1
  name: cart-service
- count: 1
  name: gateway-service
- count: 1
  name: logistics-service
- count: 1
  name: order-service
- count: 1
  name: payment-service
- count: 1
  name: nacos
- count: 1
  name: redis
- count: 1
  name: rabbitmq

# ============================================================
# 补丁列表
# ============================================================

  # 1. Dev 环境禁用 OpenTelemetry（collector 未部署时避免日志噪音）

  # 2. Gateway CORS: local 环境通配端口，零摩擦开发体验

  # 4. Landing Service targetPort 修正（Dockerfile 暴露 80，base 写 3000）

  # 5. Gateway Service 在 dev 环境使用 ClusterIP 而非 LoadBalancer
patches:
- patch: |-
    - op: replace
      path: /data/OTEL_SDK_DISABLED
      value: "true"
    - op: replace
      path: /data/OTEL_EXPORTER_OTLP_ENDPOINT
      value: ""
  target:
    kind: ConfigMap
    name: app-config
- patch: |-
    - op: replace
      path: /data
      value:
        application.yml: |
          spring:
            cloud:
              gateway:
                globalcors:
                  add-to-simple-url-handler-mapping: true
                  cors-configurations:
                    '[/**]':
                      allowedOrigins:
                        - "http://agenthive.local:8080"
                        - "http://agenthive.local:3000"
                        - "http://localhost:3000"
                        - "http://localhost:5173"
                        - "http://localhost:8080"
                      allowedMethods:
                        - GET
                        - POST
                        - PUT
                        - DELETE
                        - PATCH
                        - OPTIONS
                      allowedHeaders:
                        - Content-Type
                        - Accept
                        - Authorization
                        - X-Query-Params
                        - X-Requested-With
                        - X-User-Id
                        - X-User-Name
                        - X-User-Role
                      allowCredentials: true
                      maxAge: 3600
  target:
    kind: ConfigMap
    name: gateway-cors-config
- patch: |-
    - op: replace
      path: /spec/ports/0/targetPort
      value: 80
  target:
    kind: Service
    name: landing
- patch: |-
    - op: replace
      path: /spec/type
      value: ClusterIP
  target:
    kind: Service
    name: gateway-service

labels:
- includeTemplates: true
  pairs:
    environment: local
