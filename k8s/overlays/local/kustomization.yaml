apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive

resources:
  - ../../base

# 本地覆盖：使用本地镜像
images:
  - name: agenthive/api
    newTag: latest
  - name: agenthive/landing
    newTag: latest

# 本地覆盖：使用本地镜像，不拉取远程
patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: landing
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

# 本地资源限制调整
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: landing
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

labels:
  - pairs:
      environment: local
    includeSelectors: true
    includeTemplates: true

namePrefix: local-
