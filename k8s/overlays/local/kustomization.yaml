apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 开发环境命名空间
namespace: agenthive

resources:
  - ../../base
  - ../../components/data-layer
  - nodeport-services.yaml
  - localhost-ingress.yaml

# ============================================================
# 镜像策略：统一使用阿里云 ACR（企业最佳实践）
# ============================================================
# 说明：
# - Dev 环境不再使用本地镜像（imagePullPolicy: Never），
#   改为从 ACR 拉取，与 Prod 保持镜像一致性。
# - CI/CD 流程：GitHub Actions 构建 → push 到 ACR →
#   ArgoCD 自动检测到 manifest 更新 → 同步到集群。
# - ACR registry 地址需与生产环境保持一致。

images:
  # Node.js 前端/服务
  - name: agenthive/api
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/api
    newTag: develop-latest
  - name: agenthive/landing
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/landing
    newTag: develop-latest
  # Java 微服务
  - name: agenthive/auth-service
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/auth-service
    newTag: develop-latest
  - name: agenthive/cart-service
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/cart-service
    newTag: develop-latest
  - name: agenthive/gateway-service
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/gateway-service
    newTag: develop-latest
  - name: agenthive/logistics-service
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/logistics-service
    newTag: develop-latest
  - name: agenthive/order-service
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/order-service
    newTag: develop-latest
  - name: agenthive/payment-service
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/payment-service
    newTag: develop-latest
  # 基础设施（从 Docker Hub 镜像到 ACR 镜像）
  - name: nacos/nacos-server
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/nacos-server
    newTag: v2.3.0

# ============================================================
# 全局补丁：副本数统一为 1（开发环境资源限制）
# ============================================================
# 说明：
# - 开发环境（PC Docker Desktop）资源有限，单副本即可。
# - 如需测试多副本场景，可手动 kubectl scale 或临时修改。
# - 生产环境（overlays/production）副本数由 HPA 控制。

replicas:
  - name: api
    count: 1
  - name: landing
    count: 1
  - name: auth-service
    count: 1
  - name: cart-service
    count: 1
  - name: gateway-service
    count: 1
  - name: logistics-service
    count: 1
  - name: order-service
    count: 1
  - name: payment-service
    count: 1
  - name: nacos
    count: 1
  - name: redis
    count: 1
  - name: rabbitmq
    count: 1

# ============================================================
# 补丁列表
# ============================================================

patches:
  # 1. Dev 环境禁用 OpenTelemetry（collector 未部署时避免日志噪音）
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      - op: replace
        path: /data/OTEL_SDK_DISABLED
        value: "true"
      - op: replace
        path: /data/OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""

  # 2. Gateway CORS: local 环境通配端口，零摩擦开发体验
  - target:
      kind: ConfigMap
      name: gateway-cors-config
    patch: |-
      - op: replace
        path: /data
        value:
          application.yml: |
            spring:
              cloud:
                gateway:
                  globalcors:
                    add-to-simple-url-handler-mapping: true
                    cors-configurations:
                      '[/**]':
                        allowedOrigins:
                          - "http://agenthive.local:8080"
                          - "http://agenthive.local:3000"
                          - "http://localhost:3000"
                          - "http://localhost:5173"
                          - "http://localhost:8080"
                        allowedMethods:
                          - GET
                          - POST
                          - PUT
                          - DELETE
                          - PATCH
                          - OPTIONS
                        allowedHeaders:
                          - Content-Type
                          - Accept
                          - Authorization
                          - X-Query-Params
                          - X-Requested-With
                          - X-User-Id
                          - X-User-Name
                          - X-User-Role
                        allowCredentials: true
                        maxAge: 3600

  # 3. Gateway Service 在 dev 环境使用 ClusterIP 而非 LoadBalancer
  - target:
      kind: Service
      name: gateway-service
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP

labels:
  - pairs:
      environment: local
    includeSelectors: false
    includeTemplates: true
