apiVersion: v1
kind: Service
metadata:
  name: api-nodeport
  namespace: agenthive
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
    name: http
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: landing-nodeport
  namespace: agenthive
  labels:
    app.kubernetes.io/name: landing
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: landing
  ports:
  - port: 3000
    targetPort: 80
    nodePort: 30000
    name: http
  type: NodePort
