apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive-production

resources:
  - ../../base

# 生产镜像配置
images:
  - name: agenthive/api
    newName: registry.cn-hangzhou.aliyuncs.com/agenthive/api
    newTag: v1.1.0
  - name: agenthive/landing
    newName: registry.cn-hangzhou.aliyuncs.com/agenthive/landing
    newTag: v1.1.0

# 生产副本数
replicas:
  - name: api
    count: 3
  - name: landing
    count: 3

# 生产资源限制和覆盖
patches:
  - target:
      kind: Ingress
      name: agenthive-ingress
    patch: |-
      - op: replace
        path: /metadata
        value:
          name: agenthive-ingress
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "50m"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
            nginx.ingress.kubernetes.io/rate-limit: "100"
            nginx.ingress.kubernetes.io/rate-limit-window: "1m"
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            nginx.ingress.kubernetes.io/hsts: "true"
            nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
            nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
            nginx.ingress.kubernetes.io/configuration-snippet: |
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      - op: replace
        path: /spec
        value:
          ingressClassName: nginx
          tls:
            - hosts:
                - agenthive.cloud
                - www.agenthive.cloud
                - api.agenthive.cloud
              secretName: production-tls-secret
          rules:
            - host: agenthive.cloud
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: prod-landing
                        port:
                          number: 3000
            - host: www.agenthive.cloud
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: prod-landing
                        port:
                          number: 3000
            - host: api.agenthive.cloud
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: prod-api
                        port:
                          number: 3001
  - target:
      kind: HorizontalPodAutoscaler
      name: api-hpa
    patch: |-
      - op: replace
        path: /spec/scaleTargetRef/name
        value: prod-api
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/behavior/scaleUp/stabilizationWindowSeconds
        value: 60
      - op: replace
        path: /spec/behavior/scaleUp/policies
        value:
          - type: Percent
            value: 100
            periodSeconds: 15
  - target:
      kind: HorizontalPodAutoscaler
      name: landing-hpa
    patch: |-
      - op: replace
        path: /spec/scaleTargetRef/name
        value: prod-landing
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/behavior/scaleUp/stabilizationWindowSeconds
        value: 60
      - op: replace
        path: /spec/behavior/scaleUp/policies
        value:
          - type: Percent
            value: 100
            periodSeconds: 15
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
  - target:
      kind: Deployment
      name: landing
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
  - target:
      kind: PodDisruptionBudget
      name: api
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
  - target:
      kind: PodDisruptionBudget
      name: landing
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2

labels:
  - pairs:
      environment: production
    includeSelectors: true
    includeTemplates: true

namePrefix: prod-
