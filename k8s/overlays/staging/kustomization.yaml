apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive-staging

resources:
  - ../../base
  - ingress.yaml

# 镜像配置
images:
  - name: agenthive/api
    newName: registry.cn-hangzhou.aliyuncs.com/agenthive/api
    newTag: staging
  - name: agenthive/landing
    newName: registry.cn-hangzhou.aliyuncs.com/agenthive/landing
    newTag: staging

# 副本数调整
replicas:
  - name: api
    count: 2
  - name: landing
    count: 2

# 资源限制调整（测试环境）
patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
  - target:
      kind: Deployment
      name: landing
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"

commonLabels:
  environment: staging

namePrefix: staging-
