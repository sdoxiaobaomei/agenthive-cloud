apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive-staging

resources:
  - ../../base

# 镜像配置
images:
  - name: agenthive/api
    newName: registry.cn-hangzhou.aliyuncs.com/agenthive/api
    newTag: staging
  - name: agenthive/landing
    newName: registry.cn-hangzhou.aliyuncs.com/agenthive/landing
    newTag: staging

# 副本数调整
replicas:
  - name: api
    count: 2
  - name: landing
    count: 2

# 资源限制和 Ingress 覆盖
patches:
  - target:
      kind: Ingress
      name: agenthive-ingress
    patch: |-
      - op: replace
        path: /metadata
        value:
          name: agenthive-ingress
          annotations:
            nginx.ingress.kubernetes.io/rewrite-target: "/"
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
            cert-manager.io/cluster-issuer: "letsencrypt-staging"
      - op: replace
        path: /spec
        value:
          ingressClassName: nginx
          tls:
            - hosts:
                - staging.agenthive.cloud
                - api-staging.agenthive.cloud
              secretName: staging-tls-secret
          rules:
            - host: staging.agenthive.cloud
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: staging-landing
                        port:
                          number: 3000
            - host: api-staging.agenthive.cloud
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: staging-api
                        port:
                          number: 3001
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
  - target:
      kind: Deployment
      name: landing
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"

labels:
  - pairs:
      environment: staging
    includeSelectors: true
    includeTemplates: true

namePrefix: staging-
