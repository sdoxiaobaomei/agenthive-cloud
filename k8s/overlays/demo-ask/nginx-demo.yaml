# ============================================================================
# Nginx Demo 应用
# ============================================================================
# 这是一个极简的 K8s 应用，用于验证 ASK 集群是否正常工作。
# 使用官方 Nginx 镜像，无需构建或私有仓库。
#
# 部署后验证方式:
#   kubectl get pods -n agenthive          # 查看 Pod 是否 Running
#   kubectl get svc -n agenthive           # 查看 Service
#   kubectl port-forward svc/nginx-demo 8080:80 -n agenthive  # 本地访问
#   浏览器访问 http://localhost:8080
# ============================================================================

# ----------------------------------------------------------------------------
# Deployment: 管理 Pod 的副本和更新
# ----------------------------------------------------------------------------
# Deployment 是 K8s 中最常用的工作负载控制器，负责:
#   - 维护指定数量的 Pod 副本
#   - 滚动更新（Rolling Update）
#   - 回滚（Rollback）
#   - 自我修复（Pod 故障时自动重建）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: agenthive
  labels:
    app.kubernetes.io/name: nginx-demo
    app.kubernetes.io/component: demo
spec:
  # replicas: 期望的 Pod 副本数量
  # Demo 场景只需 1 个即可验证功能
  replicas: 1

  # selector: 用于匹配哪些 Pod 属于此 Deployment
  # 必须与 template.metadata.labels 完全匹配
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-demo

  # template: Pod 模板，定义每个 Pod 的具体配置
  template:
    metadata:
      # labels: Pod 的标签，Service 通过此标签选择 Pod
      labels:
        app.kubernetes.io/name: nginx-demo
        app.kubernetes.io/component: demo
    spec:
      containers:
        # name: 容器名称，在同一个 Pod 内必须唯一
        - name: nginx

          # image: 容器镜像地址
          # 格式: {仓库}/{命名空间}/{镜像名}:{标签}
          # 这里使用 Docker Hub 官方镜像，ASK 可以直接拉取
          image: nginx:alpine

          # imagePullPolicy: 镜像拉取策略
          #   IfNotPresent = 本地没有时才拉取（推荐，减少不必要的拉取）
          #   Always = 每次启动都拉取（适合开发调试）
          #   Never = 从不拉取，只用本地镜像（ASK 不支持，因为 ECI 没有本地缓存）
          imagePullPolicy: IfNotPresent

          # ports: 容器暴露的端口
          - containerPort: 80
            name: http
            protocol: TCP

          # resources: 资源请求和限制
          #   requests: K8s 调度时保证分配给 Pod 的最小资源
          #   limits: Pod 可以使用的最大资源，超过会被限制或 OOMKilled
          #
          # ASK 计费基于实际使用的资源（以 requests 为准），
          # 所以 Demo 场景设置很小的值即可。
          resources:
            requests:
              memory: "32Mi"    # 请求 32MB 内存
              cpu: "50m"        # 请求 0.05 核 CPU（50 millicores）
            limits:
              memory: "64Mi"    # 限制 64MB 内存
              cpu: "100m"       # 限制 0.1 核 CPU

          # livenessProbe: 存活探针
          # 如果探测失败，K8s 会重启容器（认为应用已死）
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5   # 容器启动后等待 5 秒开始探测
            periodSeconds: 10        # 每 10 秒探测一次

          # readinessProbe: 就绪探针
          # 如果探测失败，Pod 会被从 Service 的端点列表中移除（停止接收流量）
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
# ----------------------------------------------------------------------------
# Service: 为 Pod 提供稳定的网络访问入口
# ----------------------------------------------------------------------------
# Service 是 K8s 的内置负载均衡器，作用:
#   - 为一组 Pod 提供一个统一的虚拟 IP（ClusterIP）
#   - 通过标签选择器(selector)自动发现后端 Pod
#   - Pod 重建后 IP 会变，但 Service IP 保持不变
#   - 支持多种类型: ClusterIP / NodePort / LoadBalancer / ExternalName
#
# 类型说明:
#   ClusterIP: 仅集群内部访问（默认）
#   NodePort: 在每个节点上开放一个端口，可通过节点 IP+端口访问
#   LoadBalancer: 自动创建云负载均衡器（SLB），暴露公网入口（会产生费用）
#   ExternalName: 将服务映射到一个外部 DNS 名称
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
  namespace: agenthive
  labels:
    app.kubernetes.io/name: nginx-demo
spec:
  # selector: 选择哪些 Pod 作为后端
  # 这里匹配 label 中包含 app.kubernetes.io/name: nginx-demo 的所有 Pod
  selector:
    app.kubernetes.io/name: nginx-demo

  # ports: 服务端口映射
  #   port: Service 本身监听的端口
  #   targetPort: 转发到后端 Pod 的端口（与 containerPort 对应）
  #   name: 端口名称，方便识别用途
  ports:
    - port: 80
      targetPort: 80
      name: http

  # type: 服务类型
  #   NodePort 适合 Demo: 不创建额外的 SLB，节省费用
  #   通过 kubectl port-forward 或节点 IP+NodePort 访问
  type: NodePort
