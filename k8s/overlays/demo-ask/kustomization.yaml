# ============================================================================
# ACK Demo 环境 Kustomize 配置
# ============================================================================
# 专为杭州 ACK Demo 集群设计
# - 跳过本地 Postgres（使用北京 ECS 外部数据库）
# - 镜像来源：ACR personal 版
# - 资源精简：单副本，适合 4C8G 单节点

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive

resources:
  - ./base/00-namespace.yaml
  - ./base/01-secrets.yaml
  - ./base/03-redis.yaml
  - ./base/04-api.yaml
  - ./base/05-landing.yaml
  - ./base/08-configmap.yaml
  - rabbitmq.yaml
  - ingress.yaml

images:
  - name: agenthive/api
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/api
    newTag: latest
  - name: agenthive/landing
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/landing
    newTag: latest
  - name: redis
    newName: crpi-89ktoa4wv8sjcdow.cn-beijing.personal.cr.aliyuncs.com/namespace-alpha/redis
    newTag: 7-alpine

patches:
  - path: configmap-patch.yaml
  - path: api-patch.yaml
  - path: landing-patch.yaml

labels:
  - pairs:
      environment: demo-ask
      managed-by: kustomize
    includeSelectors: true
    includeTemplates: true
