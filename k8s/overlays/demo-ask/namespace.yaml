# ============================================================================
# Namespace: agenthive
# ============================================================================
# Namespace 是 K8s 中的逻辑隔离单元，相当于"虚拟集群"。
# 同一 Namespace 内的资源可以直接通过服务名访问，
# 不同 Namespace 之间默认网络隔离。
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: agenthive
  labels:
    app.kubernetes.io/name: agenthive
    environment: demo-ask
