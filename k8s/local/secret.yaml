# ==========================================
# Local Development Secrets
# WARNING: These are for local development only!
# ==========================================

apiVersion: v1
kind: Secret
metadata:
  name: agenthive-secrets
  namespace: agenthive-local
type: Opaque
stringData:
  # Database
  DB_USER: "agenthive"
  DB_PASSWORD: "agenthive_local_secret"
  
  # Redis
  REDIS_PASSWORD: "redis_local_secret"
  
  # JWT
  JWT_SECRET: "local_jwt_secret_key_change_in_production"
