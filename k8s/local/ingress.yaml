# ==========================================
# Ingress for Local Development
# Two options: NodePort (default) or Ingress Controller
# ==========================================

# Option 1: NodePort Service (No Ingress Controller Required)
# This is the default for Docker Desktop local development
---
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: agenthive-local
spec:
  selector:
    app: agenthive-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: supervisor-nodeport
  namespace: agenthive-local
spec:
  selector:
    app: agenthive-supervisor
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
  type: NodePort

