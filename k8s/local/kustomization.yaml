# ==========================================
# AgentHive Cloud - Local K8s Configuration
# For Docker Desktop Kubernetes
# ==========================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive-local

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - redis.yaml
  - supervisor.yaml
  - web.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: agenthive
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/environment: local
    includeSelectors: true
    includeTemplates: true

images:
  - name: agenthive/supervisor
    newTag: local
    newName: agenthive/supervisor
  - name: agenthive/web
    newTag: local
    newName: agenthive/web
