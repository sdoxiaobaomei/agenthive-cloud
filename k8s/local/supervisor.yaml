# ==========================================
# Supervisor API for Local Development
# Single replica, reduced resources
# ==========================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: supervisor
  namespace: agenthive-local
  labels:
    app: agenthive-supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenthive-supervisor
  template:
    metadata:
      labels:
        app: agenthive-supervisor
    spec:
      initContainers:
        # Wait for postgres to be ready
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do
                echo "PostgreSQL is not ready yet..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
        # Wait for redis to be ready
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis..."
              until nc -z redis 6379; do
                echo "Redis is not ready yet..."
                sleep 2
              done
              echo "Redis is ready!"
      containers:
        - name: supervisor
          image: agenthive/supervisor:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: agenthive-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: agenthive-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agenthive-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agenthive-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agenthive-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: supervisor
  namespace: agenthive-local
spec:
  selector:
    app: agenthive-supervisor
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
