# ============================================================================
# Nacos — Service Discovery & Configuration Center
# Required by Java microservices (PLATFORM-023~025 follow-up)
# ============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nacos-data
  namespace: agenthive
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/component: service-discovery
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: nacos-auth
  namespace: agenthive
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/component: service-discovery
type: Opaque
stringData:
  NACOS_AUTH_TOKEN: "qDM03geLxo1dEcRLDi1R+ZYe3Tg9zsVsl5o95oSWo3A="
  NACOS_AUTH_IDENTITY_KEY: "agenthive"
  NACOS_AUTH_IDENTITY_VALUE: "agenthive-secret-2024"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: agenthive
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/component: service-discovery
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: nacos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nacos
        app.kubernetes.io/component: service-discovery
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.3.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8848
          name: http
          protocol: TCP
        - containerPort: 9848
          name: grpc
          protocol: TCP
        env:
        - name: JAVA_OPTS
          value: "-Dderby.stream.error.file=/home/nacos/logs/derby.log"
        - name: MODE
          value: "standalone"
        - name: PREFER_HOST_MODE
          value: "hostname"
        - name: NACOS_AUTH_ENABLE
          value: "true"
        - name: NACOS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: nacos-auth
              key: NACOS_AUTH_TOKEN
        - name: NACOS_AUTH_IDENTITY_KEY
          valueFrom:
            secretKeyRef:
              name: nacos-auth
              key: NACOS_AUTH_IDENTITY_KEY
        - name: NACOS_AUTH_IDENTITY_VALUE
          valueFrom:
            secretKeyRef:
              name: nacos-auth
              key: NACOS_AUTH_IDENTITY_VALUE
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /nacos/v1/console/health/readiness
            port: http
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /nacos/v1/console/health/readiness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 10
        volumeMounts:
        - name: data
          mountPath: /home/nacos/data
        - name: logs
          mountPath: /home/nacos/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: nacos-data
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: agenthive
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/component: service-discovery
spec:
  selector:
    app.kubernetes.io/name: nacos
  ports:
  - port: 8848
    targetPort: 8848
    name: http
  - port: 9848
    targetPort: 9848
    name: grpc
  type: ClusterIP
