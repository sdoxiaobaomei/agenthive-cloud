apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: agenthive
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secrets
type: Opaque
# ⚠️ 注意：这些值仅为本地开发使用，生产环境请使用外部 Secret 管理工具
# 如: External Secrets Operator, Vault, AWS Secrets Manager 等
stringData:
  DB_PASSWORD: "dev"
  JWT_SECRET: "dev-jwt-secret-do-not-use-in-production"
  LLM_API_KEY: "sk-your-llm-api-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: agenthive
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: config
data:
  NODE_ENV: "development"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "agenthive"
  DB_USER: "agenthive"
  REDIS_URL: "redis://redis:6379"
  API_URL: "http://api:3001"
  LLM_BASE_URL: "http://host.docker.internal:11434"
  LLM_MODEL: "qwen3:14b"
