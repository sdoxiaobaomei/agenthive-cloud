# ============================================================================
# Native Kubernetes Secret — FREE Secret Management
# TICKET: PLATFORM-021-optimization
# 
# This replaces the previous ExternalSecret + Alibaba Cloud KMS approach
# to eliminate cloud costs. Security trade-off: secrets are managed via
# kubectl apply or scripts/setup-secrets.sh, NOT committed to Git.
#
# INSTRUCTIONS:
#   1. Copy .env.example to .env and fill in real values
#   2. Run: bash scripts/setup-secrets.sh
#   3. Never commit .env or this file with real values to Git
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: agenthive
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secrets
    app.kubernetes.io/managed-by: manual
  annotations:
    note: "THIS IS A TEMPLATE. Real values must be injected via scripts/setup-secrets.sh"
type: Opaque
stringData:
  # Database credentials
  DB_USER: "agenthive"
  DB_PASSWORD: "REPLACE_ME"
  
  # Redis credentials (required by PLATFORM-024/025)
  REDIS_PASSWORD: "agenthive"
  
  # JWT & Auth
  JWT_SECRET: "Gwg_MvwHycDqXVkmLJKNpuNbb_HKw\\JC"
  
  # LLM API
  LLM_API_KEY: "REPLACE_ME"
  
  # Backup encryption
  BACKUP_ENCRYPTION_KEY: "REPLACE_ME"
  
  # MinIO (for backups)
  MINIO_ACCESS_KEY: "REPLACE_ME"
  MINIO_SECRET_KEY: "REPLACE_ME"
  
  # Nacos (Java services)
  NACOS_AUTH_TOKEN: "REPLACE_ME"
  NACOS_PASSWORD: "REPLACE_ME"
  
  # RabbitMQ (Java services — PLATFORM-028/029)
  RABBITMQ_PASSWORD: "REPLACE_ME"
  
  # Payment service (PLATFORM-029)
  INTERNAL_API_TOKEN: "REPLACE_ME_REPLACE_ME_REPLACE_ME_"
  WITHDRAWAL_ENCRYPT_KEY: "12345678901234567890123456789012"
  
  # Grafana admin (if deployed)
  GRAFANA_ADMIN_PASSWORD: "REPLACE_ME"
