# ============================================================================
# RBAC — Secret 最小权限原则
# TICKET: PLATFORM-009
# Purpose: Restrict Secret access to only Pods that need it
# Security baseline: Only api, landing, and java services can read app-secrets
# ============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: agenthive
  labels:
    app.kubernetes.io/name: secret-reader
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["app-secrets"]
  verbs: ["get"]
---
# API ServiceAccount binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-secret-reader
  namespace: agenthive
  labels:
    app.kubernetes.io/name: api-secret-reader
    app.kubernetes.io/component: security
subjects:
- kind: ServiceAccount
  name: api
  namespace: agenthive
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
# Landing ServiceAccount binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: landing-secret-reader
  namespace: agenthive
  labels:
    app.kubernetes.io/name: landing-secret-reader
    app.kubernetes.io/component: security
subjects:
- kind: ServiceAccount
  name: landing
  namespace: agenthive
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
# Gateway ServiceAccount binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-service-secret-reader
  namespace: agenthive
