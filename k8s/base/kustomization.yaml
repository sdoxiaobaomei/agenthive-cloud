apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agenthive

resources:
  - 00-namespace.yaml
  - 01-secrets.yaml
  - 02-postgres.yaml
  - 03-redis.yaml
  - 04-api.yaml
  - 05-landing.yaml
  - 06-networkpolicy.yaml
  - 07-hpa.yaml
  - 08-configmap.yaml
  - 09-ingress.yaml
  - 10-java-services.yaml

# 通用标签
labels:
  - pairs:
      app.kubernetes.io/part-of: agenthive
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/version: "1.0.0"
    includeSelectors: true
    includeTemplates: true

# 注释
commonAnnotations:
  deployment.kubernetes.io/revision: "1"
