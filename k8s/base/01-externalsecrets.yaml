apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: agenthive
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secret-management
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: alicloud-kms
  target:
    # 保持与原明文 Secret 同名，确保所有 Deployment/StatefulSet 无需修改引用
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: agenthive
          app.kubernetes.io/component: secrets
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: DB_USER
      remoteRef:
        # 阿里云 KMS Secret 名称，部署前需在 KMS 创建对应 Secret
        key: "agenthive-${ENVIRONMENT}-db-user"
    - secretKey: DB_PASSWORD
      remoteRef:
        key: "agenthive-${ENVIRONMENT}-db-password"
    - secretKey: JWT_SECRET
      remoteRef:
        key: "agenthive-${ENVIRONMENT}-jwt-secret"
    - secretKey: LLM_API_KEY
      remoteRef:
        key: "agenthive-${ENVIRONMENT}-llm-api-key"
---
# 注意：各环境 overlay 可通过 patches 覆盖 refreshInterval 或 remoteRef.key
# 生产环境建议设置更短的 refreshInterval（如 15m）并启用版本控制
