# ============================================================================
# PostgreSQL for Java Microservices
# 3 independent PostgreSQL instances aligned with docker-compose.java.yml
# ============================================================================

# ============================================
# ConfigMap: Business DB initialization script
# Creates databases for payment, order, cart, logistics services
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-business-init
  namespace: agenthive
  labels:
    app.kubernetes.io/name: postgres-business
    app.kubernetes.io/component: database
data:
  init.sql: |
    CREATE DATABASE payment_db;
    CREATE DATABASE order_db;
    CREATE DATABASE cart_db;
    CREATE DATABASE logistics_db;
    GRANT ALL PRIVILEGES ON DATABASE payment_db TO agenthive;
    GRANT ALL PRIVILEGES ON DATABASE order_db TO agenthive;
    GRANT ALL PRIVILEGES ON DATABASE cart_db TO agenthive;
    GRANT ALL PRIVILEGES ON DATABASE logistics_db TO agenthive;

---
# ============================================
# PostgreSQL - Auth Service
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-auth-data
  namespace: agenthive
  labels:
    app.kubernetes.io/name: postgres-auth
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-auth
  namespace: agenthive
  labels:
    app.kubernetes.io/name: postgres-auth
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-auth
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-auth
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: "auth_db"
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
  namespace: agenthive
  labels:
    app.kubernetes.io/name: postgres-auth
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: postgres-auth
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP
  clusterIP: None

---
