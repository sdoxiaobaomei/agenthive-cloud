# ConfigMap - 应用配置
# 集中管理非敏感配置项

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: agenthive
  labels:
    app.kubernetes.io/name: agenthive
data:
  # 环境配置
  NODE_ENV: "production"
  
  # 数据库配置
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "agenthive"
  DB_USER: "agenthive"
  
  # Chat 数据库配置
  CHAT_DB_HOST: "postgres-chat"
  CHAT_DB_PORT: "5432"
  CHAT_DB_NAME: "chat_db"
  
  # Project 数据库配置
  PROJECT_DB_HOST: "postgres-project"
  PROJECT_DB_PORT: "5432"
  PROJECT_DB_NAME: "project_db"
  
  # Agent 数据库配置
  AGENT_DB_HOST: "postgres-agent"
  AGENT_DB_PORT: "5432"
  AGENT_DB_NAME: "agent_db"
  
  # Redis 配置
  REDIS_URL: "redis://:agenthive@redis:6379"
  
  # API 配置
  API_URL: "http://api:3001"
  GATEWAY_URL: "http://gateway-service:8080"
  CORS_ORIGIN: "http://agenthive.local,http://agenthive.local:8080,http://localhost,http://localhost:3000,http://localhost:5173,http://localhost:8080,https://*.xiaochaitian.asia"
  
  # 应用配置
  APP_NAME: "AgentHive Cloud"
  LOG_LEVEL: "info"
  API_VERSION: "v1"
  
  # 性能配置
  MAX_CONNECTIONS: "100"
  REQUEST_TIMEOUT: "30000"
  CACHE_TTL: "3600"

  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  OTEL_LOG_LEVEL: "warn"
  OTEL_SDK_DISABLED: "false"

  # LLM Configuration
  LLM_BASE_URL: "https://api.kimi.com/coding/v1"
  LLM_MODEL: "kimi-for-coding"

  # Logging
  STRUCTURED_LOGGING: "true"
