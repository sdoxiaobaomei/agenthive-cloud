# NetworkPolicy - 限制 Pod 间网络通信
# 遵循最小权限原则，只允许必要的流量

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-network-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 允许来自 landing 服务的流量
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: landing
    ports:
    - protocol: TCP
      port: 3001
  # 允许来自 Gateway 服务的流量（内部路由转发）
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: gateway-service
    ports:
    - protocol: TCP
      port: 3001
  # 允许来自 Ingress Controller 的流量
  # NOTE: K3s 默认使用 Traefik，但本项目 bootstrap 时通过 --disable=traefik 禁用了它，
  # 并自行部署了 ingress-nginx。如环境使用 Traefik，请将 namespaceSelector 改为:
  #   matchLabels:
  #     kubernetes.io/metadata.name: kube-system
  # 或 Traefik 实际所在的 namespace。
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3001
  egress:
  # 允许访问 Postgres
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgres
    ports:
    - protocol: TCP
      port: 5432
  # 允许访问 Postgres-Chat
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgres-chat
    ports:
    - protocol: TCP
      port: 5432
  # 允许访问 Postgres-Project
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgres-project
    ports:
    - protocol: TCP
      port: 5432
  # 允许访问 Postgres-Agent
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgres-agent
    ports:
    - protocol: TCP
      port: 5432
  # 允许访问 Redis
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
    ports:
    - protocol: TCP
      port: 6379
  # 允许访问 Nacos
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: nacos
    ports:
    - protocol: TCP
      port: 8848
    - protocol: TCP
      port: 9848
  # 允许访问 RabbitMQ
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
  # 允许访问外部 LLM API (HTTPS)
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # 允许访问外部数据库 (PostgreSQL on ECS)
  - to: []
    ports:
    - protocol: TCP
      port: 5432
  # 允许访问外部 Redis
  - to: []
    ports:
    - protocol: TCP
      port: 6379
  # 允许 DNS 解析
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: landing-network-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: landing
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 允许来自 Ingress Controller 的流量
  # NOTE: 同上，如使用 Traefik 请调整 namespaceSelector 匹配实际 ingress controller namespace。
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  # 允许访问 API
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: api
    ports:
    - protocol: TCP
      port: 3001
  # 允许 DNS 解析
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
  - Ingress
  ingress:
  # Allow all Pods in the same namespace to access Postgres
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5432
---
