# Ingress - 外部访问配置
# 提供 HTTPS 终端和路由规则

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agenthive-ingress
  namespace: agenthive
  labels:
    app.kubernetes.io/name: agenthive
  annotations:
    # Nginx Ingress 配置
    kubernetes.io/ingress.class: nginx
    # 限流配置
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # 连接配置
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket 支持
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # 安全配置 — HTTPS 强制跳转
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # HSTS (HTTP Strict Transport Security)
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    # CORS 配置（如需要）
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # nginx.ingress.kubernetes.io/cors-allow-origin: "https://example.com"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - agenthive.example.com
    secretName: agenthive-tls
  rules:
  - host: agenthive.example.com
    http:
      paths:
      # Java Gateway 认证路由（必须排在 /api catch-all 之前）
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 8080
      # API 路由 — 统一走 Gateway 做 JWT 认证和 X-User-Id 透传
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 8080
      # WebSocket 路由 — Socket.IO
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 3001
      # WebSocket 路由 — Chat
      - path: /chat
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 3001
      # 前端路由 (catch-all，必须放在最后)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: landing
            port:
              number: 3000
---
