# Java Microservices - Gateway, Auth, User, Payment, Order, Cart, Logistics
# Production-ready K8s manifests following security best practices

---
# Gateway Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: agenthive
  labels:
    app.kubernetes.io/name: gateway-service
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-service
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done;']
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      - name: wait-for-nacos
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z nacos 8848; do echo waiting for nacos; sleep 2; done;']
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      containers:
      - name: gateway
        image: agenthive/gateway-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: OTEL_SDK_DISABLED
          value: "true"
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_PASSWORD
        - name: NACOS_SERVER
          value: "nacos:8848"
        - name: SPRING_CLOUD_NACOS_SERVER_ADDR
          value: "nacos:8848"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: SPRING_CLOUD_NACOS_DISCOVERY_USERNAME
          value: "nacos"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD
          value: "nacos"
        - name: SPRING_CLOUD_NACOS_CONFIG_USERNAME
          value: "nacos"
        - name: SPRING_CLOUD_NACOS_CONFIG_PASSWORD
          value: "nacos"
        - name: SPRING_CONFIG_ADDITIONAL_LOCATION
          value: "/app/config/"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: gateway-cors-config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: gateway-cors-config
        configMap:
          name: gateway-cors-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: agenthive
spec:
  selector:
    app.kubernetes.io/name: gateway-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: LoadBalancer

