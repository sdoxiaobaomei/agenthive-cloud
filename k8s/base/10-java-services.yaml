      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: auth
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: auth
        image: agenthive/auth-service:latest
        imagePullPolicy: IfNotPresent
