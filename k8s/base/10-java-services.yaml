---
# Logistics Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistics-service
  namespace: agenthive
  labels:
    app.kubernetes.io/name: logistics-service
    app.kubernetes.io/component: logistics
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: logistics-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logistics-service
        app.kubernetes.io/component: logistics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres-business 5432; do echo waiting for postgres-business; sleep 2; done;']
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done;']
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      - name: wait-for-nacos
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z nacos 8848; do echo waiting for nacos; sleep 2; done;']
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      - name: wait-for-rabbitmq
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done;']
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      containers:
      - name: logistics
        image: agenthive/logistics-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
          name: http
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: OTEL_SDK_DISABLED
          value: "true"
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_PASSWORD
        - name: NACOS_SERVER
          value: "nacos:8848"
        - name: SPRING_CLOUD_NACOS_SERVER_ADDR
          value: "nacos:8848"
        - name: DB_HOST
          value: "postgres-business"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "logistics_db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: SPRING_DATA_REDIS_HOST
          value: "redis"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_USERNAME
          value: "nacos"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD
          value: "nacos"
        - name: SPRING_CLOUD_NACOS_CONFIG_USERNAME
          value: "nacos"
        - name: SPRING_CLOUD_NACOS_CONFIG_PASSWORD
          value: "nacos"
        - name: RABBITMQ_HOST
          value: "rabbitmq"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          value: "agenthive"
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: RABBITMQ_PASSWORD
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: RABBITMQ_PASSWORD
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: logistics-service
  namespace: agenthive
spec:
  selector:
    app.kubernetes.io/name: logistics-service
  ports:
  - port: 8086
    targetPort: 8086
    name: http
  type: ClusterIP
