apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: alicloud-kms
  labels:
    app.kubernetes.io/name: agenthive
    app.kubernetes.io/component: secret-management
    app.kubernetes.io/managed-by: kustomize
spec:
  provider:
    alibaba:
      # 阿里云地域，与 ACK 集群保持一致
      region: cn-hangzhou
      auth:
        # 推荐使用 RRSA (RAM Roles for Service Accounts) 认证
        # 前置条件：ACK 集群开启 OIDC Provider，并为 ESO ServiceAccount 绑定 RAM Role
        ramRole:
          # OIDC Provider ARN，格式：acs:ram::<account-id>:oidc-provider/ack-oidc
          oidcProviderArn: "acs:ram::${ALICLOUD_ACCOUNT_ID}:oidc-provider/ack-oidc"
          # RAM Role ARN，格式：acs:ram::<account-id>:role/<role-name>
          roleArn: "acs:ram::${ALICLOUD_ACCOUNT_ID}:role/agenthive-external-secrets-role"
      # 如需使用 AccessKey（不推荐生产环境使用），替换为：
      # auth:
      #   secretRef:
      #     accessKeyIDSecretRef:
      #       name: alicloud-credentials
      #       key: access-key-id
      #     accessKeySecretSecretRef:
      #       name: alicloud-credentials
      #       key: access-key-secret
