apiVersion: v1
kind: Secret
metadata:
  name: agenthive-secrets
  namespace: agenthive
type: Opaque
stringData:
  # Database
  DB_USER: "agenthive"
  DB_PASSWORD: "agenthive_secret"
  
  # Redis
  REDIS_PASSWORD: "redis_secret"
  
  # JWT
  JWT_SECRET: "your_jwt_secret_key_change_this_in_production"
