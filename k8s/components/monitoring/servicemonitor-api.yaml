apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agenthive-api-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/name: agenthive-api
    app.kubernetes.io/component: backend
spec:
  namespaceSelector:
    matchNames:
      - agenthive
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
