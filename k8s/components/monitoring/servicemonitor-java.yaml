apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agenthive-java-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/name: agenthive-java
    app.kubernetes.io/component: microservices
spec:
  namespaceSelector:
    matchNames:
      - agenthive
  selector:
    matchLabels:
      app.kubernetes.io/component: java-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
