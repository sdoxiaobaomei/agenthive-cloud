apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus:9090
        access: proxy
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        url: http://kube-prometheus-stack-loki:3100
        access: proxy
        editable: false
        jsonData:
          maxLines: 1000
      - name: Tempo
        type: tempo
        url: http://kube-prometheus-stack-tempo:3200
        access: proxy
        editable: false
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            tags: ['pod', 'namespace']
            mappedTags: [{ key: 'service.name', value: 'service' }]
            mapTagNamesEnabled: false
            spanStartTimeShift: '1h'
            spanEndTimeShift: '1h'
            filterByTraceID: false
            filterBySpanID: false
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
      - name: agenthive
        orgId: 1
        folder: AgentHive
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/agenthive
