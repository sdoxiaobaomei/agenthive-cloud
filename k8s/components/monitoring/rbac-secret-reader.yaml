# ============================================================================
# RBAC: Restrict Secret read access to specific ServiceAccounts
# TICKET: PLATFORM-009-A
# Purpose: Only pods with explicit ServiceAccount can read app-secrets
# ============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: agenthive
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets", "nacos-auth"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-secret-reader
  namespace: agenthive
subjects:
  - kind: ServiceAccount
    name: api
    namespace: agenthive
  - kind: ServiceAccount
    name: landing
    namespace: agenthive
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
