apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agenthive-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: agenthive-alerts
    app.kubernetes.io/component: alerting
spec:
  groups:
    - name: agenthive-api
      interval: 30s
      rules:
        - alert: AgentHiveApiHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{job=~"agenthive-api",status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{job=~"agenthive-api"}[5m]))
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "AgentHive API error rate > 5%"
            description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
            runbook_url: "https://wiki.agenthive.cloud/runbooks/api-high-error-rate"

        - alert: AgentHiveApiHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{job=~"agenthive-api"}[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "AgentHive API P95 latency > 2s"
            description: "API P95 latency is {{ $value }}s over the last 5 minutes"

        - alert: AgentHiveApiPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="agenthive",container="api"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "API Pod is crash looping"
            description: "API Pod has restarted {{ $value }} times in the last 15 minutes"

        - alert: AgentHiveJavaServiceDown
          expr: |
            up{job=~"agenthive-java"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Java service {{ $labels.instance }} is down"
            description: "Java service has been down for more than 2 minutes"

        - alert: AgentHiveHpaMaxedOut
          expr: |
            (
              kube_horizontalpodautoscaler_status_current_replicas{namespace="agenthive"}
              ==
              kube_horizontalpodautoscaler_spec_max_replicas{namespace="agenthive"}
            )
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "HPA maxed out for {{ $labels.horizontalpodautoscaler }}"
            description: "HPA has been at max replicas for 10 minutes — consider raising maxReplicas"
