---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
