apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agenthive-ingress
  namespace: agenthive
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agenthive.local
      secretName: agenthive-tls
  rules:
    - host: agenthive.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: supervisor
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: supervisor
                port:
                  number: 8080
---
# For local development without TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agenthive-ingress-http
  namespace: agenthive
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: agenthive.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
