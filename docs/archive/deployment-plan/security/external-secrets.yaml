# External Secrets Operator 配置
# 将外部密钥管理系统 (AWS Secrets Manager / HashiCorp Vault) 同步到 K8s Secrets

---
# ClusterSecretStore - AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ClusterSecretStore - HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.agenthive.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# 数据库凭据 ExternalSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: agenthive
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        host: "{{ .host }}"
        port: "{{ .port }}"
        database: "{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
        connection-string: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}?sslmode=require"
  data:
    - secretKey: host
      remoteRef:
        key: agenthive/production/database
        property: host
    - secretKey: port
      remoteRef:
        key: agenthive/production/database
        property: port
    - secretKey: database
      remoteRef:
        key: agenthive/production/database
        property: database
    - secretKey: username
      remoteRef:
        key: agenthive/production/database
        property: username
    - secretKey: password
      remoteRef:
        key: agenthive/production/database
        property: password

---
# Redis 凭据 ExternalSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: agenthive
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: redis-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        url: "redis://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}"
        host: "{{ .host }}"
        port: "{{ .port }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: agenthive/production/redis
        property: host
    - secretKey: port
      remoteRef:
        key: agenthive/production/redis
        property: port
    - secretKey: password
      remoteRef:
        key: agenthive/production/redis
        property: password
    - secretKey: username
      remoteRef:
        key: agenthive/production/redis
        property: username

---
# API JWT 密钥 ExternalSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-jwt-secret
  namespace: agenthive
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        jwt-secret: "{{ .jwt_secret }}"
        jwt-refresh-secret: "{{ .jwt_refresh_secret }}"
        session-secret: "{{ .session_secret }}"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: secret/data/agenthive/api
        property: jwt_secret
    - secretKey: jwt_refresh_secret
      remoteRef:
        key: secret/data/agenthive/api
        property: jwt_refresh_secret
    - secretKey: session_secret
      remoteRef:
        key: secret/data/agenthive/api
        property: session_secret

---
# LLM API 密钥 ExternalSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-credentials
  namespace: agenthive
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: llm-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        openai-api-key: "{{ .openai_key }}"
        anthropic-api-key: "{{ .anthropic_key }}"
        dashscope-api-key: "{{ .dashscope_key }}"
        default-provider: "{{ .default_provider }}"
  data:
    - secretKey: openai_key
      remoteRef:
        key: secret/data/agenthive/llm
        property: openai_api_key
    - secretKey: anthropic_key
      remoteRef:
        key: secret/data/agenthive/llm
        property: anthropic_api_key
    - secretKey: dashscope_key
      remoteRef:
        key: secret/data/agenthive/llm
        property: dashscope_api_key
    - secretKey: default_provider
      remoteRef:
        key: secret/data/agenthive/llm
        property: default_provider

---
# MinIO 凭据 ExternalSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: agenthive
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: minio-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        access-key: "{{ .access_key }}"
        secret-key: "{{ .secret_key }}"
        root-user: "{{ .root_user }}"
        root-password: "{{ .root_password }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: agenthive/production/minio
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: agenthive/production/minio
        property: secret_key
    - secretKey: root_user
      remoteRef:
        key: agenthive/production/minio
        property: root_user
    - secretKey: root_password
      remoteRef:
        key: agenthive/production/minio
        property: root_password

---
# TLS 证书 (Cert-Manager + Let's Encrypt)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agenthive-tls
  namespace: agenthive
spec:
  secretName: agenthive-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - agenthive.cloud
    - www.agenthive.cloud
    - api.agenthive.cloud
    - ws.agenthive.cloud
  # 自动轮换 (默认在过期前 30 天)
  renewBefore: 720h  # 30天
  # 私钥配置
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 4096
  # 使用临时私钥直到证书签发
  revisionHistoryLimit: 10

---
# ClusterIssuer - Let's Encrypt 生产环境
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@agenthive.cloud
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
        selector:
          dnsNames:
            - agenthive.cloud
            - www.agenthive.cloud
            - api.agenthive.cloud
      - dns01:
          route53:
            region: ap-southeast-1
            hostedZoneID: ZXXXXXXXXXXXXX
        selector:
          dnsZones:
            - agenthive.cloud

---
# 密钥轮换策略示例
# 使用 External Secrets 的自动轮换功能
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rotatable-api-key
  namespace: agenthive
  annotations:
    # 启用自动轮换
    externalsecrets.kubernetes.io/refresh-interval: "1h"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: api-key-rotatable
    creationPolicy: Owner
    # 轮换策略
    template:
      metadata:
        annotations:
          # 触发 Pod 滚动更新
          reloader.stakater.com/auto: "true"
  dataFrom:
    - extract:
        key: secret/data/agenthive/rotatable-api-key
