# 零信任网络安全策略
# 默认拒绝所有流量，显式允许必要通信

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: agenthive
  annotations:
    policy.kubernetes.io/description: "Default deny all ingress and egress traffic"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS 访问策略 - 所有 Pod 都需要
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: agenthive
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Landing 应用网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: landing-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app: landing
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 允许从 Ingress Controller 访问
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # 允许访问 API 服务
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 3001

---
# API 服务网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 允许从 Landing 访问
    - from:
        - podSelector:
            matchLabels:
              app: landing
      ports:
        - protocol: TCP
          port: 3001
    # 允许从 Agent Runtime 访问
    - from:
        - podSelector:
            matchLabels:
              app: agent-runtime
      ports:
        - protocol: TCP
          port: 3001
    # 允许从 Ingress Controller 访问 (外部 API 调用)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
  egress:
    # 允许访问 PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # 允许访问 Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

---
# Agent Runtime 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-runtime-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app: agent-runtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 允许从 Ingress Controller 访问 (WebSocket)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # 允许从 API 服务访问
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 允许访问 API 服务
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 3001
    # 允许访问 Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # 允许访问外部 LLM API (HTTPS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0  # 生产环境应限制为具体 IP 范围
      ports:
        - protocol: TCP
          port: 443
    # 允许访问 Git (用于代码操作)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9418

---
# PostgreSQL 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 5432

---
# Redis 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
    - from:
        - podSelector:
            matchLabels:
              app: agent-runtime
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 6379

---
# MinIO 网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-policy
  namespace: agenthive
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 9000
    - from:
        - podSelector:
            matchLabels:
              app: agent-runtime
      ports:
        - protocol: TCP
          port: 9000
