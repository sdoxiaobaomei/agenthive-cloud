# Pod 安全策略
# 基于 Pod Security Standards (Restricted)

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-security-enforcer
  namespace: agenthive

---
# Pod Security Policy (Deprecated in 1.25, use PSA instead)
# 这里使用 Pod Security Admission 标签

# 命名空间级别的 Pod 安全标准
# kubectl label namespace agenthive pod-security.kubernetes.io/enforce=restricted
# kubectl label namespace agenthive pod-security.kubernetes.io/audit=restricted
# kubectl label namespace agenthive pod-security.kubernetes.io/warn=restricted

---
# Kyverno / Gatekeeper 策略替代方案
# 使用 OPA Gatekeeper 进行更细粒度的控制

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPAllowedUsers
metadata:
  name: agenthive-must-run-as-non-root
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    runAsUser:
      rule: MustRunAsNonRoot
    runAsGroup:
      rule: MustRunAs
      ranges:
        - min: 1
          max: 65535
    fsGroup:
      rule: MustRunAs
      ranges:
        - min: 1
          max: 65535
    supplementalGroups:
      rule: MustRunAs
      ranges:
        - min: 1
          max: 65535

---
# 禁止特权容器
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPPrivilegedContainer
metadata:
  name: psp-privileged-container
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]

---
# 限制特权提升
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPAllowPrivilegeEscalationContainer
metadata:
  name: psp-allow-privilege-escalation-container
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]

---
# 要求只读根文件系统
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPReadOnlyRootFilesystem
metadata:
  name: psp-readonly-root-filesystem
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    exemptImages:
      - "agenthive/agent-runtime:*"  # Agent Runtime 需要写 workspace

---
# 限制Capabilities
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPCapabilities
metadata:
  name: psp-capabilities
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    requiredDropCapabilities:
      - ALL
    allowedCapabilities: []

---
# 限制卷类型
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPVolumeTypes
metadata:
  name: psp-volume-types
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    volumes:
      - configMap
      - emptyDir
      - projected
      - secret
      - downwardAPI
      - persistentVolumeClaim

---
# 要求资源限制
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResources
metadata:
  name: require-resources
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    limits:
      - cpu
      - memory
    requests:
      - cpu
      - memory

---
# 禁止最新镜像标签
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockLatestTag
metadata:
  name: block-latest-tag
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]

---
# 要求健康检查探针
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredProbes
metadata:
  name: require-probes
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    probes:
      - livenessProbe
      - readinessProbe
    probeTypes:
      - tcpSocket
      - httpGet
      - exec

---
# 要求安全上下文
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSP seccomp
metadata:
  name: psp-seccomp
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: ["agenthive"]
  parameters:
    allowedProfiles:
      - RuntimeDefault
      - Localhost
    exemptImages: []

---
# 网络策略模板 (Gatekeeper ConstraintTemplate)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequirednetworkpolicy
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredNetworkPolicy
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequirednetworkpolicy

        violation[{"msg": msg}] {
          input.review.object.kind == "Namespace"
          ns := input.review.object.metadata.name
          not namespace_has_network_policy(ns)
          msg := sprintf("Namespace %s does not have a NetworkPolicy", [ns])
        }

        namespace_has_network_policy(ns) {
          data.inventory.namespace[ns]["networking.k8s.io/v1"].NetworkPolicy[_]
        }

---
# 要求所有命名空间有网络策略
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredNetworkPolicy
metadata:
  name: require-network-policy
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Namespace"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - default
      - monitoring
      - argocd
