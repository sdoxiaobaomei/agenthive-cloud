# LLM API 网关部署
# 统一管理多个 LLM 提供商，实现负载均衡、容错和成本控制

apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: agenthive
  labels:
    app: llm-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - llm-gateway
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: gateway
          image: agenthive/llm-gateway:v1.0.0
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          env:
            # 提供商配置
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: anthropic-api-key
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: dashscope-api-key
            # 路由策略
            - name: DEFAULT_PROVIDER
              value: "dashscope"  # 默认使用通义千问
            - name: FALLBACK_PROVIDER
              value: "openai"
            # 成本控制
            - name: MAX_TOKENS_PER_REQUEST
              value: "8192"
            - name: RATE_LIMIT_RPM
              value: "1000"
            - name: COST_BUDGET_DAILY
              value: "100"  # USD
            # 缓存配置
            - name: CACHE_ENABLED
              value: "true"
            - name: CACHE_TTL_SECONDS
              value: "3600"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: llm-gateway-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: agenthive
data:
  config.yaml: |
    server:
      port: 8080
      metrics_port: 9090
      
    providers:
      openai:
        base_url: "https://api.openai.com/v1"
        timeout: 30s
        retry_attempts: 3
        models:
          - name: gpt-4-turbo-preview
            max_tokens: 128000
            cost_per_1k_input: 0.01
            cost_per_1k_output: 0.03
          - name: gpt-3.5-turbo
            max_tokens: 16385
            cost_per_1k_input: 0.0005
            cost_per_1k_output: 0.0015
            
      anthropic:
        base_url: "https://api.anthropic.com/v1"
        timeout: 30s
        retry_attempts: 3
        models:
          - name: claude-3-opus-20240229
            max_tokens: 200000
            cost_per_1k_input: 0.015
            cost_per_1k_output: 0.075
          - name: claude-3-sonnet-20240229
            max_tokens: 200000
            cost_per_1k_input: 0.003
            cost_per_1k_output: 0.015
            
      dashscope:
        base_url: "https://dashscope.aliyuncs.com/api/v1"
        timeout: 60s
        retry_attempts: 3
        models:
          - name: qwen-max
            max_tokens: 32768
            cost_per_1k_input: 0.002
            cost_per_1k_output: 0.006
          - name: qwen-plus
            max_tokens: 32768
            cost_per_1k_input: 0.0008
            cost_per_1k_output: 0.002
          - name: qwen-turbo
            max_tokens: 32768
            cost_per_1k_input: 0.0003
            cost_per_1k_output: 0.0006
            
    routing:
      strategy: cost_optimized  # cost_optimized, latency_optimized, balanced
      fallback_enabled: true
      circuit_breaker:
        failure_threshold: 5
        recovery_timeout: 30s
        
    caching:
      enabled: true
      ttl: 3600s
      similarity_threshold: 0.95  # 语义相似度缓存
      
    rate_limiting:
      enabled: true
      requests_per_minute: 1000
      burst_size: 100
      
    observability:
      tracing_enabled: true
      metrics_enabled: true
      log_level: info

---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: agenthive
  labels:
    app: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP

---
# LLM Gateway HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-gateway-hpa
  namespace: agenthive
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: llm_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"

---
# LLM Gateway 专用 PrometheusRule
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: llm-gateway-alerts
  namespace: monitoring
spec:
  groups:
    - name: llm-gateway
      rules:
        - alert: LLMGatewayHighLatency
          expr: |
            histogram_quantile(0.99, 
              sum(rate(llm_gateway_request_duration_seconds_bucket[5m])) by (le)
            ) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "LLM Gateway latency is high"
            description: "P99 latency is {{ $value }}s"
            
        - alert: LLMGatewayHighErrorRate
          expr: |
            sum(rate(llm_gateway_requests_total{status=~"5.."}[5m])) 
            / 
            sum(rate(llm_gateway_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "LLM Gateway error rate is high"
            description: "Error rate is {{ $value | humanizePercentage }}"
            
        - alert: LLMCostBudgetExceeded
          expr: |
            sum(increase(llm_gateway_cost_total[1d])) > 100
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Daily LLM cost budget exceeded"
            description: "Daily cost: ${{ $value }}"
            
        - alert: LLMProviderDown
          expr: |
            llm_gateway_provider_up == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "LLM provider {{ $labels.provider }} is down"

---
# LLM Gateway 限流配置 (使用 Envoy Rate Limit)
apiVersion: v1
kind: ConfigMap
metadata:
  name: rate-limit-config
  namespace: agenthive
data:
  config.yaml: |
    domain: llm-gateway
    descriptors:
      - key: api_key
        rate_limit:
          unit: minute
          requests_per_unit: 100
      - key: api_key
        value: premium
        rate_limit:
          unit: minute
          requests_per_unit: 1000
