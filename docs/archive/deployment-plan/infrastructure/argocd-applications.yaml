# ArgoCD Application 配置
# 用于 GitOps 持续交付

---
# 根应用 - App of Apps 模式
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agenthive-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/agenthive-cloud
    targetRevision: HEAD
    path: k8s/app-of-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# 基础设施应用 (监控、Ingress等)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/your-org/agenthive-cloud
    targetRevision: HEAD
    path: k8s/infrastructure
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# 应用部署
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agenthive-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/agenthive-cloud
    targetRevision: HEAD
    path: k8s/overlays/production
    kustomize:
      images:
        - ghcr.io/agenthive/landing:latest
        - ghcr.io/agenthive/api:latest
        - ghcr.io/agenthive/agent-runtime:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: agenthive
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
  # 通知配置
  notifications:
    annotations:
      argocd-notifications.argoproj.io/subscribe.on-deployed.slack: deployments
      argocd-notifications.argoproj.io/subscribe.on-health-degraded.slack: alerts

---
# 开发环境应用
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agenthive-development
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/agenthive-cloud
    targetRevision: develop
    path: k8s/overlays/development
  destination:
    server: https://kubernetes.default.svc
    namespace: agenthive-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ApplicationSet - 多环境管理
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agenthive-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: production
            url: https://prod-cluster.agenthive.cloud
            branch: main
          - cluster: staging
            url: https://staging-cluster.agenthive.cloud
            branch: main
          - cluster: development
            url: https://dev-cluster.agenthive.cloud
            branch: develop
  template:
    metadata:
      name: 'agenthive-{{cluster}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/agenthive-cloud
        targetRevision: '{{branch}}'
        path: 'k8s/overlays/{{cluster}}'
      destination:
        server: '{{url}}'
        namespace: 'agenthive-{{cluster}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
