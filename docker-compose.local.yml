# AgentHive 本地开发配置
# 使用宿主机的 Ollama，其他服务用 Docker

version: '3.8'

services:
  # ==========================================
  # 反向代理
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: agenthive-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
    restart: unless-stopped

  # ==========================================
  # API 服务 (Express) - 开发模式
  # ==========================================
  api:
    image: node:20-alpine
    container_name: agenthive-api
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ./apps/apps/api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=agenthive
      - DB_USER=agenthive
      - DB_PASSWORD=${DB_PASSWORD:-devpassword}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
      # 本地 Ollama 配置 - 使用 host.docker.internal 访问宿主机
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3:14b
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================
  # PostgreSQL
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: agenthive-db
    environment:
      - POSTGRES_USER=agenthive
      - POSTGRES_PASSWORD=${DB_PASSWORD:-devpassword}
      - POSTGRES_DB=agenthive
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: agenthive-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ==========================================
  # Landing (Nuxt 3) - 使用 pnpm 支持 workspace
  # ==========================================
  landing:
    image: node:20-alpine
    container_name: agenthive-landing
    working_dir: /app
    command: >
      sh -c "
        npm install -g pnpm &&
        pnpm install &&
        pnpm run dev
      "
    ports:
      - "3000:3000"
    volumes:
      - ./apps:/app
      - landing-node-modules:/app/node_modules
      - landing-pnpm-store:/root/.local/share/pnpm/store
    environment:
      - NODE_ENV=development
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_PUBLIC_API_BASE=http://localhost:3001
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  landing-node-modules:
  landing-pnpm-store:
