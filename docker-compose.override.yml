# ==========================================
# Docker Compose Override for Local Development
# ==========================================
# This file automatically overrides docker-compose.yml
# when running docker-compose commands
#
# Usage:
#   cp .env.local .env
#   docker-compose up -d
#
# Or use the helper script:
#   ./scripts/local-docker.sh start
# ==========================================

version: '3.8'

services:
  # -----------------------------------------
  # PostgreSQL - Local Development
  # -----------------------------------------
  postgres:
    environment:
      POSTGRES_USER: ${DB_USER:-agenthive}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agenthive_local}
      POSTGRES_DB: ${DB_NAME:-agenthive_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    # Enhanced health check for local dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agenthive} -d ${DB_NAME:-agenthive_local}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -----------------------------------------
  # Redis - Local Development
  # -----------------------------------------
  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_local_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # Enhanced health check for local dev
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_local_secret} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # -----------------------------------------
  # Supervisor Backend - Hot Reload Development
  # -----------------------------------------
  supervisor:
    build:
      target: development
    container_name: agenthive-supervisor-dev
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agenthive}
      - DB_PASSWORD=${DB_PASSWORD:-agenthive_local}
      - DB_NAME=${DB_NAME:-agenthive_local}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_local_secret}
      - JWT_SECRET=${JWT_SECRET:-local_jwt_secret}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_FORMAT=text
      - ENV=development
    ports:
      - "${SUPERVISOR_PORT:-8080}:8080"
    volumes:
      # Mount source code for hot reload
      - ./apps/supervisor:/app
      # Named volume for Go modules (performance)
      - go_mod_cache:/go/pkg/mod
      # Named volume for build cache
      - go_build_cache:/root/.cache/go-build
      # Config files
      - ./config:/config:ro
      # Logs persistence
      - supervisor_logs:/app/logs
    # Override command for better dev experience
    command: >
      sh -c "
        echo 'Installing dependencies...' &&
        go mod download &&
        echo 'Starting Supervisor with hot reload...' &&
        air -c .air.toml
      "
    # Development-friendly health check
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health 2>/dev/null | grep -q healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Development restart policy
    restart: unless-stopped
    stdin_open: true
    tty: true

  # -----------------------------------------
  # Web Frontend - Hot Reload Development
  # -----------------------------------------
  web:
    build:
      target: development
    container_name: agenthive-web-dev
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - HOST=0.0.0.0
      - PORT=5173
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      # Mount source code for hot reload
      - ./apps/web:/app
      # Named volume for node_modules (performance)
      - node_modules:/app/node_modules
      # Vite cache
      - vite_cache:/app/node_modules/.vite
    # Override command for better dev experience
    command: >
      sh -c "
        echo 'Installing dependencies...' &&
        npm install &&
        echo 'Starting Vite dev server...' &&
        npm run dev -- --host 0.0.0.0
      "
    # Development-friendly health check
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ 2>/dev/null | grep -q \"<\\!DOCTYPE\"> || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Development restart policy
    restart: unless-stopped
    stdin_open: true
    tty: true

  # -----------------------------------------
  # Nginx - Disabled for local dev (optional)
  # -----------------------------------------
  nginx:
    profiles:
      - with-nginx
      - never
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"

  # -----------------------------------------
  # MinIO - Optional for local dev
  # -----------------------------------------
  minio:
    profiles:
      - with-storage
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  # -----------------------------------------
  # Monitoring - Optional for local dev
  # -----------------------------------------
  prometheus:
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    profiles:
      - monitoring
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

# ==========================================
# Volumes for Local Development
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  supervisor_logs:
    driver: local
  node_modules:
    driver: local
  vite_cache:
    driver: local
  go_mod_cache:
    driver: local
  go_build_cache:
    driver: local
