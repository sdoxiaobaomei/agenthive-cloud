# ============================================================================
# AgentHive Cloud - Full Stack Docker Compose
# Node.js (API + Landing) + Java Microservices (7 services)
# ============================================================================
# Usage:
#   docker-compose -f docker-compose.stack.yml up -d
#   docker-compose -f docker-compose.stack.yml logs -f
#   docker-compose -f docker-compose.stack.yml down -v
#
# Memory Requirements (estimated):
#   Java services: 7 x 384M = ~2.7G
#   Nacos: 768M
#   RabbitMQ: 384M
#   PostgreSQL: 512M
#   Redis: 256M
#   API: 512M
#   Landing: 256M
#   Total: ~5.4G (ensure Docker Desktop has >= 6G allocated)
# ============================================================================

version: '3.8'

services:
  # ============================================
  # Shared Infrastructure
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: agenthive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agenthive}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
      POSTGRES_DB: ${DB_NAME:-agenthive}
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,payment_db,order_db,cart_db,logistics_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/java/scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agenthive} -d ${DB_NAME:-agenthive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  redis:
    image: redis:7-alpine
    container_name: agenthive-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - agenthive-network
    mem_limit: 256M
    mem_reservation: 128M

  # ============================================
  # Java Infrastructure
  # ============================================

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: agenthive-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: postgresql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: nacos-secret-key-agenthive-2024
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 768M
    mem_reservation: 512M

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: agenthive-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: agenthive
      RABBITMQ_DEFAULT_PASS: agenthive-secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agenthive-network
    mem_limit: 384M
    mem_reservation: 256M

  # ============================================
  # Node.js Services
  # ============================================

  api:
    image: ${REGISTRY_PREFIX:-agenthive}/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      DB_NAME: ${DB_NAME:-agenthive}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      OTEL_SDK_DISABLED: "true"
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  landing:
    image: ${REGISTRY_PREFIX:-agenthive}/landing:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-landing
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
      OTEL_SDK_DISABLED: "true"
    ports:
      - "${LANDING_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agenthive-network
    mem_limit: 256M
    mem_reservation: 128M

  # ============================================
  # Java Microservices
  # ============================================

  gateway-service:
    image: ${REGISTRY_PREFIX:-agenthive}/gateway-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/gateway-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-gateway
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms128m -Xmx384m"
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  auth-service:
    image: ${REGISTRY_PREFIX:-agenthive}/auth-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/auth-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-auth
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  user-service:
    image: ${REGISTRY_PREFIX:-agenthive}/user-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/user-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-user
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  payment-service:
    image: ${REGISTRY_PREFIX:-agenthive}/payment-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/payment-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-payment
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: agenthive
      RABBITMQ_PASS: agenthive-secret
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  order-service:
    image: ${REGISTRY_PREFIX:-agenthive}/order-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/order-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-order
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: agenthive
      RABBITMQ_PASS: agenthive-secret
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  cart-service:
    image: ${REGISTRY_PREFIX:-agenthive}/cart-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/cart-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-cart
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cart_db
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  logistics-service:
    image: ${REGISTRY_PREFIX:-agenthive}/logistics-service:${IMAGE_TAG:-latest}
    build:
      context: ./apps/java/logistics-service
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: agenthive-logistics
    restart: unless-stopped
    environment:
      NACOS_SERVER: nacos:8848
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: logistics_db
      DB_USER: ${DB_USER:-agenthive}
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: agenthive
      RABBITMQ_PASS: agenthive-secret
      JAVA_OPTS: "-Xms128m -Xmx384m"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - agenthive-network
    mem_limit: 512M
    mem_reservation: 256M

  # ============================================
  # Optional: Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: agenthive-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      landing:
        condition: service_healthy
    networks:
      - agenthive-network
    profiles:
      - with-nginx
    mem_limit: 64M
    mem_reservation: 32M

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nacos_data:
    driver: local
  rabbitmq_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  agenthive-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
