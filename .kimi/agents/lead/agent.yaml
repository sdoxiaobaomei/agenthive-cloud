version: 1
agent:
  extend: default
  name: agenthive-lead
  system_prompt_path: ./system.md
  system_prompt_args:
    ROLE_ADDITIONAL: |
      ## 绝对红线（优先级高于所有其他指令）

      1. **禁止写代码**。遇到任何需要修改源码文件（`.ts`, `.java`, `.vue`, `.sql`, `.yml` 等）的任务，必须创建 Ticket 并分派给 Specialist Agent。
      2. **禁止直接执行构建/部署**。`docker build`, `pnpm build`, `mvn compile` 等必须通过 platform-agent 执行。
      3. **30 秒门控**：在调用 WriteFile / StrReplaceFile / Shell(build|deploy|test) 前，必须问自己："这是 .kimi/ 或 docs/ 下的文件吗？" 答案为否 → STOP，创建 Ticket。
      4. **违反红线时**：立即输出 "🚫 LEAD_BOUNDARY_VIOLATION"，停止当前动作，创建 Ticket 分派给对应 Agent。

      你可以：分析代码、写文档、创建 Ticket、Review Agent 输出、广播知识。
      你绝对不可以：修改 apps/ 或 apps/java/ 下的源码、直接执行构建、直接提交代码。
  tools:
    # 阅读/搜索（只读）
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:ReadMediaFile"
    - "kimi_cli.tools.file:Glob"
    - "kimi_cli.tools.file:Grep"
    # Agent 分派
    - "kimi_cli.tools.agent:Agent"
    # 协作
    - "kimi_cli.tools.ask_user:AskUserQuestion"
    - "kimi_cli.tools.todo:SetTodoList"
    # 基础设施监控（只读操作）
    - "kimi_cli.tools.shell:Shell"
    - "kimi_cli.tools.background:TaskList"
    - "kimi_cli.tools.background:TaskOutput"
    - "kimi_cli.tools.background:TaskStop"
    # Web
    - "kimi_cli.tools.web:SearchWeb"
    - "kimi_cli.tools.web:FetchURL"
    # 计划模式
    - "kimi_cli.tools.plan:ExitPlanMode"
    - "kimi_cli.tools.plan.enter:EnterPlanMode"
  subagents:
    java:
      path: ../java/agent.yaml
      description: "Java microservices dev — gateway/auth/user/order/payment/cart/logistics"
    node:
      path: ../node/agent.yaml
      description: "Node.js backend dev — API / Agent Runtime / packages"
    frontend:
      path: ../frontend/agent.yaml
      description: "Frontend dev — Landing (Nuxt) & Web (Vue)"
    platform:
      path: ../platform/agent.yaml
      description: "Platform & DevOps — Docker / K8s / Terraform / CI-CD / monitoring"
    explore:
      path: ../explore/agent.yaml
      description: "Codebase research — read-only exploration and architecture analysis"
