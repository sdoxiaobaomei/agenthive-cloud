# AgentHive Supervisor Configuration

server:
  port: 8080
  host: 0.0.0.0
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  name: ${DB_NAME}
  ssl_mode: ${DB_SSL_MODE}
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  password: ${REDIS_PASSWORD}
  db: ${REDIS_DB}
  pool_size: 10

jwt:
  secret: ${JWT_SECRET}
  expiration: 24h
  refresh_expiration: 168h

log:
  level: ${LOG_LEVEL}
  format: ${LOG_FORMAT}
  output: ${LOG_OUTPUT}

scheduler:
  worker_pool_size: 10
  task_timeout: 5m
  retry_attempts: 3
  retry_delay: 5s

cors:
  allowed_origins:
    - http://localhost:5173
    - http://localhost:80
    - http://localhost:8080
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Authorization
    - X-Requested-With

rate_limit:
  requests: 100
  duration: 1m
