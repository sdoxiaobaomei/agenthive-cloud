# Kind 集群配置文件
# 使用方式: kind create cluster --config scripts/kind-cluster.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: agenthive

# 节点配置
nodes:
  # 控制平面节点（主节点）
  - role: control-plane
    image: kindest/node:v1.28.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP 入口
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS 入口
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # 应用端口映射
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
    # 额外的卷挂载（可选）
    # extraMounts:
    #   - hostPath: /path/to/host/dir
    #     containerPath: /path/to/container/dir

  # 工作节点 1
  - role: worker
    image: kindest/node:v1.28.0
    labels:
      tier: frontend

  # 工作节点 2
  - role: worker
    image: kindest/node:v1.28.0
    labels:
      tier: backend

# 网络配置（可选）
# networking:
#   # 禁用默认 CNI，使用自己的
#   disableDefaultCNI: false
#   # 自定义 Service 网段
#   serviceSubnet: "10.96.0.0/12"
#   # 自定义 Pod 网段
#   podSubnet: "10.244.0.0/16"
